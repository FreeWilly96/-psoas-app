<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psoas Ultra PRO</title>

<link rel="apple-touch-icon" sizes="180x180" href="images/icon.png">
<link rel="manifest" href="manifest.json">

<style>
:root{
    --primary:#7b2ff7;
    --accent:#ff2d75;
    --bg:#f2f2f2;
    --card:#ffffff;
    --text:#111;
}

/* BASE */
body {
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background:var(--bg);
    color:var(--text);
}

/* SAFE AREA */
body{
    padding-bottom:env(safe-area-inset-bottom);
}

/* DARK MODE */
body.dark {
    --bg:#0b1a2f;
    --card:#16263a;
    --text:#ffffff;
}

/* WRAPPER */
.container{
    max-width:680px;
    margin:auto;
    padding:10px 15px 130px;
    text-align:center;
}

/* HEADER */
h2{
    font-size:14px;
    opacity:0.5;
    margin:5px 0;
}
h3{
    font-size:24px;
    margin:5px 0 10px;
    font-weight:700;
}

/* IMAGE */
img{
    width:100%;
    max-height:26vh;
    object-fit:contain;
    border-radius:12px;
    background:#fff;
}

/* GUIDE */
.guide{
    margin:12px 0;
    padding:14px;
    border-radius:16px;
    background:var(--card);
    text-align:left;
    font-size:15px;
    line-height:1.4;
}

/* TIMER */
.timer{
    font-size:clamp(60px,14vw,110px);
    font-weight:800;
    margin:15px 0 10px;
    background:linear-gradient(90deg,var(--primary),var(--accent));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* SIDE */
.side{
    font-size:16px;
    opacity:0.6;
    height:20px;
}

/* PROGRESS */
#progressBar{
    width:100%;
    height:12px;
    background:#ddd;
    border-radius:20px;
    margin-top:5px;
}
#progress{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,var(--primary),var(--accent));
    transition:0.3s;
}

/* BUTTONS */
button{
    padding:12px;
    border:none;
    border-radius:14px;
    color:white;
    font-weight:600;
    flex:1;
    opacity:0.95;
}
button:active{
    transform:scale(0.96);
}

/* COLORS */
.start{background:#2ecc71;}
.pause{background:#e74c3c;}
.skip{background:#f39c12;}
.mode{background:#222;}
.phase{background:#bbb;color:#333;}
.phase.active{
    background:var(--primary);
    color:white;
}

/* CONTROLS */
.controls{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    display:flex;
    gap:6px;
    padding:10px;
    background:var(--card);
    box-shadow:0 -5px 20px rgba(0,0,0,0.15);
}

/* TRAINING BAR */
.trainingBar{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-top:10px;
}

/* TABLET */
@media(min-width:768px){
    .container{max-width:800px;}
    img{max-height:30vh;}
    .timer{font-size:90px;}
}
</style>
</head>

<body>

<div class="container">

<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>

<div id="side" class="side"></div>

<img id="exerciseImage">

<div id="guide" class="guide"></div>

<div id="timer" class="timer">0</div>

<div id="progressBar"><div id="progress"></div></div>

<div class="trainingBar">
<button class="phase" onclick="setPhase(1)">T1</button>
<button class="phase" onclick="setPhase(2)">T2</button>
<button class="phase" onclick="setPhase(3)">T3</button>
<button class="mode" onclick="nextPhase()">Next</button>
<button class="mode" onclick="toggleMode()">Mode</button>
</div>

</div>

<div class="controls">
<button class="start" onclick="start()">Start</button>
<button class="pause" onclick="pause()">Pause</button>
<button onclick="resume()">Resume</button>
<button class="skip" onclick="skip()">Skip</button>
</div>

<script>

// =============================
// CORE STATE
const App = {
    paused: false,
    state: "idle",
    session: 0
};

let phaseIndex = 0;
let current = 0;
let timer = null;
let running = false;

// =============================
const phaseTitle = document.getElementById("phaseTitle");
const exerciseTitle = document.getElementById("exerciseTitle");
const exerciseImage = document.getElementById("exerciseImage");
const guide = document.getElementById("guide");
const timerEl = document.getElementById("timer");
const side = document.getElementById("side");
const progress = document.getElementById("progress");

// =============================
function toggleMode(){
    document.body.classList.toggle("dark");
}

// =============================
function sleep(ms, session){
    return new Promise(resolve=>{
        const start = Date.now();
        function loop(){
            if(session !== App.session) return resolve();
            if(App.paused) return requestAnimationFrame(loop);
            if(Date.now() - start >= ms) return resolve();
            requestAnimationFrame(loop);
        }
        loop();
    });
}

// =============================
function speak(text, session){
    speechSynthesis.cancel();
    return new Promise(resolve=>{
        if(session !== App.session) return resolve();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = "de-DE";
        msg.rate = 0.92;
        msg.onend = () => setTimeout(resolve, 120);
        speechSynthesis.speak(msg);
    });
}

// =============================
async function countdown(sec, session){
    for(let i=sec;i>0;i--){
        if(session !== App.session) return;
        while(App.paused) await sleep(150, session);
        update(i);
        await speak(i.toString(), session);
    }
}

// =============================
async function coachIntro(ex, session){
    if(session !== App.session) return;
    await speak(ex.name, session);
    if(ex.subtitle) await speak(ex.subtitle, session);
    if(ex.guide){
        for(let g of ex.guide){
            if(session !== App.session) return;
            await speak(g, session);
        }
    }
    await sleep(900, session);
    await speak("Bereit machen", session);
    await countdown(3, session);
}

// =============================
async function start(){
    if(running) return;
    running = true;
    App.state = "running";
    App.session++;
    const session = App.session;
    let ex = phases[phaseIndex][current];
    await coachIntro(ex, session);
    if(session !== App.session) return;
    run(ex, session);
}

// =============================
function run(ex, session){
    if(ex.type==="time") runTime(ex, session);
    if(ex.type==="reps") runReps(ex, session);
    if(ex.type==="side") runSide(ex, session);
    if(ex.type==="holdReps") runHoldReps(ex, session);
    if(ex.type==="sideHoldReps") runSideHoldReps(ex, session);
}

// =============================
function runTime(ex, session){
    let t = ex.time;
    update(t);
    timer = setInterval(()=>{
        if(session !== App.session){
            clearInterval(timer);
            return;
        }
        if(App.paused) return;
        t--;
        update(t);
        if(t<=0){
            clearInterval(timer);
            next(session);
        }
    },1000);
}

// =============================
async function runReps(ex, session){
    let reps = ex.reps;
    while(reps>0){
        if(session !== App.session) return;
        while(App.paused) await sleep(150, session);
        update(reps);
        await speak(reps.toString(), session);
        reps--;
        await sleep(ex.rest*1000, session);
    }
    next(session);
}

// =============================
async function runHoldReps(ex, session){
    let reps = ex.reps;
    while(reps>0){
        if(session !== App.session) return;
        while(App.paused) await sleep(150, session);
        update("HALTEN");
        await speak("Halten", session);
        await sleep(ex.holdTime || 4000, session);
        reps--;
    }
    next(session);
}

// =============================
async function runSide(ex, session){
    let sides=["rechts","links"];
    for(let i=0;i<sides.length;i++){
        if(session !== App.session) return;
        let s = sides[i];
        showSide(s);
        await speak("Seite " + s, session);
        let t = ex.time;
        while(t>0){
            if(session !== App.session) return;
            while(App.paused) await sleep(150, session);
            update(t);
            await sleep(1000, session);
            t--;
        }
        if(i < sides.length-1){
            await sleep(5000, session);
            await speak("Seitenwechsel", session);
        }
    }
    showSide("");
    next(session);
}

// =============================
async function runSideHoldReps(ex, session){
    let sides=["rechts","links"];
    for(let i=0;i<sides.length;i++){
        if(session !== App.session) return;
        let s = sides[i];
        showSide(s);
        await speak("Seite " + s, session);
        let reps = ex.reps;
        while(reps>0){
            if(session !== App.session) return;
            while(App.paused) await sleep(150, session);
            update(reps);
            await speak("Halten", session);
            await sleep(ex.holdTime || 4000, session);
            reps--;
        }
        if(i < sides.length-1){
            await sleep(5000, session);
            await speak("Seitenwechsel", session);
        }
    }
    showSide("");
    next(session);
}

// =============================
function skip(){
    App.session++;
    running = false;
    clearInterval(timer);
    speechSynthesis.cancel();
    setTimeout(()=>{
        next(App.session);
    },120);
}

// =============================
async function next(session){
    if(session !== App.session) return;
    running = false;
    current++;
    updateProgress();
    if(current >= phases[phaseIndex].length){
        update("FERTIG 💪");
        await speak("Training beendet", session);
        return;
    }
    load();
    await sleep(1400, session);
    start();
}

// =============================
function pause(){
    App.paused = true;
    speechSynthesis.cancel();
}

function resume(){
    App.paused = false;
}

// =============================
function nextPhase(){
    App.session++;
    phaseIndex = (phaseIndex+1)%phases.length;
    current = 0;
    load();
}

function setPhase(p){
    App.session++;
    phaseIndex = p-1;
    current = 0;
    load();
}

// =============================
function load(){
    let ex = phases[phaseIndex][current];
    phaseTitle.innerText = "Training " + (phaseIndex+1);
    exerciseTitle.innerText = ex.name;
    exerciseImage.src = ex.img;

    let html = "<ul>";
    ex.guide.forEach(g=>{
        html += "<li>"+g+"</li>";
    });
    html += "</ul>";
    guide.innerHTML = html;

    update(ex.time || ex.reps);
    updateProgress();

    document.querySelectorAll(".phase").forEach((btn,i)=>{
        btn.classList.toggle("active", i === phaseIndex);
    });
}

// =============================
function update(v){ timerEl.innerText = v; }
function showSide(s){ side.innerText = s; }
function updateProgress(){
    let total = phases[phaseIndex].length;
    progress.style.width = (current/total*100)+"%";
}



// =============================
// 🔥 STABILE PHASEN
const phases = [

/* ================= PHASE 1 ================= */
[
{
name:"Bauchatmung",
subtitle:"Nervensystem beruhigen",
img:"images/phase3.jpg",
type:"time",
time:120,
guide:[
"Rückenlage, Füße aufgestellt",
"Eine Hand auf Bauch, eine auf Brust",
"Langsam in den Bauch atmen",
"5 Sekunden einatmen, 7 Sekunden ausatmen"
]
},

{
name:"Knie zur Brust",
subtitle:"Psoas Entlastung",
img:"images/phase3.jpg",
type:"side",
time:45,
guide:[
"Rückenlage",
"Ein Knie zur Brust ziehen und mit Händen halten",
"Anderes Bein bleibt gestreckt und locker",
"Tief weiteratmen und entspannen"
]
},

{
name:"Mini-Becken-Kippung",
subtitle:"Kontrolle und Entlastung",
img:"images/phase3.jpg",
type:"reps",
reps:15,
rest:3,
guide:[
"Rückenlage, Füße aufgestellt",
"Unterer Rücken leicht in den Boden drücken",
"Becken kippt nach vorne",
"Spannung kurz halten und wieder lösen",
"Kleine ruhige Bewegung"
]
},

{
name:"Hüftbeuger Dehnung",
subtitle:"Psoas und Hüftbeuger dehnen",
img:"images/phase3.jpg",
type:"side",
time:40,
guide:[
"Halbkniestand",
"Gesäß der hinteren Seite anspannen",
"Becken leicht nach hinten kippen",
"Oberkörper aufrecht, kein Hohlkreuz",
"Dehnung vorne in der Hüfte spüren"
]
},

{
name:"Glute Bridge",
subtitle:"Gesäßmuskulatur stärken",
img:"images/phase3.jpg",
type:"holdReps",
reps:15,
guide:[
"Rückenlage, Füße hüftbreit aufstellen",
"Hüfte nach oben drücken, Gesäß anspannen",
"Oben 5 Sekunden halten",
"Langsam wieder absenken"
]
},

{
name:"Adduktor Dehnung",
subtitle:"Leisten und Innenschenkel dehnen",
img:"images/phase3.jpg",
type:"side", // ✅ WAR "time"
time:45,
guide:[
"Breiten Stand einnehmen",
"Gewicht zur Seite verlagern",
"Andere Seite bleibt gestreckt",
"Rücken gerade halten",
"Dehnung innen spüren"
]
}
],

/* ================= PHASE 2 ================= */
[
{
name:"Bauchatmung Aktivierung",
subtitle:"Rumpf aktivieren",
img:"images/phase2.jpg",
type:"time",
time:60,
guide:[
"Ruhig atmen",
"Spannung im Rumpf aufbauen",
"Kontrollierte Atmung"
]
},

{
name:"Dynamische Hüftöffnung",
subtitle:"Beweglichkeit und Kontrolle",
img:"images/phase2.jpg",
type:"sideHoldReps",
reps:10,
guide:[
"Ausfallschritt nach vorne",
"Hüfte vor und zurück bewegen",
"Spannung halten",
"Bewegung kontrolliert ausführen"
]
},

{
name:"Glute Bridge einbeinig",
subtitle:"Stabilität und Kraft",
img:"images/phase2.jpg",
type:"sideHoldReps",
reps:10,
guide:[
"Ein Bein anheben",
"Hüfte nach oben drücken",
"Spannung im Gesäß halten",
"Stabil bleiben"
]
},

{
name:"Dead Bug",
subtitle:"Rumpfstabilität",
img:"images/phase2.jpg",
type:"reps",
reps:24,
rest:3,
guide:[
"Rückenlage",
"Arme und Beine anheben",
"Gegengleich bewegen",
"Rumpf stabil halten",
"Unterer Rücken bleibt am Boden"
]
},

{
name:"Seitliche Ausfallschritte",
subtitle:"Beweglichkeit Hüfte",
img:"images/phase2.jpg",
type:"reps",
reps:20,
rest:3,
guide:[
"Seitlich ausweichen",
"Hüfte nach hinten schieben",
"Gewicht von rechts nach links verlagern",
"Spannung halten"
]
},

{
name:"Adduktor Hüfte Kombi",
subtitle:"Mobilität und Dehnung",
img:"images/phase2.jpg",
type:"side", // ✅ WAR "time"
time:40,
guide:[
"Dehnung halten",
"Kleine Bewegungen ausführen",
"Spannung ruhig halten"
]
}
],
 /* ================= TRAINING 3 ================= */
[
{
name:"Einbeiniges Standknieheben",
subtitle:"Stabilität und Kontrolle",
img:"images/training3.jpg",
type:"sideHoldReps",
reps:10,
guide:[
"Aufrecht stehen",
"Bauchnabel einziehen",
"Knie kontrolliert heben",
"Hüfte bleibt stabil"
]
},

{
name:"Seitliche Plank kurz",
subtitle:"Rumpfstabilität seitlich",
img:"images/training3.jpg",
type:"side",
time:45,
guide:[
"Seitlich liegend",
"Körper bildet eine Linie",
"Knie leicht angewinkelt",
"Becken nicht nach vorne oder hinten kippen",
"Bauch und Gesäß aktiv",
"Ruhig atmen"
]
},

{
name:"Plank",
subtitle:"Ganzkörper Spannung",
img:"images/training3.jpg",
type:"time",
time:30,
guide:[
"Bauchlage, Ellenbogen unter den Schultern",
"Füße hüftbreit auseinander",
"Körper anheben – gerade Linie",
"Kopf in Verlängerung der Wirbelsäule",
"Blick nach unten",
"Bauchnabel einziehen"
]
},

{
name:"Adduktor Kräftigung",
subtitle:"Innenschenkel aktivieren",
img:"images/training3.jpg",
type:"sideHoldReps",
reps:10,
guide:[
"Seitlich liegend",
"Körper bildet eine Linie",
"Becken stabil halten",
"Bauch und Gesäß aktiv",
"Ruhig atmen"
]
},

{
name:"Liegendes Beinheben",
subtitle:"Core Kontrolle",
img:"images/training3.jpg",
type:"sideHoldReps",
reps:12,
guide:[
"Rückenlage",
"Lendenwirbelsäule bleibt am Boden",
"Bein langsam heben",
"Kontrolliert absenken"
]
}
]   

];
// =============================
load();

</script>

</body>
</html>
