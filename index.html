<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psoas Ultra PRO ELITE</title>

<style>
body { margin:0; font-family:Arial; text-align:center; background:#f2f2f2; transition:0.3s;}
body.dark { background:#0b1a2f; color:white;}

img { width:95%; height:40vh; object-fit:contain;}
.timer { font-size:80px;}

button { padding:10px; margin:5px; border:none; border-radius:10px; color:white;}
.start{background:green;} .pause{background:red;} .skip{background:orange;}
.mode{background:black;}
</style>
</head>

<body>

<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>

<img id="exerciseImage">

<div class="timer" id="timer">0</div>

<button class="start" onclick="start()">Start</button>
<button class="pause" onclick="pause()">Pause</button>
<button class="skip" onclick="next()">Skip</button>
<button class="mode" onclick="toggleMode()">Mode</button>

<script>

// =============================
let phaseIndex = 0;
let current = 0;
let timer = null;
let firstStart = true;
let descriptionSpoken = false;

// =============================
function speak(text, cb){
    speechSynthesis.cancel();
    let msg = new SpeechSynthesisUtterance(text);
    msg.lang = "de-DE";
    msg.onend = ()=> setTimeout(()=> cb && cb(),300);
    speechSynthesis.speak(msg);
}

// =============================
const phases = [

/* =============================
   PHASE 1
============================= */
[
{
name:"Bauchatmung",
img:"images/phase3.jpg",
type:"time",
time:120,
speech:"Bauchatmung. Rückenlage. Füße aufgestellt. Eine Hand auf den Bauch, eine auf die Brust. Durch die Nase in den Bauch atmen. Fünf Sekunden einatmen. Sieben Sekunden ausatmen."
},

{
name:"Knie zur Brust",
img:"images/phase3.jpg",
type:"side",
time:45,
speech:"Knie zur Brust. Ein Knie zur Brust ziehen und mit den Händen halten. Anderes Bein bleibt entspannt. Ruhig weiteratmen."
},

{
name:"Mini-Becken-Kippung",
img:"images/phase3.jpg",
type:"reps",
reps:15,
speech:"Mini Becken Kippung. Unteren Rücken in den Boden drücken. Becken kippen und wieder lösen. Kleine ruhige Bewegung."
},

{
name:"Hüftbeuger Dehnung",
img:"images/phase3.jpg",
type:"side",
time:40,
speech:"Hüftbeuger Dehnung. Halbkniestand. Gesäß anspannen. Becken leicht nach hinten kippen. Dehnung vorne in der Hüfte spüren."
},

{
name:"Glute Bridge",
img:"images/phase3.jpg",
type:"repsSlow",
reps:12,
speech:"Glute Bridge. Hüfte nach oben drücken. Gesäß anspannen. Zwei bis drei Sekunden oben halten. Langsam absenken."
},

{
name:"Adduktor Dehnung",
img:"images/phase3.jpg",
type:"time",
time:45,
speech:"Adduktor Dehnung. Breiter Stand. Gewicht zur Seite verlagern. Dehnung in der Leiste spüren."
}
],

/* =============================
   PHASE 2
============================= */
[
{
name:"Bauchatmung",
img:"images/phase2.jpg",
type:"time",
time:60,
speech:"Bauchatmung. Rückenlage. Tief in den Bauch atmen. Spannung im Körper aufbauen."
},

{
name:"Dynamische Hüftöffnung",
img:"images/phase2.jpg",
type:"sideSlow",
reps:10,
speech:"Dynamische Hüftöffnung. Ausfallschritt Position. Hüfte langsam nach vorne schieben und wieder zurück."
},

{
name:"Glute Bridge einbeinig",
img:"images/phase2.jpg",
type:"sideSlow",
reps:10,
speech:"Einbeinige Glute Bridge. Ein Bein anheben. Hüfte nach oben drücken. Kurz halten und langsam absenken."
},

{
name:"Dead Bug",
img:"images/phase2.jpg",
type:"alt",
reps:12,
speech:"Dead Bug. Arm und Bein gegengleich bewegen. Rumpf stabil halten."
},

{
name:"Seitliche Ausfallschritte",
img:"images/phase2.jpg",
type:"altSlow",
reps:10,
speech:"Seitliche Ausfallschritte. Schritt zur Seite. Hüfte nach hinten schieben. Kontrolle behalten."
},

{
name:"Adduktor und Hüfte Kombi",
img:"images/phase2.jpg",
type:"time",
time:40,
speech:"Adduktor und Hüfte kombinieren. Dehnung halten und kleine Wippbewegungen ausführen."
}
]

];

// =============================
function start(){

    if(timer) return;

    let ex = phases[phaseIndex][current];

    if(!descriptionSpoken){

        descriptionSpoken = true;

        // 👉 NAME + ERKLÄRUNG
        speak(ex.name, ()=>{
            speak(ex.speech, ()=>{
                run(ex);
            });
        });

    } else run(ex);
}

// =============================
function run(ex){

    if(ex.type==="time") runTime(ex);
    else if(ex.type==="reps") runReps(ex);
    else if(ex.type==="repsSlow") runRepsSlow(ex);
    else if(ex.type==="side") runSide(ex);
    else if(ex.type==="sideSlow") runSideSlow(ex);
    else if(ex.type==="alt") runAlt(ex);
    else if(ex.type==="altSlow") runAltSlow(ex);
}

// =============================
function runTime(ex){

    let t = ex.time;

    timer = setInterval(()=>{
        t--;
        update(t);
        if(t<=5 && t>0) speak(t);
        if(t<=0){ clearInterval(timer); next(); }
    },1000);
}

// =============================
function runReps(ex){

    let r = ex.reps;

    timer = setInterval(()=>{
        r--;
        update(r);
        speak(r);
        if(r<=0){ clearInterval(timer); next(); }
    },2000);
}

// 👉 LANGSAM
function runRepsSlow(ex){

    let r = ex.reps;

    timer = setInterval(()=>{
        r--;
        update(r);
        speak(r);
        if(r<=0){ clearInterval(timer); next(); }
    },3000);
}

// =============================
function runSide(ex){

    let side="rechts";

    function doSide(){

        speak(side);

        let t = ex.time;

        let interval = setInterval(()=>{
            t--;
            update(t);

            if(t<=0){
                clearInterval(interval);

                if(side==="rechts"){
                    speak("Wechsel", ()=>{
                        side="links";
                        doSide();
                    });
                } else next();
            }

        },1000);
    }

    doSide();
}

// 👉 MIT PAUSE
function runSideSlow(ex){

    let side="rechts";

    function doSide(){

        speak(side);

        let r = ex.reps;

        let interval = setInterval(()=>{
            r--;
            update(r);

            if(r<=0){
                clearInterval(interval);

                if(side==="rechts"){
                    speak("Wechsel", ()=>{
                        side="links";
                        setTimeout(doSide,2000);
                    });
                } else next();
            }

        },3000);
    }

    doSide();
}

// =============================
function runAlt(ex){

    let reps=ex.reps, side="links";

    function loop(){

        speak(side);
        update(reps);

        side=(side==="links")?"rechts":"links";

        if(side==="links") reps--;

        if(reps<=0){ next(); return; }

        setTimeout(()=> speak("Wechsel",loop),1500);
    }

    loop();
}

// 👉 LANGSAM MIT PAUSE
function runAltSlow(ex){

    let reps=ex.reps, side="links";

    function loop(){

        speak(side);
        update(reps);

        side=(side==="links")?"rechts":"links";

        if(side==="links") reps--;

        if(reps<=0){ next(); return; }

        setTimeout(()=> speak("Wechsel",loop),2500);
    }

    loop();
}

// =============================
function next(){

    clearInterval(timer);
    timer=null;

    speak("Übung beendet", ()=>{

        current++;

        if(current >= phases[phaseIndex].length){
            alert("Training fertig 💪");
            current=0;
            descriptionSpoken=false;
            load();
            return;
        }

        descriptionSpoken=false;
        load();

        setTimeout(start,1500);
    });
}

// =============================
function pause(){
    clearInterval(timer);
    timer=null;
}

// =============================
function toggleMode(){
    document.body.classList.toggle("dark");
}

// =============================
function update(val){
    document.getElementById("timer").innerText = val;
}

// =============================
function load(){

    let ex = phases[phaseIndex][current];

    document.getElementById("phaseTitle").innerText =
        "Phase " + (phaseIndex+1);

    document.getElementById("exerciseTitle").innerText = ex.name;

    document.getElementById("exerciseImage").src = ex.img;

    update(ex.time || ex.reps);
}

load();

</script>

</body>
</html>
