<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psoas Ultra+ PRO V5</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(#0b1a2f, #0f2c50);
    color: white;
    text-align: center;
}

img {
    width: 90%;
    max-width: 500px;
    border-radius: 12px;
    margin: 20px auto;
}

.timer {
    font-size: 80px;
}

.progress-bar {
    width: 90%;
    height: 10px;
    background: #333;
    margin: 10px auto;
    border-radius: 10px;
}

.progress {
    height: 100%;
    width: 0%;
    background: #28a745;
}

button {
    padding: 12px 20px;
    margin: 5px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
}

.start { background: #28a745; }
.pause { background: #dc3545; }
.skip { background: #ffc107; }
.reset { background: #6c757d; }
</style>
</head>

<body>

<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>
<p id="nextExercise"></p>

<img id="exerciseImage">

<div class="timer" id="timer">40</div>

<div class="progress-bar">
    <div class="progress" id="progress"></div>
</div>

<p id="percent"></p>

<button class="start" onclick="startTimer()">Start</button>
<button class="pause" onclick="pauseTimer()">Pause</button>
<button class="skip" onclick="nextExercise()">Skip</button>
<button class="reset" onclick="resetAll()">Reset</button>

<script>

// =============================
// EINSTELLUNG
// =============================
let week = 2;

// =============================
// ÜBUNGEN
// =============================
const phase1 = [
    {name:"Bauchatmung", img:"phase1.jpg", time:60},
    {name:"Knie links", img:"phase1.jpg", time:40},
    {name:"Knie rechts", img:"phase1.jpg", time:40},
];

const phase2 = [
    {name:"Hüftöffnung links", img:"phase2.jpg", time:40},
    {name:"Hüftöffnung rechts", img:"phase2.jpg", time:40},
    {name:"Dead Bug", img:"phase2.jpg", time:40},
];

const exercises = (week === 1) ? phase1 : phase2;

// =============================
let current = localStorage.getItem("current") || 0;
current = parseInt(current);

let timeLeft = exercises[current].time;
let timer = null;

// =============================
// 🔊 AUDIO FIX (iOS!)
// =============================
let audioEnabled = false;

function enableAudio() {
    audioEnabled = true;
    speak("Audio aktiviert");
}

// 👉 WICHTIG: erster Klick aktiviert Audio
document.body.addEventListener("click", enableAudio, { once: true });

// =============================
function speak(text) {

    if (!audioEnabled) return;

    try {
        let msg = new SpeechSynthesisUtterance(text);
        msg.lang = "de-DE";
        speechSynthesis.cancel();
        speechSynthesis.speak(msg);
    } catch {
        beep();
    }
}

// =============================
// 🔔 FALLBACK SOUND
// =============================
function beep() {
    let ctx = new (window.AudioContext || window.webkitAudioContext)();
    let osc = ctx.createOscillator();
    osc.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.2);
}

// =============================
function vibrate() {
    if (navigator.vibrate) navigator.vibrate(200);
}

// =============================
function loadExercise() {

    let ex = exercises[current];

    document.getElementById("exerciseTitle").innerText = ex.name;

    document.getElementById("phaseTitle").innerText =
        (week === 1) ? "Phase 1" : "Phase 2";

    document.getElementById("exerciseImage").src = ex.img;

    if (current + 1 < exercises.length) {
        document.getElementById("nextExercise").innerText =
            "Als nächstes: " + exercises[current + 1].name;
    } else {
        document.getElementById("nextExercise").innerText = "Letzte Übung";
    }

    timeLeft = ex.time;
    updateTimer();
    updateProgress();

    speak(ex.name);

    localStorage.setItem("current", current);
}

// =============================
function updateTimer() {
    document.getElementById("timer").innerText = timeLeft;
}

// =============================
function updateProgress() {
    let percent = (current / exercises.length) * 100;
    document.getElementById("progress").style.width = percent + "%";
    document.getElementById("percent").innerText = Math.round(percent) + "%";
}

// =============================
function startTimer() {

    if (timer) return;

    speak("Start");

    timer = setInterval(() => {

        timeLeft--;
        updateTimer();

        if (timeLeft <= 0) {
            nextExercise();
        }

    }, 1000);
}

// =============================
function pauseTimer() {
    clearInterval(timer);
    timer = null;
    speak("Pause");
}

// =============================
function nextExercise() {

    clearInterval(timer);
    timer = null;

    vibrate();
    speak("Wechsel");

    current++;

    if (current >= exercises.length) {
        speak("Fertig");
        alert("Training beendet");
        resetAll();
        return;
    }

    loadExercise();
}

// =============================
function resetAll() {
    current = 0;
    localStorage.removeItem("current");
    loadExercise();
}

// =============================
loadExercise();

</script>

</body>
</html>
