<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psoas Ultra PRO ELITE+</title>

<style>
body {
    margin:0;
    font-family:Arial;
    text-align:center;
    background:#f2f2f2;
    transition:0.3s;
}

body.dark {
    background:#0b1a2f;
    color:white;
}

img {
    width:95%;
    height:40vh;
    object-fit:contain;
}

.timer {
    font-size:80px;
}

/* 👉 GROSSE SEITENANZEIGE */
.sideDisplay {
    font-size:60px;
    font-weight:bold;
    height:70px;
    margin:10px;
    opacity:0;
    transition:0.3s;
}

.sideDisplay.show {
    opacity:1;
}

button {
    padding:10px;
    margin:5px;
    border:none;
    border-radius:10px;
    color:white;
}

.start{background:green;}
.pause{background:red;}
.skip{background:orange;}
.mode{background:black;}
</style>
</head>

<body>

<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>

<div id="sideDisplay" class="sideDisplay"></div>

<img id="exerciseImage">

<div class="timer" id="timer">0</div>

<button class="start" onclick="start()">Start</button>
<button class="pause" onclick="pause()">Pause</button>
<button class="skip" onclick="next()">Skip</button>
<button class="mode" onclick="toggleMode()">Mode</button>

<script>

// =============================
let phaseIndex = localStorage.getItem("phase") ? parseInt(localStorage.getItem("phase")) : 0;
let current = localStorage.getItem("exercise") ? parseInt(localStorage.getItem("exercise")) : 0;

let timer = null;
let descriptionSpoken = false;

// =============================
const beep = new Audio("https://actions.google.com/sounds/v1/beeps/beep_short.ogg");

function vibrate(ms=100){
    if(navigator.vibrate) navigator.vibrate(ms);
}

// =============================
function save(){
    localStorage.setItem("phase", phaseIndex);
    localStorage.setItem("exercise", current);
}

// =============================
function speak(text, cb){
    speechSynthesis.cancel();
    let msg = new SpeechSynthesisUtterance(text);
    msg.lang="de-DE";
    msg.onend = ()=> setTimeout(()=> cb && cb(),300);
    speechSynthesis.speak(msg);
}

// =============================
function showSide(text){
    const el = document.getElementById("sideDisplay");
    el.innerText = text.toUpperCase();
    el.classList.add("show");

    setTimeout(()=> el.classList.remove("show"),1000);
}

// =============================
const phases = [

/* PHASE 1 */
[
{name:"Bauchatmung", img:"images/phase3.jpg", type:"time", time:120,
speech:"Rückenlage. Eine Hand auf Bauch. Fünf Sekunden ein, sieben aus."},

{name:"Knie zur Brust", img:"images/phase3.jpg", type:"side", time:45,
speech:"Ein Knie zur Brust ziehen und halten."},

{name:"Mini-Becken-Kippung", img:"images/phase3.jpg", type:"reps", reps:15,
speech:"Becken kippen und lösen."},

{name:"Hüftbeuger Dehnung", img:"images/phase3.jpg", type:"side", time:40,
speech:"Halbkniestand. Becken kippen."},

{name:"Glute Bridge", img:"images/phase3.jpg", type:"repsSlow", reps:12,
speech:"Hüfte anheben. Kurz halten."},

{name:"Adduktor Dehnung", img:"images/phase3.jpg", type:"time", time:45,
speech:"Seitlich verlagern."}
],

/* PHASE 2 */
[
{name:"Bauchatmung", img:"images/phase2.jpg", type:"time", time:60,
speech:"Tief atmen."},

{name:"Dynamische Hüftöffnung", img:"images/phase2.jpg", type:"sideSlow", reps:10,
speech:"Hüfte vor und zurück bewegen."},

{name:"Glute Bridge einbeinig", img:"images/phase2.jpg", type:"sideSlow", reps:10,
speech:"Ein Bein anheben."},

{name:"Dead Bug", img:"images/phase2.jpg", type:"alt", reps:12,
speech:"Arm Bein wechseln."},

{name:"Seitliche Ausfallschritte", img:"images/phase2.jpg", type:"altSlow", reps:10,
speech:"Seitlich bewegen."},

{name:"Adduktor Kombi", img:"images/phase2.jpg", type:"time", time:40,
speech:"Dehnung + Bewegung."}
]

];

// =============================
function start(){

    if(timer) return;

    let ex = phases[phaseIndex][current];

    beep.play();
    vibrate();

    if(!descriptionSpoken){

        descriptionSpoken = true;

        speak(ex.name, ()=>{
            speak(ex.speech, ()=>{
                run(ex);
            });
        });

    } else run(ex);
}

// =============================
function run(ex){

    if(ex.type==="time") runTime(ex);
    else if(ex.type==="reps") runReps(ex);
    else if(ex.type==="repsSlow") runRepsSlow(ex);
    else if(ex.type==="side") runSide(ex);
    else if(ex.type==="sideSlow") runSideSlow(ex);
    else if(ex.type==="alt") runAlt(ex);
    else if(ex.type==="altSlow") runAltSlow(ex);
}

// =============================
function runTime(ex){

    let t = ex.time;

    timer = setInterval(()=>{
        t--; update(t);
        if(t<=5 && t>0) speak(t);
        if(t<=0){ clearInterval(timer); next(); }
    },1000);
}

// =============================
function runReps(ex){

    let r = ex.reps;

    timer = setInterval(()=>{
        r--; update(r);
        speak(r);
        if(r<=0){ clearInterval(timer); next(); }
    },2000);
}

// =============================
function runRepsSlow(ex){

    let r = ex.reps;

    timer = setInterval(()=>{
        r--; update(r);
        speak(r);
        if(r<=0){ clearInterval(timer); next(); }
    },3000);
}

// =============================
function runSide(ex){

    let side="rechts";

    function go(){

        showSide(side);
        speak(side);

        let t = ex.time;

        let i = setInterval(()=>{
            t--; update(t);

            if(t<=0){
                clearInterval(i);

                if(side==="rechts"){
                    showSide("wechsel");
                    speak("Wechsel", ()=>{
                        side="links";
                        setTimeout(go,2000);
                    });
                } else next();
            }

        },1000);
    }

    go();
}

// =============================
function runSideSlow(ex){

    let side="rechts";

    function go(){

        showSide(side);
        speak(side);

        let r = ex.reps;

        let i = setInterval(()=>{
            r--; update(r);

            if(r<=0){
                clearInterval(i);

                if(side==="rechts"){
                    showSide("wechsel");
                    speak("Wechsel", ()=>{
                        side="links";
                        setTimeout(go,2000);
                    });
                } else next();
            }

        },3000);
    }

    go();
}

// =============================
function runAlt(ex){

    let reps=ex.reps, side="links";

    function loop(){

        showSide(side);
        speak(side);

        side=(side==="links")?"rechts":"links";

        if(side==="links") reps--;

        if(reps<=0){ next(); return; }

        setTimeout(()=> speak("Wechsel",loop),1500);
    }

    loop();
}

// =============================
function runAltSlow(ex){

    let reps=ex.reps, side="links";

    function loop(){

        showSide(side);
        speak(side);

        side=(side==="links")?"rechts":"links";

        if(side==="links") reps--;

        if(reps<=0){ next(); return; }

        setTimeout(()=> speak("Wechsel",loop),2500);
    }

    loop();
}

// =============================
function next(){

    clearInterval(timer);

    beep.play();
    vibrate();

    speak("Übung beendet", ()=>{

        current++;
        save();

        if(current >= phases[phaseIndex].length){
            alert("Training fertig 💪");
            current=0;
            phaseIndex=0;
            save();
        }

        descriptionSpoken=false;
        load();

        setTimeout(start,1500);
    });
}

// =============================
function pause(){
    clearInterval(timer);
}

// =============================
function toggleMode(){
    document.body.classList.toggle("dark");
}

// =============================
function update(val){
    document.getElementById("timer").innerText = val;
}

// =============================
function load(){

    let ex = phases[phaseIndex][current];

    document.getElementById("phaseTitle").innerText =
        "Phase " + (phaseIndex+1);

    document.getElementById("exerciseTitle").innerText = ex.name;

    document.getElementById("exerciseImage").src = ex.img;

    update(ex.time || ex.reps);
}

load();

</script>

</body>
</html>
