<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psoas Ultra ULTIMATE</title>

<style>
body { margin:0; font-family:Arial; text-align:center; background:#f2f2f2; transition:0.3s;}
body.dark { background:#0b1a2f; color:white;}

img { width:95%; height:40vh; object-fit:contain;}
.timer { font-size:80px;}

.side { font-size:50px; font-weight:bold; height:60px; }

button { padding:10px; margin:5px; border:none; border-radius:10px; color:white;}
.start{background:green;} .pause{background:red;} .skip{background:orange;}
.mode{background:black;} .sound{background:#555;}
</style>
</head>

<body>

<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>

<div id="side" class="side"></div>

<img id="exerciseImage">

<div class="timer" id="timer">0</div>

<button class="start" onclick="start()">Start</button>
<button class="pause" onclick="pause()">Pause</button>
<button class="skip" onclick="next()">Skip</button>
<button class="mode" onclick="toggleMode()">Mode</button>
<button class="sound" onclick="toggleSound()">Sound</button>
<button class="sound" onclick="toggleMusic()">Musik</button>

<script>

// =============================
// STATE
// =============================
let phaseIndex = 0;
let current = 0;
let timer = null;
let spoken = false;

let soundOn = true;
let musicOn = false;

// =============================
// AUDIO SYSTEM
// =============================
const beep = new Audio("https://actions.google.com/sounds/v1/beeps/beep_short.ogg");
const music = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3");

music.loop = true;
music.volume = 0.2;

// =============================
function playBeep(){
    if(soundOn) beep.play();
}

function speak(text, cb){

    if(!soundOn){
        cb && cb();
        return;
    }

    speechSynthesis.cancel();
    let msg = new SpeechSynthesisUtterance(text);
    msg.lang="de-DE";
    msg.onend = ()=> cb && cb();
    speechSynthesis.speak(msg);
}

// =============================
function toggleSound(){
    soundOn = !soundOn;
}

function toggleMusic(){
    musicOn = !musicOn;

    if(musicOn) music.play();
    else music.pause();
}

// =============================
// TRAINING DATA
// =============================
const phases = [

[
{name:"Bauchatmung", img:"images/phase3.jpg", type:"time", time:120,
speech:"Rückenlage. Fünf Sekunden ein, sieben aus."},

{name:"Knie zur Brust", img:"images/phase3.jpg", type:"side", time:45,
speech:"Knie zur Brust ziehen."},

{name:"Mini-Becken-Kippung", img:"images/phase3.jpg", type:"reps", reps:15,
speech:"Becken kippen."},

{name:"Hüftbeuger Dehnung", img:"images/phase3.jpg", type:"side", time:40,
speech:"Becken kippen."},

{name:"Glute Bridge", img:"images/phase3.jpg", type:"repsSlow", reps:12,
speech:"Hüfte anheben."},

{name:"Adduktor Dehnung", img:"images/phase3.jpg", type:"time", time:45,
speech:"Dehnung halten."}
],

[
{name:"Bauchatmung", img:"images/phase2.jpg", type:"time", time:60,
speech:"Atmen."},

{name:"Dynamische Hüftöffnung", img:"images/phase2.jpg", type:"sideSlow", reps:10,
speech:"Hüfte bewegen."},

{name:"Glute Bridge einbeinig", img:"images/phase2.jpg", type:"sideSlow", reps:10,
speech:"Ein Bein oben."},

{name:"Dead Bug", img:"images/phase2.jpg", type:"alt", reps:12,
speech:"Arm Bein wechseln."},

{name:"Seitliche Ausfallschritte", img:"images/phase2.jpg", type:"altSlow", reps:10,
speech:"Seitlich gehen."},

{name:"Adduktor Kombi", img:"images/phase2.jpg", type:"time", time:40,
speech:"Dehnung + Bewegung."}
]

];

// =============================
// START
// =============================
function start(){

    if(timer) return;

    let ex = phases[phaseIndex][current];

    playBeep();

    if(!spoken){
        spoken = true;

        speak(ex.name + ". " + ex.speech, ()=>{
            run(ex);
        });

    } else run(ex);
}

// =============================
function run(ex){

    if(ex.type==="time") runTime(ex);
    if(ex.type==="reps") runReps(ex);
    if(ex.type==="repsSlow") runRepsSlow(ex);
    if(ex.type==="side") runSide(ex);
    if(ex.type==="sideSlow") runSideSlow(ex);
    if(ex.type==="alt") runAlt(ex);
    if(ex.type==="altSlow") runAltSlow(ex);
}

// =============================
function runTime(ex){

    let t = ex.time;

    timer = setInterval(()=>{
        t--; update(t);

        if(t<=5 && t>0) speak(t);

        if(t<=0){
            clearInterval(timer);
            next();
        }

    },1000);
}

// =============================
function runReps(ex){

    let r = ex.reps;

    timer = setInterval(()=>{
        r--; update(r);
        speak(r);

        if(r<=0){
            clearInterval(timer);
            next();
        }

    },2000);
}

// =============================
function runRepsSlow(ex){

    let r = ex.reps;

    timer = setInterval(()=>{
        r--; update(r);
        speak(r);

        if(r<=0){
            clearInterval(timer);
            next();
        }

    },3000);
}

// =============================
function showSide(text){
    document.getElementById("side").innerText = text.toUpperCase();
}

// =============================
function runSide(ex){

    let side="rechts";

    function go(){

        showSide(side);
        speak(side);

        let t = ex.time;

        let i = setInterval(()=>{
            t--; update(t);

            if(t<=0){
                clearInterval(i);

                if(side==="rechts"){
                    speak("Wechsel", ()=>{
                        side="links";
                        setTimeout(go,2000);
                    });
                } else next();
            }

        },1000);
    }

    go();
}

// =============================
function runSideSlow(ex){

    let side="rechts";

    function go(){

        showSide(side);
        speak(side);

        let r = ex.reps;

        let i = setInterval(()=>{
            r--; update(r);

            if(r<=0){
                clearInterval(i);

                if(side==="rechts"){
                    speak("Wechsel", ()=>{
                        side="links";
                        setTimeout(go,2000);
                    });
                } else next();
            }

        },3000);
    }

    go();
}

// =============================
function runAlt(ex){

    let reps = ex.reps;
    let side = "links";

    function loop(){

        showSide(side);
        speak(side);

        side = (side === "links") ? "rechts" : "links";

        if(side === "links") reps--;

        if(reps <= 0){
            next();
            return;
        }

        setTimeout(()=> speak("Wechsel", loop),1500);
    }

    loop();
}

// =============================
function runAltSlow(ex){

    let reps = ex.reps;
    let side = "links";

    function loop(){

        showSide(side);
        speak(side);

        side = (side === "links") ? "rechts" : "links";

        if(side === "links") reps--;

        if(reps <= 0){
            next();
            return;
        }

        setTimeout(()=> speak("Wechsel", loop),2500);
    }

    loop();
}

// =============================
function next(){

    clearInterval(timer);

    playBeep();

    speak("Übung beendet", ()=>{

        current++;

        if(current >= phases[phaseIndex].length){
            saveStats();
            alert("Training fertig 💪");
            current=0;
        }

        spoken=false;
        load();

        setTimeout(start,1500);
    });
}

// =============================
function pause(){
    clearInterval(timer);
}

// =============================
function toggleMode(){
    document.body.classList.toggle("dark");
}

// =============================
function update(val){
    document.getElementById("timer").innerText = val;
}

// =============================
// STATISTIK
// =============================
function saveStats(){

    let count = localStorage.getItem("trainings") || 0;
    count++;

    localStorage.setItem("trainings", count);
    localStorage.setItem("lastTraining", new Date().toLocaleDateString());
}

// =============================
function load(){

    let ex = phases[phaseIndex][current];

    document.getElementById("phaseTitle").innerText =
        "Phase " + (phaseIndex+1);

    document.getElementById("exerciseTitle").innerText = ex.name;

    document.getElementById("exerciseImage").src = ex.img;

    update(ex.time || ex.reps);
}

load();

</script>

</body>
</html>
