<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psoas Ultra PRO</title>

<link rel="manifest" href="manifest.json">

<style>
body{
    margin:0;
    font-family:-apple-system, Arial;
    text-align:center;
    background:#f2f2f2;
}

body.dark{
    background:#0b1a2f;
    color:white;
}

img{
    width:95%;
    height:30vh;
    object-fit:contain;
}

.timer{
    font-size:90px;
    font-weight:bold;
}

.progress{
    width:90%;
    height:10px;
    background:#ddd;
    margin:10px auto;
    border-radius:10px;
    overflow:hidden;
}

.bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,purple,deeppink);
}

.stats{
    font-size:14px;
    opacity:0.7;
}

button{
    padding:12px;
    margin:5px;
    border:none;
    border-radius:10px;
    color:white;
}

.start{background:green;}
.pause{background:red;}
.skip{background:orange;}
.mode{background:black;}
</style>
</head>

<body>

<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>

<img id="exerciseImage">

<div class="progress"><div id="bar" class="bar"></div></div>

<div id="timer" class="timer">0</div>
<div id="side"></div>

<div class="stats" id="stats"></div>

<button class="start" onclick="start()">Start</button>
<button class="pause" onclick="pause()">Pause</button>
<button class="skip" onclick="next()">Skip</button>
<button class="mode" onclick="toggleMode()">Mode</button>

<br>

<button onclick="setPhase(1)">Training 1</button>
<button onclick="setPhase(2)">Training 2</button>
<button onclick="setPhase(3)">Training 3</button>

<script>

// =============================
// STATE
let phaseIndex=0, current=0, timer=null;
let running=false;

// =============================
// 🔥 STORAGE SYSTEM
let data = JSON.parse(localStorage.getItem("psoasData")) || {
    workouts:0,
    totalTime:0,
    streak:0,
    lastDate:null
};

// =============================
// 📊 UPDATE STATS
function updateStats(){
    document.getElementById("stats").innerText =
        "Trainings: " + data.workouts +
        " | Zeit: " + Math.floor(data.totalTime/60) + " min" +
        " | Streak: " + data.streak + " Tage";
}

// =============================
// 🔥 STREAK LOGIK
function updateStreak(){

    let today = new Date().toDateString();

    if(data.lastDate !== today){

        let yesterday = new Date();
        yesterday.setDate(yesterday.getDate()-1);

        if(data.lastDate === yesterday.toDateString()){
            data.streak++;
        } else {
            data.streak = 1;
        }

        data.lastDate = today;
    }
}

// =============================
// DARK MODE
function toggleMode(){
    document.body.classList.toggle("dark");
}

// =============================
// AUDIO
function speak(text){
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang="de-DE";
    speechSynthesis.speak(msg);
}

// =============================
async function start(){

    if(running) return;
    running=true;

    let ex = phases[phaseIndex][current];

    speak(ex.name);

    await sleep(300);

    for(let i=3;i>0;i--){
        update(i);
        await sleep(1000);
    }

    run(ex);
}

// =============================
function run(ex){

    let t=ex.time;

    timer=setInterval(()=>{

        t--;
        update(t);
        updateBar(t, ex.time);

        data.totalTime++;

        if(t<=0) next();

    },1000);
}

// =============================
function next(){

    clearInterval(timer);

    current++;

    if(current >= phases[phaseIndex].length){

        finishWorkout();
        return;
    }

    load();
    start();
}

// =============================
// 🏁 WORKOUT ENDE
function finishWorkout(){

    speak("Training beendet");

    data.workouts++;
    updateStreak();

    localStorage.setItem("psoasData", JSON.stringify(data));

    updateStats();

    alert("Stark 💪 Streak: " + data.streak);

    current=0;
}

// =============================
function updateBar(t,total){
    let p=(1-t/total)*100;
    document.getElementById("bar").style.width=p+"%";
}

// =============================
function update(v){
    document.getElementById("timer").innerText=v;
}

// =============================
function pause(){
    clearInterval(timer);
    running=false;
}

// =============================
function setPhase(p){
    phaseIndex=p-1;
    current=0;
    load();
}

// =============================
function load(){

    let ex = phases[phaseIndex][current];

    document.getElementById("phaseTitle").innerText="Training "+(phaseIndex+1);
    document.getElementById("exerciseTitle").innerText=ex.name;
    document.getElementById("exerciseImage").src=ex.img;

    update(ex.time);
    document.getElementById("bar").style.width="0%";

    updateStats();
}

// =============================
function sleep(ms){
    return new Promise(r=>setTimeout(r,ms));
}

// =============================
// 🧠 AUTO TRAININGSPLAN
function autoPlan(){

    let day = new Date().getDay();

    if(day===1) phaseIndex=0; // Montag
    if(day===3) phaseIndex=1; // Mittwoch
    if(day===5) phaseIndex=2; // Freitag
}

// =============================
// 🔔 BASIC REMINDER
setInterval(()=>{
    let hour = new Date().getHours();

    if(hour===18){
        speak("Zeit für dein Training");
    }
},60000);

</script>
