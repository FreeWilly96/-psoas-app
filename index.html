<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psoas Ultra FINAL</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(#0b1a2f, #0f2c50);
    color: white;
    text-align: center;
}

img {
    width: 90%;
    max-width: 500px;
    border-radius: 12px;
    margin: 20px auto;
}

.timer {
    font-size: 70px;
}

button {
    padding: 12px 18px;
    margin: 5px;
    border-radius: 10px;
    border: none;
}

.start { background: green; }
.pause { background: red; }
.skip { background: orange; }

</style>
</head>

<body>

<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>
<p id="nextExercise"></p>

<img id="exerciseImage">

<div class="timer" id="timer">40</div>

<button class="start" onclick="startTimer()">Start</button>
<button class="pause" onclick="pauseTimer()">Pause</button>
<button class="skip" onclick="nextExercise()">Skip</button>

<script>

// =============================
// 👉 IMMER PHASE 1 START
// =============================
let week = 1;

// =============================
// ÜBUNGEN
// =============================
const phase1 = [
    {name:"Bauchatmung", img:"phase1.jpg", time:60},
    {name:"Knie zur Brust links", img:"phase1.jpg", time:40},
    {name:"Knie zur Brust rechts", img:"phase1.jpg", time:40},
    {name:"Mini-Becken-Kippung", img:"phase1.jpg", time:40},
];

const phase2 = [
    {name:"Hüftöffnung links", img:"phase2.jpg", time:40},
    {name:"Hüftöffnung rechts", img:"phase2.jpg", time:40},
    {name:"Dead Bug", img:"phase2.jpg", time:40},
];

// 👉 PHASE AUTOMATIK
const exercises = (week === 1) ? phase1 : phase2;

// =============================
let current = 0;
let timeLeft = exercises[current].time;
let timer = null;

// =============================
// 🔊 SPRACHE (iOS FIX)
// =============================
function speak(text) {
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "de-DE";

    speechSynthesis.cancel();

    setTimeout(() => {
        speechSynthesis.speak(msg);
    }, 100);
}

// =============================
function startTimer() {

    if (timer) return;

    speak("Start");

    timer = setInterval(() => {

        timeLeft--;
        document.getElementById("timer").innerText = timeLeft;

        if (timeLeft <= 0) nextExercise();

    }, 1000);
}

// =============================
function pauseTimer() {
    clearInterval(timer);
    timer = null;
    speak("Pause");
}

// =============================
function nextExercise() {

    clearInterval(timer);
    timer = null;

    speak("Wechsel");

    current++;

    if (current >= exercises.length) {
        alert("Fertig!");
        current = 0;
    }

    loadExercise();
}

// =============================
function loadExercise() {

    let ex = exercises[current];

    document.getElementById("exerciseTitle").innerText = ex.name;
    document.getElementById("phaseTitle").innerText =
        (week === 1) ? "Phase 1" : "Phase 2";

    if (current + 1 < exercises.length) {
        document.getElementById("nextExercise").innerText =
            "Als nächstes: " + exercises[current + 1].name;
    } else {
        document.getElementById("nextExercise").innerText =
            "Letzte Übung";
    }

    // =============================
    // 🖼️ IMAGE MIT FALLBACK
    // =============================
    let img = document.getElementById("exerciseImage");

    img.src = ex.img;

    img.onerror = function() {
        img.src = "";
        console.log("Bild fehlt:", ex.img);
    };

    timeLeft = ex.time;
    document.getElementById("timer").innerText = timeLeft;
}

// =============================
loadExercise();

</script>

</body>
</html>
