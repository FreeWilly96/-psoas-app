<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Psoas Ultra PRO</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Psoas Ultra">

<link rel="apple-touch-icon" sizes="180x180" href="images/icon.png?v=4">
<link rel="icon" href="images/icon.png?v=4">
<link rel="manifest" href="manifest.json">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(#0b1a2f, #0f2c50);
    color: white;
    text-align: center;
}

.container {
    height: 100vh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

img {
    width: 100%;
    height: 50vh;
    object-fit: contain;
    border-radius: 16px;
}

.timer {
    font-size: 90px;
    font-weight: bold;
}

.progress {
    width: 85%;
    height: 12px;
    background: #333;
    margin: 10px auto;
    border-radius: 10px;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: limegreen;
}

button {
    padding: 12px;
    margin: 4px;
    border-radius: 10px;
    border: none;
    color: white;
}

.start { background: green; }
.pause { background: red; }
.skip { background: orange; }
.reset { background: gray; }
.phase { background: purple; }

.controls {
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">

<div>
<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>
<p id="nextExercise"></p>
<p id="dayInfo"></p>
</div>

<img id="exerciseImage">

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<div class="timer" id="timer">0</div>

<div class="controls">
<button class="start" onclick="startTimer()">Start</button>
<button class="pause" onclick="pauseTimer()">Pause</button>
<button class="skip" onclick="nextExercise()">Skip</button>
<button class="reset" onclick="resetAll()">Reset</button>
<button class="phase" onclick="setPhase(1)">Phase 1</button>
<button class="phase" onclick="setPhase(2)">Phase 2</button>
</div>

</div>

<script>

// =============================
// 🔊 SOUND ENGINE
// =============================
const soundStart = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
const soundSwitch = new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");
const soundEnd = new Audio("https://actions.google.com/sounds/v1/cartoon/concussive_drum_hit.ogg");

// =============================
// 📅 DAILY PLAN
// =============================
const today = new Date().getDay(); // 0=Sonntag

// 👉 automatisch Phase wählen
let phaseIndex = (today % 2 === 0) ? 0 : 1;

// =============================
// 💾 PROGRESS SPEICHERN
// =============================
let current = localStorage.getItem("current") ? parseInt(localStorage.getItem("current")) : 0;
let savedPhase = localStorage.getItem("phase");

if (savedPhase !== null) {
    phaseIndex = parseInt(savedPhase);
}

// =============================
let timer = null;
let timeLeft = 0;

// =============================
// 📦 ÜBUNGEN
// =============================
const phases = [

[
{ name:"Bauchatmung", img:"images/phase1.jpg", time:120, speech:"Bauchatmung. Tief ein und ausatmen." },
{ name:"Knie zur Brust", img:"images/phase1.jpg", time:45, speech:"Knie zur Brust ziehen und halten." },
{ name:"Mini-Becken-Kippung", img:"images/phase1.jpg", time:40, speech:"Becken kippen und lösen." },
{ name:"Hüftbeuger Dehnung", img:"images/phase1.jpg", time:40, speech:"Hüftbeuger dehnen." },
{ name:"Glute Bridge", img:"images/phase1.jpg", time:40, speech:"Hüfte anheben und halten." },
{ name:"Adduktor Dehnung", img:"images/phase1.jpg", time:45, speech:"Dehnung in der Leiste." }
],

[
{ name:"Bauchatmung", img:"images/phase2.jpg", time:60, speech:"Aktivierende Atmung." },
{ name:"Dynamische Hüftöffnung", img:"images/phase2.jpg", time:40, speech:"Hüfte vor und zurück." },
{ name:"Glute Bridge einbeinig", img:"images/phase2.jpg", time:40, speech:"Einbeinige Bridge." },
{ name:"Dead Bug", img:"images/phase2.jpg", time:40, speech:"Stabil bewegen." },
{ name:"Seitliche Ausfallschritte", img:"images/phase2.jpg", time:40, speech:"Seitlich bewegen." },
{ name:"Adduktor & Hüfte Kombi", img:"images/phase2.jpg", time:40, speech:"Dehnen und aktivieren." }
]

];

// =============================
// 🔊 SPRACHE
// =============================
function speak(text, callback) {
    speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "de-DE";

    msg.onend = () => {
        if (callback) callback();
    };

    speechSynthesis.speak(msg);
}

// =============================
function startTimer() {

    if (timer) return;

    const ex = phases[phaseIndex][current];

    soundStart.play();

    speak(ex.speech, () => {
        startRealTimer();
    });
}

// =============================
function startRealTimer() {

    timer = setInterval(() => {

        timeLeft--;
        updateUI();

        if (timeLeft <= 0) nextExercise();

    }, 1000);
}

// =============================
function pauseTimer() {
    clearInterval(timer);
    timer = null;
}

// =============================
function nextExercise() {

    clearInterval(timer);
    timer = null;

    soundSwitch.play();

    current++;

    if (current >= phases[phaseIndex].length) {

        soundEnd.play();

        localStorage.removeItem("current");
        alert("Training fertig 💪");
        resetAll();
        return;
    }

    saveProgress();
    loadExercise();
}

// =============================
function saveProgress() {
    localStorage.setItem("current", current);
    localStorage.setItem("phase", phaseIndex);
}

// =============================
function resetAll() {
    clearInterval(timer);
    current = 0;
    saveProgress();
    loadExercise();
}

// =============================
function setPhase(p) {
    phaseIndex = p - 1;
    current = 0;
    saveProgress();
    loadExercise();
}

// =============================
function updateUI() {

    const total = phases[phaseIndex][current].time;
    const progress = ((total - timeLeft) / total) * 100;

    document.getElementById("timer").innerText = timeLeft;
    document.getElementById("progressBar").style.width = progress + "%";
}

// =============================
function loadExercise() {

    const ex = phases[phaseIndex][current];

    document.getElementById("phaseTitle").innerText = "Phase " + (phaseIndex + 1);
    document.getElementById("exerciseTitle").innerText = ex.name;

    document.getElementById("dayInfo").innerText =
        "Tagesplan: " + (today % 2 === 0 ? "Regeneration" : "Aktivierung");

    if (current + 1 < phases[phaseIndex].length) {
        document.getElementById("nextExercise").innerText =
            "Als nächstes: " + phases[phaseIndex][current + 1].name;
    } else {
        document.getElementById("nextExercise").innerText = "Letzte Übung";
    }

    document.getElementById("exerciseImage").src = ex.img;

    timeLeft = ex.time;
    updateUI();
}

// =============================
loadExercise();

</script>

</body>
</html>
