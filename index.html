<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psoas Ultra PRO</title>

<style>
body { margin:0; font-family:Arial; text-align:center; background:#f2f2f2; transition:0.3s;}
body.dark { background:#0b1a2f; color:white;}

img { width:95%; height:40vh; object-fit:contain;}
.timer { font-size:80px;}
.side { font-size:40px; font-weight:bold; height:50px;}

button { padding:10px; margin:5px; border:none; border-radius:10px; color:white;}
.start{background:green;}
.pause{background:red;}
.skip{background:orange;}
.mode{background:black;}
.phase{background:#777;}
.phase.active{background:purple;}
</style>
</head>

<body>

<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>

<div id="side" class="side"></div>

<img id="exerciseImage">

<div class="timer" id="timer">0</div>

<div>
<button class="start" onclick="start()">Start</button>
<button class="pause" onclick="pause()">Pause</button>
<button class="skip" onclick="skip()">Skip</button>
<button class="mode" onclick="toggleMode()">Mode</button>
</div>

<div>
<button id="p1" class="phase" onclick="setPhase(1)">Phase 1</button>
<button id="p2" class="phase" onclick="setPhase(2)">Phase 2</button>
</div>

<script>

// =============================
// STATE ENGINE
// =============================
let phaseIndex = 0;
let current = 0;

let mode = "idle"; 
// idle | explain | countdown | exercise | rest | sideSwitch

let timer = null;
let value = 0;
let side = "rechts";
let reps = 0;

// =============================
// SPEECH
// =============================
function speak(text, cb){
    speechSynthesis.cancel();
    let msg = new SpeechSynthesisUtterance(text);
    msg.lang="de-DE";
    msg.onend = ()=> cb && cb();
    speechSynthesis.speak(msg);
}

// =============================
function updatePhaseUI(){
    p1.classList.remove("active");
    p2.classList.remove("active");
    (phaseIndex===0?p1:p2).classList.add("active");
}

// =============================
function setPhase(p){
    stopAll();
    phaseIndex = p-1;
    current = 0;
    load();
}

// =============================
function toggleMode(){
    document.body.classList.toggle("dark");
}

// =============================
const phases = [

/* ================= PHASE 1 ================= */
[
{name:"Bauchatmung", img:"images/phase3.jpg", type:"time", time:120,
speech:"Rückenlage. Füße aufgestellt. Eine Hand auf den Bauch, eine auf die Brust. Fünf Sekunden ein, sieben Sekunden aus."},

{name:"Knie zur Brust", img:"images/phase3.jpg", type:"sideTime", time:45,
speech:"Ein Knie zur Brust ziehen. Anderes Bein entspannt lassen."},

{name:"Mini Becken Kippung", img:"images/phase3.jpg", type:"reps", reps:15,
speech:"Becken kippen. Unteren Rücken in den Boden drücken."},

{name:"Hüftbeuger Dehnung", img:"images/phase3.jpg", type:"sideTime", time:40,
speech:"Halbkniestand. Becken kippen. Gesäß anspannen."},

{name:"Glute Bridge", img:"images/phase3.jpg", type:"repsSlow", reps:12,
speech:"Hüfte hoch. Zwei Sekunden halten. Langsam absenken."},

{name:"Adduktor Dehnung", img:"images/phase3.jpg", type:"time", time:45,
speech:"Breiter Stand. Gewicht zur Seite verlagern."}
],

/* ================= PHASE 2 ================= */
[
{name:"Bauchatmung", img:"images/phase2.jpg", type:"time", time:60,
speech:"Ruhig in den Bauch atmen und Spannung aufbauen."},

{name:"Dynamische Hüftöffnung", img:"images/phase2.jpg", type:"sideReps", reps:10,
speech:"Ausfallschritt. Hüfte vor und zurück bewegen."},

{name:"Glute Bridge einbeinig", img:"images/phase2.jpg", type:"sideRepsSlow", reps:10,
speech:"Ein Bein oben halten. Hüfte hoch und langsam absenken."},

{name:"Dead Bug", img:"images/phase2.jpg", type:"alt", reps:12,
speech:"Gegengleich Arm und Bein bewegen. Rumpf stabil halten."},

{name:"Seitliche Ausfallschritte", img:"images/phase2.jpg", type:"altSlow", reps:10,
speech:"Seitlich treten und kontrolliert zurück."},

{name:"Adduktor Hüfte Kombi", img:"images/phase2.jpg", type:"time", time:40,
speech:"Dehnung halten und kleine Bewegungen machen."}
]

];

// =============================
// START FLOW
// =============================
function start(){

    if(mode !== "idle" && mode !== "rest") return;

    explainExercise();
}

// =============================
function explainExercise(){

    let ex = phases[phaseIndex][current];

    mode = "explain";

    speak(ex.name + ". " + ex.speech, ()=>{
        startCountdown();
    });
}

// =============================
function startCountdown(){

    mode = "countdown";
    let c = 3;

    timer = setInterval(()=>{
        document.getElementById("timer").innerText = c;
        speak(c);
        c--;

        if(c === 0){
            clearInterval(timer);
            runExercise();
        }

    },1000);
}

// =============================
function runExercise(){

    let ex = phases[phaseIndex][current];
    mode = "exercise";

    if(ex.type==="time") runTime(ex);
    if(ex.type==="reps") runReps(ex,2000);
    if(ex.type==="repsSlow") runReps(ex,3000);
    if(ex.type==="sideTime") runSideTime(ex);
    if(ex.type==="sideReps") runSideReps(ex,2000);
    if(ex.type==="sideRepsSlow") runSideReps(ex,3000);
    if(ex.type==="alt") runAlt(ex,1500);
    if(ex.type==="altSlow") runAlt(ex,2500);
}

// =============================
function runTime(ex){
    value = ex.time;

    timer = setInterval(()=>{
        value--;
        update(value);

        if(value<=5 && value>0) speak(value);

        if(value<=0) finishExercise();

    },1000);
}

// =============================
function runReps(ex, speed){
    value = ex.reps;

    timer = setInterval(()=>{
        value--;
        update(value);
        speak(value);

        if(value<=0) finishExercise();

    },speed);
}

// =============================
function runSideTime(ex){

    side = "rechts";
    doSideTime(ex);
}

function doSideTime(ex){

    document.getElementById("side").innerText = side;
    speak(side);

    value = ex.time;

    timer = setInterval(()=>{
        value--;
        update(value);

        if(value<=0){
            clearInterval(timer);

            if(side==="rechts"){
                side="links";
                mode="sideSwitch";
                speak("Wechsel", ()=> setTimeout(()=>doSideTime(ex),1000));
            } else finishExercise();
        }

    },1000);
}

// =============================
function runSideReps(ex, speed){

    side="rechts";
    doSideReps(ex, speed);
}

function doSideReps(ex, speed){

    document.getElementById("side").innerText = side;
    speak(side);

    value = ex.reps;

    timer = setInterval(()=>{
        value--;
        update(value);

        if(value<=0){
            clearInterval(timer);

            if(side==="rechts"){
                side="links";
                speak("Wechsel", ()=> setTimeout(()=>doSideReps(ex, speed),1000));
            } else finishExercise();
        }

    },speed);
}

// =============================
function runAlt(ex, speed){

    reps = ex.reps;
    side = "links";

    function loop(){

        document.getElementById("side").innerText = side;
        speak(side);

        side = side==="links"?"rechts":"links";

        if(side==="links") reps--;

        if(reps<=0){
            finishExercise();
            return;
        }

        timer = setTimeout(()=>{
            speak("Wechsel", loop);
        },speed);
    }

    loop();
}

// =============================
function finishExercise(){

    stopAll();

    startRest();
}

// =============================
function startRest(){

    mode = "rest";

    let nextEx = phases[phaseIndex][current+1];

    if(!nextEx){
        alert("Training fertig 💪");
        current = 0;
        load();
        return;
    }

    value = 15;

    speak("Pause. Nächste Übung " + nextEx.name);

    timer = setInterval(()=>{
        value--;
        update(value);

        if(value<=0){
            clearInterval(timer);
            current++;
            load();
            explainExercise();
        }

    },1000);
}

// =============================
function skip(){
    stopAll();
    current++;
    load();
}

// =============================
function pause(){
    stopAll();
}

// =============================
function stopAll(){
    clearInterval(timer);
    clearTimeout(timer);
    timer=null;
    mode="idle";
}

// =============================
function update(val){
    document.getElementById("timer").innerText = val;
}

// =============================
function load(){

    let ex = phases[phaseIndex][current];

    document.getElementById("phaseTitle").innerText =
        "Phase " + (phaseIndex+1);

    document.getElementById("exerciseTitle").innerText = ex.name;

    document.getElementById("exerciseImage").src = ex.img;

    document.getElementById("side").innerText = "";

    update(ex.time || ex.reps);

    updatePhaseUI();
}

// =============================
load();

</script>

</body>
</html>
