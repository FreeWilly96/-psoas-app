<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Psoas Ultra PRO</title>

<!-- 📱 APP MODE -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Psoas Ultra">

<!-- 🔥 ICON FIX -->
<link rel="apple-touch-icon" sizes="180x180" href="images/icon.png?v=3">
<link rel="icon" href="images/icon.png?v=3">

<!-- 📦 MANIFEST -->
<link rel="manifest" href="manifest.json">

<!-- 🎨 SPLASHSCREEN (iOS Trick) -->
<link rel="apple-touch-startup-image" href="images/icon.png">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(#0b1a2f, #0f2c50);
    color: white;
    text-align: center;
}

.container {
    height: 100vh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

/* 🔥 BILD GROSS + APP LOOK */
img {
    width: 100%;
    height: 50vh;
    object-fit: contain;
    border-radius: 16px;
    margin: 10px auto;
}

.timer {
    font-size: 90px;
    font-weight: bold;
}

.progress {
    width: 85%;
    height: 12px;
    background: #333;
    margin: 10px auto;
    border-radius: 10px;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: limegreen;
    border-radius: 10px;
}

button {
    padding: 12px 18px;
    margin: 5px;
    border-radius: 12px;
    border: none;
    color: white;
    font-size: 14px;
}

.start { background: #00c853; }
.pause { background: #ff1744; }
.skip { background: #ff9100; }
.reset { background: gray; }
.phase { background: purple; }

.controls {
    margin-bottom: 15px;
}
</style>
</head>

<body>

<div class="container">

<div>
<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>
<p id="nextExercise"></p>
</div>

<img id="exerciseImage">

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<div class="timer" id="timer">0</div>

<div class="controls">
<button class="start" onclick="startTimer()">Start</button>
<button class="pause" onclick="pauseTimer()">Pause</button>
<button class="skip" onclick="nextExercise()">Skip</button>
<button class="reset" onclick="resetAll()">Reset</button>
<button class="phase" onclick="setPhase(1)">Phase 1</button>
<button class="phase" onclick="setPhase(2)">Phase 2</button>
</div>

</div>

<script>

// =============================
// 🔥 STATE
// =============================
let phaseIndex = 0;
let current = 0;
let timer = null;
let timeLeft = 0;

// =============================
// 📦 ÜBUNGEN
// =============================
const phases = [

[
{
name:"Bauchatmung",
img:"images/phase1.jpg",
time:120,
speech:"Bauchatmung. Rückenlage. Füße aufgestellt. Eine Hand auf Bauch, eine auf Brust. Fünf Sekunden ein, sieben Sekunden aus."
},
{
name:"Knie zur Brust",
img:"images/phase1.jpg",
time:45,
speech:"Knie zur Brust. Ein Knie zur Brust ziehen und halten. Ruhig atmen."
},
{
name:"Mini-Becken-Kippung",
img:"images/phase1.jpg",
time:40,
speech:"Becken kippen. Rücken in den Boden drücken und lösen."
},
{
name:"Hüftbeuger Dehnung",
img:"images/phase1.jpg",
time:40,
speech:"Hüftbeuger dehnen. Becken kippen. Spannung halten."
},
{
name:"Glute Bridge",
img:"images/phase1.jpg",
time:40,
speech:"Glute Bridge. Hüfte anheben. Gesäß anspannen."
},
{
name:"Adduktor Dehnung",
img:"images/phase1.jpg",
time:45,
speech:"Adduktor Dehnung. Gewicht zur Seite verlagern."
}
],

[
{
name:"Bauchatmung",
img:"images/phase2.jpg",
time:60,
speech:"Bauchatmung zur Aktivierung."
},
{
name:"Dynamische Hüftöffnung",
img:"images/phase2.jpg",
time:40,
speech:"Hüfte vor und zurück bewegen."
},
{
name:"Glute Bridge einbeinig",
img:"images/phase2.jpg",
time:40,
speech:"Einbeinige Glute Bridge. Stabil halten."
},
{
name:"Dead Bug",
img:"images/phase2.jpg",
time:40,
speech:"Dead Bug. Gegengleich bewegen."
},
{
name:"Seitliche Ausfallschritte",
img:"images/phase2.jpg",
time:40,
speech:"Seitlich ausfallen. Hüfte nach hinten."
},
{
name:"Adduktor & Hüfte Kombi",
img:"images/phase2.jpg",
time:40,
speech:"Dehnung halten und kleine Bewegungen."
}
]

];

// =============================
// 🔊 SPRACHE (FIX iOS)
// =============================
function speak(text, callback) {

    speechSynthesis.cancel();

    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "de-DE";

    msg.onend = () => {
        if (callback) callback();
    };

    speechSynthesis.speak(msg);
}

// =============================
function startTimer() {

    if (timer) return;

    const ex = phases[phaseIndex][current];

    // 👉 Erst Ansage dann Start
    speak(ex.speech, () => {
        startRealTimer();
    });
}

// =============================
function startRealTimer() {

    timer = setInterval(() => {

        timeLeft--;
        updateUI();

        if (timeLeft <= 0) nextExercise();

    }, 1000);
}

// =============================
function pauseTimer() {
    clearInterval(timer);
    timer = null;
    speak("Pause");
}

// =============================
function nextExercise() {

    clearInterval(timer);
    timer = null;

    current++;

    if (current >= phases[phaseIndex].length) {
        alert("Fertig 💪");
        resetAll();
        return;
    }

    loadExercise();
}

// =============================
function resetAll() {
    clearInterval(timer);
    phaseIndex = 0;
    current = 0;
    loadExercise();
}

// =============================
function setPhase(p) {
    phaseIndex = p - 1;
    current = 0;
    loadExercise();
}

// =============================
function updateUI() {

    const total = phases[phaseIndex][current].time;
    const progress = ((total - timeLeft) / total) * 100;

    document.getElementById("timer").innerText = timeLeft;
    document.getElementById("progressBar").style.width = progress + "%";
}

// =============================
function loadExercise() {

    const ex = phases[phaseIndex][current];

    document.getElementById("phaseTitle").innerText =
        "Phase " + (phaseIndex + 1);

    document.getElementById("exerciseTitle").innerText = ex.name;

    if (current + 1 < phases[phaseIndex].length) {
        document.getElementById("nextExercise").innerText =
            "Als nächstes: " + phases[phaseIndex][current + 1].name;
    } else {
        document.getElementById("nextExercise").innerText = "Letzte Übung";
    }

    let img = document.getElementById("exerciseImage");
    img.src = ex.img;

    img.onerror = () => {
        console.log("Bild fehlt:", ex.img);
    };

    timeLeft = ex.time;
    updateUI();
}

// =============================
loadExercise();

</script>

</body>
</html>
