<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psoas Ultra PRO v12</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(#0b1a2f, #0f2c50);
    color: white;
    text-align: center;
}

img {
    width: 90%;
    max-width: 500px;
    border-radius: 12px;
    margin: 20px auto;
}

.timer {
    font-size: 70px;
}

.progress {
    width: 80%;
    height: 10px;
    background: #333;
    margin: 10px auto;
    border-radius: 10px;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: limegreen;
}

button {
    padding: 12px 18px;
    margin: 5px;
    border-radius: 10px;
    border: none;
}

.start { background: green; color:white; }
.pause { background: red; color:white; }
.skip { background: orange; color:white; }
.reset { background: gray; color:white; }
.phase { background: blue; color:white; }

</style>
</head>

<body>

<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>
<p id="nextExercise"></p>

<img id="exerciseImage">

<div class="progress">
    <div class="progress-bar" id="progressBar"></div>
</div>

<div class="timer" id="timer">0</div>

<button class="start" onclick="startTimer()">Start</button>
<button class="pause" onclick="pauseTimer()">Pause</button>
<button class="skip" onclick="nextExercise()">Skip</button>
<button class="reset" onclick="resetAll()">Reset</button>
<button class="phase" onclick="goPhase2()">Phase 2</button>

<script>

// =============================
let phaseIndex = 0;
let current = 0;
let timer = null;
let timeLeft = 0;

// =============================
// 🔊 Sprache (Queue)
function speakSequence(lines) {

    speechSynthesis.cancel();

    let i = 0;

    function speakNext() {
        if (i >= lines.length) return;

        const msg = new SpeechSynthesisUtterance(lines[i]);
        msg.lang = "de-DE";

        msg.onend = () => {
            i++;
            speakNext();
        };

        speechSynthesis.speak(msg);
    }

    speakNext();
}

// =============================
// 👉 PHASES

const phases = [

"Langsam in den Bauch atmen",
"Brust bleibt ruhig",
"5 Sekunden einatmen",
"7 Sekunden ausatmen"
]
},
{
name:"Knie zur Brust links",
img:"images/phase1.jpg",
time:45,
speech:[
"Knie zur Brust links",
"Rückenlage",
"Ein Knie zur Brust ziehen",
"Anderes Bein bleibt gestreckt",
"Tief weiter atmen",
"Entspannen"
]
},
{
name:"Knie zur Brust rechts",
img:"images/phase1.jpg",
time:45,
speech:[
"Knie zur Brust rechts",
"Rückenlage",
"Ein Knie zur Brust ziehen",
"Anderes Bein bleibt gestreckt",
"Tief weiter atmen",
"Entspannen"
]
},
{
name:"Mini Becken Kippung",
img:"images/phase1.jpg",
time:40,
speech:[
"Mini Becken Kippung",
"Rückenlage, Füße aufgestellt",
"Unterer Rücken in den Boden drücken",
"Becken kippt nach hinten",
"Spannung kurz halten",
"Kleine ruhige Bewegung"
]
},
{
name:"Hüftbeuger Dehnung",
img:"images/phase1.jpg",
time:40,
speech:[
"Hüftbeuger Dehnung",
"Halbkniestand",
"Gesäß anspannen",
"Becken leicht nach hinten kippen",
"Oberkörper aufrecht",
"Dehnung vorne in der Hüfte spüren"
]
},
{
name:"Glute Bridge",
img:"images/phase1.jpg",
time:40,
speech:[
"Glute Bridge",
"Füße hüftbreit aufstellen",
"Hüfte nach oben drücken",
"Gesäß anspannen",
"2 Sekunden halten",
"Langsam absenken"
]
},
{
name:"Adduktor Dehnung",
img:"images/phase1.jpg",
time:45,
speech:[
"Adduktor Dehnung",
"Breiten Stand einnehmen",
"Gewicht zur Seite verlagern",
"Andere Seite bleibt gestreckt",
"Rücken gerade halten",
"Dehnung spüren"
]
}
],

/* ================= PHASE 2 ================= */
[
{
name:"Bauchatmung",
img:"images/phase2.jpg",
time:40,
speech:[
"Bauchatmung",
"Tief in den Bauch atmen",
"Langsam ausatmen"
]
},
{
name:"Dynamische Hüftöffnung",
img:"images/phase2.jpg",
time:40,
speech:[
"Dynamische Hüftöffnung",

]
},
{
name:"Glute Bridge einbeinig",

time:40,
speech:[
"Glute Bridge einbeinig",

]
},
{
name:"Dead Bug",
img:"images/phase2.jpg",
time:40,
speech:[
"Dead Bug",
"Arme nach oben",

]
},
{
name:"Seitliche Ausfallschritte",
img:"images/phase2.jpg",
time:40,
speech:[
"Seitliche Ausfallschritte",

"Ein Bein beugen",
"Anderes gestreckt"
]
},
{
name:"Adduktor Hüfte kombinieren",
img:"images/phase2.jpg",
time:40,
speech:[
"Adduktor und Hüfte kombinieren",
"Seitliche Dehnung",

]

]

];

// =============================
function startTimer() {

if (timer) return;

let count = 3;

const cd = setInterval(() => {

document.getElementById("timer").innerText = count;
speakSequence([count.toString()]);

count--;

if (count === 0) {
clearInterval(cd);
startRealTimer();
}

}, 1000);
}

// =============================
function startRealTimer() {

timer = setInterval(() => {

timeLeft--;
updateUI();

if (timeLeft <= 0) nextExercise();

}, 1000);
}

// =============================
function pauseTimer() {
clearInterval(timer);
timer = null;
speakSequence(["Pause"]);
}

// =============================
function nextExercise() {

clearInterval(timer);
timer = null;

current++;

if (current >= phases[phaseIndex].length) {

phaseIndex++;

if (phaseIndex >= phases.length) {
alert("Fertig 💪");
resetAll();
return;
}

current = 0;
speakSequence(["Phase 2"]);
}

loadExercise();
}

// =============================
function resetAll() {

clearInterval(timer);

phaseIndex = 0;
current = 0;

loadExercise();
}

// =============================
function goPhase2() {

clearInterval(timer);

phaseIndex = 1;
current = 0;

speakSequence(["Phase 2"]);

loadExercise();
}

// =============================
function updateUI() {

const total = phases[phaseIndex][current].time;
const progress = ((total - timeLeft) / total) * 100;

document.getElementById("timer").innerText = timeLeft;
document.getElementById("progressBar").style.width = progress + "%";
}

// =============================
function loadExercise() {

const ex = phases[phaseIndex][current];

document.getElementById("phaseTitle").innerText =
"Phase " + (phaseIndex + 1);

document.getElementById("exerciseTitle").innerText = ex.name;

speakSequence(ex.speech);

if (current + 1 < phases[phaseIndex].length) {
document.getElementById("nextExercise").innerText =
"Als nächstes: " + phases[phaseIndex][current + 1].name;
} else {
document.getElementById("nextExercise").innerText =
(phaseIndex === 0) ? "Als nächstes: Phase 2" : "Letzte Übung";
}

const img = document.getElementById("exerciseImage");
img.src = ex.img;

img.onerror = () => {
console.log("Bild fehlt:", ex.img);
};

timeLeft = ex.time;
updateUI();
}

// =============================
loadExercise();

</script>

</body>
</html>
