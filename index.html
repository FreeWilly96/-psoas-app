<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psoas Ultra PRO</title>

<link rel="apple-touch-icon" sizes="180x180" href="images/icon.png">
<link rel="manifest" href="manifest.json">

<style>
body {
    margin:0;
    font-family:-apple-system,Arial;
    text-align:center;
    background:#0b1a2f;
    color:white;
    transition:0.3s;
}

body.dark {
    background:#020617;
    color:#e5e7eb;
}

img {
    width:95%;
    height:32vh;
    object-fit:contain;
}

/* 🔥 GLOW RING TIMER */
.timerWrap {
    position:relative;
    width:180px;
    height:180px;
    margin:10px auto;
}

.timer {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:42px;
    font-weight:bold;
}

svg {
    transform:rotate(-90deg);
}

circle {
    fill:none;
    stroke-width:10;
    stroke-linecap:round;
}

.bg {
    stroke:#1e293b;
}

.progressRing {
    stroke:url(#grad);
    filter: drop-shadow(0 0 8px #a855f7);
    transition: stroke-dashoffset 1s linear;
}

.side {font-size:22px;height:30px;color:#ccc;}

.guide {
    max-width:500px;
    margin:10px auto;
    padding:10px;
    border-radius:15px;
    background:#1e2a3a;
}

body.dark .guide {
    background:#111827;
}

/* BUTTONS */
button {
    padding:12px;
    margin:4px;
    border:none;
    border-radius:12px;
    color:white;
    font-weight:bold;
    font-size:15px;
}

.start{background:#22c55e;}
.pause{background:#ef4444;}
.skip{background:#f59e0b;}
.stop{background:#6b7280;}
.mode{background:#374151;}

.phase {background:#475569;}
.phase.active {background:#a855f7;}

#progressBar {
    width:90%;
    height:10px;
    background:#1e293b;
    margin:10px auto;
    border-radius:10px;
}

#progress {
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#a855f7,#ec4899);
}
</style>
</head>

<body>

<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>
<div id="side" class="side"></div>

<img id="exerciseImage">
<div id="guide" class="guide"></div>

<!-- 🔥 GLOW TIMER -->
<div class="timerWrap">
<svg width="180" height="180">
<defs>
<linearGradient id="grad">
<stop offset="0%" stop-color="#a855f7"/>
<stop offset="100%" stop-color="#ec4899"/>
</linearGradient>
</defs>
<circle class="bg" cx="90" cy="90" r="70"></circle>
<circle id="ring" class="progressRing" cx="90" cy="90" r="70"
stroke-dasharray="440" stroke-dashoffset="440"></circle>
</svg>
<div id="timer" class="timer">0</div>
</div>

<div id="progressBar"><div id="progress"></div></div>

<button class="start" onclick="start()">Start</button>
<button class="pause" onclick="pause()">Pause</button>
<button onclick="resume()">Weiter</button>
<button class="skip" onclick="skip()">Skip</button>
<button class="stop" onclick="stop()">Beenden</button>
<button class="mode" onclick="toggleMode()">Mode</button>

<br>

<button id="btnP1" class="phase" onclick="setPhase(1)">Training 1</button>
<button id="btnP2" class="phase" onclick="setPhase(2)">Training 2</button>
<button id="btnP3" class="phase" onclick="setPhase(3)">Training 3</button>    
<button class="mode" onclick="nextPhase()">Nächstes Training</button>

<script>

// STATE
const App = { paused:false, state:"idle", session:0 };

let phaseIndex = 0;
let current = 0;
let timer = null;
let running = false;
let totalTime = 0;

const ring = document.getElementById("ring");

// =============================
function toggleMode(){
    document.body.classList.toggle("dark");
}

// =============================
function sleep(ms){
    return new Promise(r=>setTimeout(r,ms));
}

// =============================
function speak(text){
    speechSynthesis.cancel();
    return new Promise(resolve=>{
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = "de-DE";
        msg.rate = 0.95;
        msg.onend = () => setTimeout(resolve,80);
        speechSynthesis.speak(msg);
    });
}

// =============================
function updateRing(t){
    if(!totalTime) return;
    let percent = t / totalTime;
    let offset = 440 - (440 * percent);
    ring.style.strokeDashoffset = offset;
}

// =============================
async function countdown(sec){
    for(let i=sec;i>0;i--){
        if(!running) return;
        while(App.paused) await sleep(150);
        update(i);
        await speak(i.toString());
    }
}

// =============================
async function start(){

    if(running) return;

    running = true;
    App.paused = false;
    App.session++;

    let ex = phases[phaseIndex][current];

    await speak(ex.name);
    if(ex.subtitle) await speak(ex.subtitle);

    if(ex.guide){
        for(let g of ex.guide){
            await speak(g);
        }
    }

    await sleep(800);

    await speak("Bereit machen");
    await countdown(3);

    run(ex);
}

// =============================
function run(ex){

    totalTime = ex.time || 0;
    updateRing(totalTime);

    if(ex.type==="time") runTime(ex);
    if(ex.type==="reps") runReps(ex);
    if(ex.type==="side") runSide(ex);
    if(ex.type==="holdReps") runHoldReps(ex);
    if(ex.type==="sideHoldReps") runSideHoldReps(ex);
}

// =============================
function runTime(ex){

    let t = ex.time;
    totalTime = t;

    timer = setInterval(()=>{

        if(!running){
            clearInterval(timer);
            return;
        }

        if(App.paused) return;

        t--;
        update(t);
        updateRing(t);

        if(t <= 5 && t > 0){
            speak(t.toString());
        }

        if(t <= 0){
            clearInterval(timer);
            next();
        }

    },1000);
}

// =============================
function pause(){
    App.paused = true;
    speechSynthesis.cancel();
}

function resume(){
    App.paused = false;
}

// =============================
function stop(){

    running = false;
    App.paused = false;
    App.session++;

    clearInterval(timer);
    speechSynthesis.cancel();

    current = 0;

    load(); // 🔥 setzt Übung 1 korrekt zurück
    update("0");
    updateRing(0);
    showSide("");
}

// =============================
function skip(){

    if(!running) return;

    running = false;
    App.session++;

    clearInterval(timer);
    speechSynthesis.cancel();

    setTimeout(()=>next(),120);
}

// =============================
async function next(){

    running = false;

    current++;
    updateProgress();

    if(current >= phases[phaseIndex].length){
        update("FERTIG 💪");
        await speak("Training beendet");
        return;
    }

    load();
    await sleep(1200);
    start();
}

// =============================
function nextPhase(){
    phaseIndex = (phaseIndex + 1) % phases.length;
    current = 0;
    load();
}

function setPhase(p){
    phaseIndex = p - 1;
    current = 0;
    load();
}

// =============================
function load(){

    let ex = phases[phaseIndex][current];

    phaseTitle.innerText = "Training " + (phaseIndex + 1);
    exerciseTitle.innerText = ex.name;
    exerciseImage.src = ex.img;

    let html = "<ul>";
    ex.guide.forEach(g=> html += "<li>"+g+"</li>");
    html += "</ul>";

    guide.innerHTML = html;

    update(ex.time || ex.reps);
    updateProgress();
}

// =============================
function update(v){
    document.getElementById("timer").innerText = v;
}

function showSide(s){
    document.getElementById("side").innerText = s;
}

// =============================
function updateProgress(){
    let total = phases[phaseIndex].length;
    document.getElementById("progress").style.width = ((current/total)*100)+"%";
}



// =============================
// 🔥 STABILE PHASEN
const phases = [

]
},

"Anderes Bein bleibt gestreckt und locker",
"Tief weiteratmen und entspannen"
]
},

rest:3,

"Kleine ruhige Bewegung"
]

]

reps:15,
guide:[
"Rückenlage, Füße hüftbreit aufstellen",

"Langsam wieder absenken"
]
},

/* ================= PHASE 2 ================= */
[

],
 /* ================= TRAINING 3 ================= */

</script>

</html>
