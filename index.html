<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psoas Ultra+ PRO</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(#0b1a2f, #0f2c50);
    color: white;
    text-align: center;
}

h1 { margin-top: 20px; }

img {
    width: 90%;
    max-width: 500px;
    border-radius: 12px;
    margin: 20px auto;
}

.timer {
    font-size: 80px;
    margin: 10px;
}

.progress-bar {
    width: 90%;
    height: 10px;
    background: #333;
    margin: 10px auto;
    border-radius: 10px;
    overflow: hidden;
}

.progress {
    height: 100%;
    width: 0%;
    background: #28a745;
}

button {
    padding: 15px 25px;
    font-size: 18px;
    margin: 10px;
    border: none;
    border-radius: 10px;
}

.start { background: #28a745; color: white; }
.pause { background: #dc3545; color: white; }

.small {
    color: #ccc;
    font-size: 14px;
}
</style>
</head>

<body>

<h1>Psoas Ultra+ PRO</h1>

<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>
<p class="small" id="nextExercise"></p>

<img id="exerciseImage">

<div class="timer" id="timer">40</div>

<div class="progress-bar">
    <div class="progress" id="progress"></div>
</div>

<p id="percent">0%</p>

<button class="start" onclick="startTimer()">Start</button>
<button class="pause" onclick="pauseTimer()">Pause</button>

<script>

// =============================
// WOCHE (AUTO PHASE)
// =============================
let week = 2; // 👉 ändern: 1 oder 2

// =============================
// ÜBUNGEN
// =============================
const phase1 = [
    {name: "Bauchatmung", img: "phase1.jpg", time: 60},
    {name: "Knie zur Brust links", img: "phase1.jpg", time: 40},
    {name: "Knie zur Brust rechts", img: "phase1.jpg", time: 40},
    {name: "Mini-Becken-Kippung", img: "phase1.jpg", time: 40},
    {name: "Hüftbeuger-Dehnung links", img: "phase1.jpg", time: 40},
    {name: "Hüftbeuger-Dehnung rechts", img: "phase1.jpg", time: 40},
    {name: "Glute Bridge", img: "phase1.jpg", time: 40},
    {name: "Adduktor-Dehnung links", img: "phase1.jpg", time: 40},
    {name: "Adduktor-Dehnung rechts", img: "phase1.jpg", time: 40}
];

const phase2 = [
    {name: "Dynamische Hüftöffnung links", img: "phase2.jpg", time: 40},
    {name: "Dynamische Hüftöffnung rechts", img: "phase2.jpg", time: 40},
    {name: "Glute Bridge einbeinig links", img: "phase2.jpg", time: 40},
    {name: "Glute Bridge einbeinig rechts", img: "phase2.jpg", time: 40},
    {name: "Dead Bug", img: "phase2.jpg", time: 40},
    {name: "Seitliche Ausfallschritte links", img: "phase2.jpg", time: 40},
    {name: "Seitliche Ausfallschritte rechts", img: "phase2.jpg", time: 40},
    {name: "Adduktor Aktivierung links", img: "phase2.jpg", time: 40},
    {name: "Adduktor Aktivierung rechts", img: "phase2.jpg", time: 40}
];

// AUTO WAHL
const exercises = (week === 1) ? phase1 : phase2;

// =============================
let current = 0;
let timeLeft = exercises[0].time;
let timer = null;

// =============================
// SPRACHAUSGABE
// =============================
function speak(text) {
    let msg = new SpeechSynthesisUtterance(text);
    msg.lang = "de-DE";
    speechSynthesis.speak(msg);
}

// =============================
// VIBRATION
// =============================
function vibrate() {
    if (navigator.vibrate) {
        navigator.vibrate([200, 100, 200]);
    }
}

// =============================
// LOAD
// =============================
function loadExercise() {

    let ex = exercises[current];

    document.getElementById("exerciseTitle").innerText = ex.name;

    document.getElementById("phaseTitle").innerText =
        (week === 1) ? "Phase 1 – Reset" : "Phase 2 – Aufbau";

    if (current + 1 < exercises.length) {
        document.getElementById("nextExercise").innerText =
            "Als nächstes: " + exercises[current + 1].name;
    } else {
        document.getElementById("nextExercise").innerText =
            "Letzte Übung!";
    }

    document.getElementById("exerciseImage").src = ex.img;

    timeLeft = ex.time;
    updateTimer();

    updateProgress();

    speak(ex.name);
}

// =============================
function updateTimer() {
    document.getElementById("timer").innerText = timeLeft;
}

// =============================
function updateProgress() {
    let percent = ((current) / exercises.length) * 100;

    document.getElementById("progress").style.width = percent + "%";
    document.getElementById("percent").innerText = Math.round(percent) + "%";
}

// =============================
function startTimer() {

    if (timer) return;

    speak("Start");

    timer = setInterval(() => {

        timeLeft--;
        updateTimer();

        if (timeLeft <= 0) {
            nextExercise();
        }

    }, 1000);
}

// =============================
function pauseTimer() {
    clearInterval(timer);
    timer = null;
    speak("Pause");
}

// =============================
function nextExercise() {

    clearInterval(timer);
    timer = null;

    vibrate();
    speak("Wechsel");

    current++;

    if (current >= exercises.length) {
        speak("Training beendet");
        alert("Fertig!");
        current = 0;
    }

    loadExercise();
}

// =============================
loadExercise();

</script>

</body>
</html>
