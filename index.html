<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psoas Ultra PRO v9</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(#0b1a2f, #0f2c50);
    color: white;
    text-align: center;
}

img {
    width: 90%;
    max-width: 500px;
    border-radius: 12px;
    margin: 20px auto;
}

.timer {
    font-size: 70px;
}

.progress {
    width: 80%;
    height: 10px;
    background: #333;
    margin: 10px auto;
    border-radius: 10px;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: limegreen;
}

button {
    padding: 12px 18px;
    margin: 5px;
    border-radius: 10px;
    border: none;
}

.start { background: green; color:white; }
.pause { background: red; color:white; }
.skip { background: orange; color:white; }
.reset { background: gray; color:white; }
.phase { background: blue; color:white; }

</style>
</head>

<body>

<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>
<p id="nextExercise"></p>

<img id="exerciseImage">

<div class="progress">
    <div class="progress-bar" id="progressBar"></div>
</div>

<div class="timer" id="timer">0</div>

<button class="start" onclick="startTimer()">Start</button>
<button class="pause" onclick="pauseTimer()">Pause</button>
<button class="skip" onclick="nextExercise()">Skip</button>
<button class="reset" onclick="resetAll()">Reset</button>
<button class="phase" onclick="goPhase2()">Phase 2</button>

<script>

// =============================
// STATE
// =============================
let phaseIndex = 0;
let current = 0;
let timer = null;
let timeLeft = 0;

// =============================
const phases = [

    [
        {name:"Bauchatmung", img:"images/phase1.jpg", time:60},
        {name:"Knie zur Brust links", img:"images/phase1.jpg", time:40},
        {name:"Knie zur Brust rechts", img:"images/phase1.jpg", time:40},
        {name:"Mini-Becken-Kippung", img:"images/phase1.jpg", time:40},
    ],

    [
        {name:"Hüftöffnung links", img:"images/phase2.jpg", time:40},
        {name:"Hüftöffnung rechts", img:"images/phase2.jpg", time:40},
        {name:"Dead Bug", img:"images/phase2.jpg", time:40},
    ]

];

// =============================
// 🔊 STABILE SPRACHE (iOS FIX)
// =============================
function speak(text) {

    speechSynthesis.cancel();

    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "de-DE";

    // wichtig für iOS
    msg.rate = 1;
    msg.pitch = 1;

    speechSynthesis.speak(msg);
}

// =============================
// COUNTDOWN MIT ANSAGE
// =============================
function startTimer() {

    if (timer) return;

    speak("Bereit");

    let count = 3;

    const cd = setInterval(() => {

        document.getElementById("timer").innerText = count;
        speak(count.toString());

        count--;

        if (count === 0) {
            clearInterval(cd);
            startRealTimer();
        }

    }, 1000);
}

// =============================
function startRealTimer() {

    const ex = phases[phaseIndex][current];

    speak(ex.name); // 👉 HIER IST DER WICHTIGE FIX

    timer = setInterval(() => {

        timeLeft--;
        updateUI();

        if (timeLeft <= 0) nextExercise();

    }, 1000);
}

// =============================
function pauseTimer() {
    clearInterval(timer);
    timer = null;
    speak("Pause");
}

// =============================
function nextExercise() {

    clearInterval(timer);
    timer = null;

    speak("Wechsel");

    current++;

    if (current >= phases[phaseIndex].length) {

        phaseIndex++;

        if (phaseIndex >= phases.length) {
            alert("Fertig 💪");
            resetAll();
            return;
        }

        current = 0;
        speak("Phase 2");
    }

    loadExercise();
}

// =============================
function resetAll() {

    clearInterval(timer);

    phaseIndex = 0;
    current = 0;

    loadExercise();
}

// =============================
// 👉 BUTTON PHASE 2
// =============================
function goPhase2() {

    clearInterval(timer);

    phaseIndex = 1;
    current = 0;

    speak("Phase 2 gestartet");

    loadExercise();
}

// =============================
function updateUI() {

    const total = phases[phaseIndex][current].time;
    const progress = ((total - timeLeft) / total) * 100;

    document.getElementById("timer").innerText = timeLeft;
    document.getElementById("progressBar").style.width = progress + "%";
}

// =============================
function loadExercise() {

    const ex = phases[phaseIndex][current];

    document.getElementById("phaseTitle").innerText =
        "Phase " + (phaseIndex + 1);

    document.getElementById("exerciseTitle").innerText = ex.name;

    if (current + 1 < phases[phaseIndex].length) {
        document.getElementById("nextExercise").innerText =
            "Als nächstes: " + phases[phaseIndex][current + 1].name;
    } else {
        document.getElementById("nextExercise").innerText =
            (phaseIndex === 0) ? "Als nächstes: Phase 2" : "Letzte Übung";
    }

    // Bild laden
    const img = document.getElementById("exerciseImage");
    img.src = ex.img;

    img.onerror = () => {
        console.log("Bild fehlt:", ex.img);
        img.src = "images/phase1.jpg";
    };

    timeLeft = ex.time;
    updateUI();
}

// =============================
loadExercise();

</script>

</body>
</html>
