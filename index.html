<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psoas Ultra PRO</title>

<style>
body { margin:0; font-family:Arial; text-align:center; background:#f2f2f2; transition:0.3s;}
body.dark { background:#0b1a2f; color:white;}

img { width:95%; height:40vh; object-fit:contain;}
.timer { font-size:80px;}
.side { font-size:40px; font-weight:bold; height:50px;}

button { padding:10px; margin:5px; border:none; border-radius:10px; color:white;}
.start{background:green;}
.pause{background:red;}
.skip{background:orange;}
.mode{background:black;}
.phase{background:#777;}
.phase.active{background:purple;}
</style>
</head>

<body>

<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>

<div id="side" class="side"></div>

<img id="exerciseImage">

<div class="timer" id="timer">0</div>

<div>
<button class="start" onclick="start()">Start</button>
<button class="pause" onclick="pause()">Pause</button>
<button class="skip" onclick="next()">Skip</button>
<button class="mode" onclick="toggleMode()">Mode</button>
</div>

<div>
<button id="p1" class="phase" onclick="setPhase(1)">Phase 1</button>
<button id="p2" class="phase" onclick="setPhase(2)">Phase 2</button>
</div>

<script>

// =============================
let phaseIndex = 0;
let current = 0;
let timer = null;
let spoken = false;

// =============================
function speak(text, cb){
    speechSynthesis.cancel();
    let msg = new SpeechSynthesisUtterance(text);
    msg.lang="de-DE";
    msg.onend = ()=> cb && cb();
    speechSynthesis.speak(msg);
}

// =============================
function setPhase(p){
    phaseIndex = p-1;
    current = 0;
    spoken = false;
    load();
}

// =============================
function updatePhaseUI(){
    p1.classList.remove("active");
    p2.classList.remove("active");
    (phaseIndex===0?p1:p2).classList.add("active");
}

// =============================
const phases = [

/* ================= PHASE 1 ================= */
[
{name:"Bauchatmung", img:"images/phase3.jpg", type:"time", time:120,
speech:"Rückenlage. Füße aufgestellt. Eine Hand auf den Bauch, eine auf die Brust. Fünf Sekunden einatmen, sieben Sekunden ausatmen."},

{name:"Knie zur Brust", img:"images/phase3.jpg", type:"sideTime", time:45,
speech:"Ein Knie zur Brust ziehen und halten. Anderes Bein bleibt entspannt."},

{name:"Mini Becken Kippung", img:"images/phase3.jpg", type:"reps", reps:15,
speech:"Unteren Rücken in den Boden drücken. Becken kippen und lösen."},

{name:"Hüftbeuger Dehnung", img:"images/phase3.jpg", type:"sideTime", time:40,
speech:"Halbkniestand. Becken kippen. Gesäß anspannen. Dehnung vorne spüren."},

{name:"Glute Bridge", img:"images/phase3.jpg", type:"repsSlow", reps:12,
speech:"Hüfte anheben. Zwei bis drei Sekunden halten. Langsam absenken."},

{name:"Adduktor Dehnung", img:"images/phase3.jpg", type:"time", time:45,
speech:"Breiter Stand. Gewicht zur Seite verlagern. Dehnung spüren."}
],

/* ================= PHASE 2 ================= */
[
{name:"Bauchatmung", img:"images/phase2.jpg", type:"time", time:60,
speech:"Durch die Nase in den Bauch atmen. Langsam ausatmen."},

{name:"Dynamische Hüftöffnung", img:"images/phase2.jpg", type:"sideReps", reps:10,
speech:"Ausfallschritt. Hüfte nach vorne schieben und zurück."},

{name:"Glute Bridge einbeinig", img:"images/phase2.jpg", type:"sideRepsSlow", reps:10,
speech:"Ein Bein anheben. Hüfte hoch. Kurz halten und absenken."},

{name:"Dead Bug", img:"images/phase2.jpg", type:"alt", reps:12,
speech:"Arm und gegenüberliegendes Bein strecken. Rumpf stabil halten."},

{name:"Seitliche Ausfallschritte", img:"images/phase2.jpg", type:"altSlow", reps:10,
speech:"Seitlich treten. Hüfte nach hinten schieben."},

{name:"Adduktor Hüfte Kombi", img:"images/phase2.jpg", type:"time", time:40,
speech:"In die Dehnung gehen und kleine Bewegungen machen."}
]

];

// =============================
function start(){

    if(timer) return;

    let ex = phases[phaseIndex][current];

    if(!spoken){
        spoken = true;
        speak(ex.name + ". " + ex.speech, ()=> run(ex));
    } else run(ex);
}

// =============================
function run(ex){

    if(ex.type==="time") runTime(ex);
    if(ex.type==="reps") runReps(ex);
    if(ex.type==="repsSlow") runRepsSlow(ex);
    if(ex.type==="sideTime") runSideTime(ex);
    if(ex.type==="sideReps") runSideReps(ex);
    if(ex.type==="sideRepsSlow") runSideRepsSlow(ex);
    if(ex.type==="alt") runAlt(ex);
    if(ex.type==="altSlow") runAltSlow(ex);
}

// =============================
function runTime(ex){
    let t=ex.time;
    timer=setInterval(()=>{
        t--; update(t);
        if(t<=5 && t>0) speak(t);
        if(t<=0){clearInterval(timer); next();}
    },1000);
}

// =============================
function runReps(ex){
    let r=ex.reps;
    timer=setInterval(()=>{
        r--; update(r); speak(r);
        if(r<=0){clearInterval(timer); next();}
    },2000);
}

// =============================
function runRepsSlow(ex){
    let r=ex.reps;
    timer=setInterval(()=>{
        r--; update(r); speak(r);
        if(r<=0){clearInterval(timer); next();}
    },3000);
}

// =============================
function runSideTime(ex){

    let side="rechts";

    function go(){
        document.getElementById("side").innerText=side;
        speak(side);

        let t=ex.time;

        let i=setInterval(()=>{
            t--; update(t);
            if(t<=0){
                clearInterval(i);
                if(side==="rechts"){
                    speak("Wechsel",()=>{side="links"; setTimeout(go,1500);});
                } else next();
            }
        },1000);
    }

    go();
}

// =============================
function runSideReps(ex){

    let side="rechts";

    function go(){
        document.getElementById("side").innerText=side;
        speak(side);

        let r=ex.reps;

        let i=setInterval(()=>{
            r--; update(r);
            if(r<=0){
                clearInterval(i);
                if(side==="rechts"){
                    speak("Wechsel",()=>{side="links"; setTimeout(go,1500);});
                } else next();
            }
        },2000);
    }

    go();
}

// =============================
function runSideRepsSlow(ex){

    let side="rechts";

    function go(){
        document.getElementById("side").innerText=side;
        speak(side);

        let r=ex.reps;

        let i=setInterval(()=>{
            r--; update(r);
            if(r<=0){
                clearInterval(i);
                if(side==="rechts"){
                    speak("Wechsel",()=>{side="links"; setTimeout(go,1500);});
                } else next();
            }
        },3000);
    }

    go();
}

// =============================
function runAlt(ex){

    let reps=ex.reps;
    let side="links";

    function loop(){
        document.getElementById("side").innerText=side;
        speak(side);

        side = side==="links"?"rechts":"links";
        if(side==="links") reps--;

        if(reps<=0){next(); return;}

        setTimeout(()=> speak("Wechsel", loop),1500);
    }

    loop();
}

// =============================
function runAltSlow(ex){

    let reps=ex.reps;
    let side="links";

    function loop(){
        document.getElementById("side").innerText=side;
        speak(side);

        side = side==="links"?"rechts":"links";
        if(side==="links") reps--;

        if(reps<=0){next(); return;}

        setTimeout(()=> speak("Wechsel", loop),2500);
    }

    loop();
}

// =============================
function next(){

    clearInterval(timer);

    speak("Pause. Nächste Übung.", ()=>{

        current++;

        if(current>=phases[phaseIndex].length){
            alert("Training fertig 💪");
            current=0;
        }

        spoken=false;
        load();

        setTimeout(start,15000); // 15 Sek Pause
    });
}

// =============================
function pause(){
    clearInterval(timer);
}

// =============================
function toggleMode(){
    document.body.classList.toggle("dark");
}

// =============================
function update(val){
    document.getElementById("timer").innerText = val;
}

// =============================
function load(){

    let ex=phases[phaseIndex][current];

    phaseTitle.innerText="Phase "+(phaseIndex+1);
    exerciseTitle.innerText=ex.name;
    exerciseImage.src=ex.img;

    update(ex.time||ex.reps);
    updatePhaseUI();
}

// =============================
load();

</script>

</body>
</html>
