<!DOCTYPE html>
<html lang="de">
<head>

<title>Psoas Ultra PRO</title>

<style>

body.dark {

}

img {

    height:35vh;
    object-fit:contain;
}

.ringWrap{

    width:160px;
    height:160px;
    margin:10px auto;
}

canvas{
    position:absolute;
    top:0;
    left:0;
}

.timer {
    position:absolute;
    width:100%;
    height:100%;

    align-items:center;
    justify-content:center;

    font-weight:bold;
}

.side {
    font-size:26px;
    height:40px;
    color:#ccc;
}

.guide {
    max-width:500px;
    margin:10px auto;
    padding:12px;
    border-radius:14px;
    background:#1e2a3a;
}

button {
    padding:12px;
    margin:5px;
    border:none;
    border-radius:12px;
    color:white;
    font-weight:bold;
    font-size:15px;
}

.start{background:#22c55e;}
.pause{background:#ef4444;}
.skip{background:#f59e0b;}
.mode{background:#374151;}

.phase {background:#475569;}
.phase.active {background:#a855f7;}

#progressBar {
    width:90%;
    height:10px;
    background:#1e293b;
    margin:10px auto;
    border-radius:10px;
}

#progress {
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#a855f7,#ec4899);
}

.bottomBar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:rgba(20,20,20,0.9);
    padding:8px;
    display:flex;
    gap:6px;
    z-index:999;
}
.bottomBar button{
    flex:1;
    font-size:14px;
}
</style>
</head>

<body>

<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>
<div id="side" class="side"></div>

<img id="exerciseImage">
<div id="guide" class="guide"></div>

<div class="ringWrap">
<canvas id="ring" width="160" height="160"></canvas>
<div id="timer" class="timer">0</div>
</div>

<div id="progressBar"><div id="progress"></div></div>

<br>

<button id="btnP1" class="phase" onclick="setPhase(1)">Training 1</button>
<button id="btnP2" class="phase" onclick="setPhase(2)">Training 2</button>
<button id="btnP3" class="phase" onclick="setPhase(3)">Training 3</button>    
<button class="mode" onclick="nextPhase()">Nächstes Training</button>

<div class="bottomBar">
<button class="start" onclick="start()">Start</button>
<button class="pause" onclick="pause()">Pause</button>
<button style="background:#3498db" onclick="weiter()">Weiter</button>
<button class="skip" onclick="skip()">Skip</button>
<button style="background:#555" onclick="stop()">Stop</button>
</div>

<script>

const App = {
    paused: false,
    state: "idle",
    session: 0
};

let phaseIndex = 0;
let current = 0;
let timer = null;
let running = false;

const phaseTitle = document.getElementById("phaseTitle");
const exerciseTitle = document.getElementById("exerciseTitle");
const exerciseImage = document.getElementById("exerciseImage");
const guide = document.getElementById("guide");
const timerEl = document.getElementById("timer");
const side = document.getElementById("side");
const progress = document.getElementById("progress");

const canvas = document.getElementById("ring");
const ctx = canvas.getContext("2d");

function drawRing(percent){
    ctx.clearRect(0,0,160,160);

    const center = 80;
    const radius = 70;

    ctx.beginPath();
    ctx.arc(center,center,radius,0,Math.PI*2);
    ctx.strokeStyle="#1e293b";
    ctx.lineWidth=10;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(
        center,
        center,
        radius,
        -Math.PI/2,
        (Math.PI*2*percent)-Math.PI/2
    );
    ctx.strokeStyle="#a855f7";
    ctx.lineWidth=10;
    ctx.stroke();
}

function sleep(ms, session){
    return new Promise(resolve=>{
        const start = Date.now();
        function loop(){
            if(session !== App.session) return resolve();
            if(App.paused) return requestAnimationFrame(loop);
            if(Date.now() - start >= ms) return resolve();
            requestAnimationFrame(loop);
        }
        loop();
    });
}

function speak(text, session){

    speechSynthesis.cancel();

    return new Promise(resolve=>{
        if(session !== App.session) return resolve();

        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = "de-DE";
        msg.rate = 0.92;

        msg.onend = () => setTimeout(resolve,120);

        speechSynthesis.speak(msg);
    });
}

function update(v, total){
    timerEl.innerText = v;
    if(typeof v === "number" && total){
        drawRing(v / total);
    }
}

function showSide(s){
    side.innerText = s;
}

// =============================
// 🔥 FIXED STOP (RESET + ÜBUNG 1 NEU LADEN)
function stop(){

    App.session++;
    running = false;
    App.paused = false;

    clearInterval(timer);
    speechSynthesis.cancel();

    // RESET
    current = 0;

    progress.style.width = "0%";
    showSide("");

    // 🔥 WICHTIG: erste Übung neu laden
    load();

    // optional sauberer Reset
    update(0,1);
    drawRing(1);
}

// =============================

function load(){

    let ex = phases[phaseIndex][current];

    phaseTitle.innerText = "Training " + (phaseIndex+1);
    exerciseTitle.innerText = ex.name;
    exerciseImage.src = ex.img;

    let html = "<ul>";
    ex.guide.forEach(g=>{
        html += "<li>"+g+"</li>";
    });
    html += "</ul>";

    guide.innerHTML = html;

    update(ex.time || ex.reps, ex.time || ex.reps);
}

// INIT
drawRing(1);





// =============================

</script>
