<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psoas Ultra PRO</title>

<link rel="apple-touch-icon" sizes="180x180" href="images/icon.png">
<link rel="manifest" href="manifest.json">

<style>
:root{
    --primary:#7b2ff7;
    --accent:#ff2d75;
    --bg:#eef1f7;
    --card:rgba(255,255,255,0.82);
    --card-solid:#ffffff;
    --text:#111827;
    --muted:#6b7280;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
    background:var(--bg);
    color:var(--text);
    padding-bottom:100px;
}

body.dark{
    --bg:#08111f;
    --card:rgba(20,31,49,0.8);
    --card-solid:#132236;
    --text:#fff;
}

/* CONTAINER */
.container{
    max-width:700px;
    margin:auto;
    padding:10px 14px;
}

/* TOP CARD */
.topCard{
    position:sticky;
    top:0;
    z-index:10;
}

.topCardInner{
    background:var(--card);
    border-radius:20px;
    padding:12px;
    backdrop-filter:blur(12px);
}

/* TITLES */
h2{font-size:14px;opacity:.6;margin:0;}
h3{font-size:24px;margin:4px 0;font-weight:800;}

.side{font-size:14px;opacity:.6;height:20px;}

/* IMAGE */
img{
    width:100%;
    max-height:30vh;
    object-fit:contain;
    border-radius:16px;
    margin-top:10px;
    background:#fff;
}

/* GUIDE */
.guide{
    margin-top:10px;
    padding:12px;
    border-radius:16px;
    background:var(--card);
    font-size:14px;
}

/* TIMER */
.timer{
    font-size:clamp(60px,15vw,110px);
    font-weight:900;
    text-align:center;
    margin:10px 0;
    background:linear-gradient(90deg,var(--primary),var(--accent));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* PROGRESS */
#progressBar{
    width:100%;
    height:10px;
    background:#ddd;
    border-radius:20px;
}
#progress{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,var(--primary),var(--accent));
}

/* BUTTONS */
button{
    border:none;
    border-radius:14px;
    padding:12px;
    font-weight:700;
    color:white;
    flex:1;
}

.start{background:#22c55e;}
.pause{background:#ef4444;}
.skip{background:#f59e0b;}
.mode{background:#222;}
.phase{background:#999;}
.phase.active{background:var(--primary);}

/* CONTROLS */
.controls{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:6px;
    padding:10px;
    background:var(--card);
}

/* TRAINING BAR */
.trainingBar{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:6px;
    margin-top:10px;
}

/* MOBILE */
@media(max-width:430px){
    .trainingBar{grid-template-columns:repeat(3,1fr);}
    .controls{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

<body>

<div class="container">

<div class="topCard">
<div class="topCardInner">
<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>
<div id="side" class="side"></div>
</div>
</div>

<img id="exerciseImage">

<div id="guide" class="guide"></div>

<div id="timer" class="timer">0</div>

<div id="progressBar"><div id="progress"></div></div>

<div class="trainingBar">
<button class="phase" onclick="setPhase(1)">T1</button>
<button class="phase" onclick="setPhase(2)">T2</button>
<button class="phase" onclick="setPhase(3)">T3</button>
<button class="mode" onclick="nextPhase()">Next</button>
<button class="mode" onclick="toggleMode()">Mode</button>
</div>

</div>

<div class="controls">
<button class="start" onclick="start()">Start</button>
<button class="pause" onclick="pause()">Pause</button>
<button onclick="resume()">Resume</button>
<button class="skip" onclick="skip()">Skip</button>
</div>

<script>

// =============================
const App = {paused:false,state:"idle",session:0};
let phaseIndex=0,current=0,timer=null,running=false;

const phaseTitle=document.getElementById("phaseTitle");
const exerciseTitle=document.getElementById("exerciseTitle");
const exerciseImage=document.getElementById("exerciseImage");
const guide=document.getElementById("guide");
const timerEl=document.getElementById("timer");
const side=document.getElementById("side");
const progress=document.getElementById("progress");

// =============================
function toggleMode(){document.body.classList.toggle("dark");}

function sleep(ms,session){
return new Promise(r=>{
const s=Date.now();
function loop(){
if(session!==App.session)return r();
if(App.paused)return requestAnimationFrame(loop);
if(Date.now()-s>=ms)return r();
requestAnimationFrame(loop);
}
loop();
});
}

function speak(text,session){
speechSynthesis.cancel();
return new Promise(r=>{
if(session!==App.session)return r();
let m=new SpeechSynthesisUtterance(text);
m.lang="de-DE";m.rate=.92;
m.onend=()=>setTimeout(r,120);
speechSynthesis.speak(m);
});
}

async function countdown(sec,session){
for(let i=sec;i>0;i--){
if(session!==App.session)return;
while(App.paused)await sleep(150,session);
update(i);
await speak(i.toString(),session);
}
}

async function coachIntro(ex,session){
if(session!==App.session)return;
await speak(ex.name,session);
if(ex.subtitle)await speak(ex.subtitle,session);
if(ex.guide){
for(let g of ex.guide){
if(session!==App.session)return;
await speak(g,session);
}}
await sleep(900,session);
await speak("Bereit machen",session);
await countdown(3,session);
}

async function start(){
if(running)return;
running=true;
App.session++;
let s=App.session;
let ex=phases[phaseIndex][current];
await coachIntro(ex,s);
if(s!==App.session)return;
run(ex,s);
}

function run(ex,s){
if(ex.type==="time")runTime(ex,s);
if(ex.type==="reps")runReps(ex,s);
if(ex.type==="side")runSide(ex,s);
if(ex.type==="holdReps")runHoldReps(ex,s);
if(ex.type==="sideHoldReps")runSideHoldReps(ex,s);
}

function runTime(ex,s){
let t=ex.time;update(t);
timer=setInterval(()=>{
if(s!==App.session)return clearInterval(timer);
if(App.paused)return;
t--;update(t);
if(t<=0){clearInterval(timer);next(s);}
},1000);
}

async function runReps(ex,s){
let r=ex.reps;
while(r>0){
if(s!==App.session)return;
while(App.paused)await sleep(150,s);
update(r);
await speak(r.toString(),s);
r--;
await sleep(ex.rest*1000,s);
}
next(s);
}

async function runHoldReps(ex,s){
let r=ex.reps;
while(r>0){
if(s!==App.session)return;
while(App.paused)await sleep(150,s);
update("HALTEN");
await speak("Halten",s);
await sleep(ex.holdTime||4000,s);
r--;
}
next(s);
}

async function runSide(ex,s){
let sides=["rechts","links"];
for(let i=0;i<sides.length;i++){
if(s!==App.session)return;
showSide(sides[i]);
await speak("Seite "+sides[i],s);
let t=ex.time;
while(t>0){
if(s!==App.session)return;
while(App.paused)await sleep(150,s);
update(t);
await sleep(1000,s);
t--;
}
if(i<1){
await sleep(5000,s);
await speak("Seitenwechsel",s);
}}
showSide("");
next(s);
}

async function runSideHoldReps(ex,s){
let sides=["rechts","links"];
for(let i=0;i<sides.length;i++){
if(s!==App.session)return;
showSide(sides[i]);
await speak("Seite "+sides[i],s);
let r=ex.reps;
while(r>0){
if(s!==App.session)return;
while(App.paused)await sleep(150,s);
update(r);
await speak("Halten",s);
await sleep(ex.holdTime||4000,s);
r--;
}
if(i<1){
await sleep(5000,s);
await speak("Seitenwechsel",s);
}}
showSide("");
next(s);
}

function skip(){
App.session++;running=false;
clearInterval(timer);
speechSynthesis.cancel();
setTimeout(()=>next(App.session),120);
}

async function next(s){
if(s!==App.session)return;
running=false;
current++;
updateProgress();
if(current>=phases[phaseIndex].length){
update("FERTIG");
return;
}
load();
await sleep(1200,s);
start();
}

function pause(){App.paused=true;speechSynthesis.cancel();}
function resume(){App.paused=false;}

function nextPhase(){App.session++;phaseIndex=(phaseIndex+1)%phases.length;current=0;load();}
function setPhase(p){App.session++;phaseIndex=p-1;current=0;load();}

function load(){
let ex=phases[phaseIndex][current];
phaseTitle.innerText="Training "+(phaseIndex+1);
exerciseTitle.innerText=ex.name;
exerciseImage.src=ex.img;
guide.innerHTML="<ul>"+ex.guide.map(g=>"<li>"+g+"</li>").join("")+"</ul>";
update(ex.time||ex.reps);
updateProgress();
}

function update(v){timerEl.innerText=v;}
function showSide(s){side.innerText=s;}
function updateProgress(){
let t=phases[phaseIndex].length;
progress.style.width=(current/t*100)+"%";
}


// =============================
// 🔥 STABILE PHASEN
const phases = [

/* ================= PHASE 1 ================= */
[
{
name:"Bauchatmung",
subtitle:"Nervensystem beruhigen",
img:"images/phase3.jpg",
type:"time",
time:120,
guide:[
"Rückenlage, Füße aufgestellt",
"Eine Hand auf Bauch, eine auf Brust",
"Langsam in den Bauch atmen",
"5 Sekunden einatmen, 7 Sekunden ausatmen"
]
},

{
name:"Knie zur Brust",
subtitle:"Psoas Entlastung",
img:"images/phase3.jpg",
type:"side",
time:45,
guide:[
"Rückenlage",
"Ein Knie zur Brust ziehen und mit Händen halten",
"Anderes Bein bleibt gestreckt und locker",
"Tief weiteratmen und entspannen"
]
},

{
name:"Mini-Becken-Kippung",
subtitle:"Kontrolle und Entlastung",
img:"images/phase3.jpg",
type:"reps",
reps:15,
rest:3,
guide:[
"Rückenlage, Füße aufgestellt",
"Unterer Rücken leicht in den Boden drücken",
"Becken kippt nach vorne",
"Spannung kurz halten und wieder lösen",
"Kleine ruhige Bewegung"
]
},

{
name:"Hüftbeuger Dehnung",
subtitle:"Psoas und Hüftbeuger dehnen",
img:"images/phase3.jpg",
type:"side",
time:40,
guide:[
"Halbkniestand",
"Gesäß der hinteren Seite anspannen",
"Becken leicht nach hinten kippen",
"Oberkörper aufrecht, kein Hohlkreuz",
"Dehnung vorne in der Hüfte spüren"
]
},

{
name:"Glute Bridge",
subtitle:"Gesäßmuskulatur stärken",
img:"images/phase3.jpg",
type:"holdReps",
reps:15,
guide:[
"Rückenlage, Füße hüftbreit aufstellen",
"Hüfte nach oben drücken, Gesäß anspannen",
"Oben 5 Sekunden halten",
"Langsam wieder absenken"
]
},

{
name:"Adduktor Dehnung",
subtitle:"Leisten und Innenschenkel dehnen",
img:"images/phase3.jpg",
type:"side", // ✅ WAR "time"
time:45,
guide:[
"Breiten Stand einnehmen",
"Gewicht zur Seite verlagern",
"Andere Seite bleibt gestreckt",
"Rücken gerade halten",
"Dehnung innen spüren"
]
}
],

/* ================= PHASE 2 ================= */
[
{
name:"Bauchatmung Aktivierung",
subtitle:"Rumpf aktivieren",
img:"images/phase2.jpg",
type:"time",
time:60,
guide:[
"Ruhig atmen",
"Spannung im Rumpf aufbauen",
"Kontrollierte Atmung"
]
},

{
name:"Dynamische Hüftöffnung",
subtitle:"Beweglichkeit und Kontrolle",
img:"images/phase2.jpg",
type:"sideHoldReps",
reps:10,
guide:[
"Ausfallschritt nach vorne",
"Hüfte vor und zurück bewegen",
"Spannung halten",
"Bewegung kontrolliert ausführen"
]
},

{
name:"Glute Bridge einbeinig",
subtitle:"Stabilität und Kraft",
img:"images/phase2.jpg",
type:"sideHoldReps",
reps:10,
guide:[
"Ein Bein anheben",
"Hüfte nach oben drücken",
"Spannung im Gesäß halten",
"Stabil bleiben"
]
},

{
name:"Dead Bug",
subtitle:"Rumpfstabilität",
img:"images/phase2.jpg",
type:"reps",
reps:24,
rest:3,
guide:[
"Rückenlage",
"Arme und Beine anheben",
"Gegengleich bewegen",
"Rumpf stabil halten",
"Unterer Rücken bleibt am Boden"
]
},

{
name:"Seitliche Ausfallschritte",
subtitle:"Beweglichkeit Hüfte",
img:"images/phase2.jpg",
type:"reps",
reps:20,
rest:3,
guide:[
"Seitlich ausweichen",
"Hüfte nach hinten schieben",
"Gewicht von rechts nach links verlagern",
"Spannung halten"
]
},

{
name:"Adduktor Hüfte Kombi",
subtitle:"Mobilität und Dehnung",
img:"images/phase2.jpg",
type:"side", // ✅ WAR "time"
time:40,
guide:[
"Dehnung halten",
"Kleine Bewegungen ausführen",
"Spannung ruhig halten"
]
}
],
 /* ================= TRAINING 3 ================= */
[
{
name:"Einbeiniges Standknieheben",
subtitle:"Stabilität und Kontrolle",
img:"images/training3.jpg",
type:"sideHoldReps",
reps:10,
guide:[
"Aufrecht stehen",
"Bauchnabel einziehen",
"Knie kontrolliert heben",
"Hüfte bleibt stabil"
]
},

{
name:"Seitliche Plank kurz",
subtitle:"Rumpfstabilität seitlich",
img:"images/training3.jpg",
type:"side",
time:45,
guide:[
"Seitlich liegend",
"Körper bildet eine Linie",
"Knie leicht angewinkelt",
"Becken nicht nach vorne oder hinten kippen",
"Bauch und Gesäß aktiv",
"Ruhig atmen"
]
},

{
name:"Plank",
subtitle:"Ganzkörper Spannung",
img:"images/training3.jpg",
type:"time",
time:30,
guide:[
"Bauchlage, Ellenbogen unter den Schultern",
"Füße hüftbreit auseinander",
"Körper anheben – gerade Linie",
"Kopf in Verlängerung der Wirbelsäule",
"Blick nach unten",
"Bauchnabel einziehen"
]
},

{
name:"Adduktor Kräftigung",
subtitle:"Innenschenkel aktivieren",
img:"images/training3.jpg",
type:"sideHoldReps",
reps:10,
guide:[
"Seitlich liegend",
"Körper bildet eine Linie",
"Becken stabil halten",
"Bauch und Gesäß aktiv",
"Ruhig atmen"
]
},

{
name:"Liegendes Beinheben",
subtitle:"Core Kontrolle",
img:"images/training3.jpg",
type:"sideHoldReps",
reps:12,
guide:[
"Rückenlage",
"Lendenwirbelsäule bleibt am Boden",
"Bein langsam heben",
"Kontrolliert absenken"
]
}
]   

];
// =============================
load();

</script>

</body>
</html>
