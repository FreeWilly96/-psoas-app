<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Psoas Ultra PRO</title>

<link rel="apple-touch-icon" sizes="180x180" href="images/icon.png">
<link rel="manifest" href="manifest.json">

<style>

/* =============================
BASE
============================= */
body {
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,Arial;
    background:#f2f2f2;
    color:#111;
    transition:0.3s;
}

body.dark{
    background:#0b1a2f;
    color:white;
}

/* =============================
TOP
============================= */
.top {
    padding:20px 15px 10px;
}

h2 {margin:5px 0;font-size:18px;opacity:0.7;}
h3 {margin:0;font-size:22px;}

.side {
    font-size:18px;
    color:#888;
    height:22px;
}

/* =============================
IMAGE
============================= */
img {
    width:100%;
    height:25vh;
    object-fit:contain;
}

/* =============================
GUIDE
============================= */
.guide {
    margin:10px;
    padding:12px;
    border-radius:14px;
    background:#fff;
    color:#111;
}

body.dark .guide{
    background:#1e2a3a;
    color:white;
}

/* =============================
🔥 RING TIMER
============================= */
.ringWrap{
    position:relative;
    width:200px;
    height:200px;
    margin:10px auto;
}

svg{
    transform:rotate(-90deg);
}

.ringBg{
    stroke:#ddd;
}

body.dark .ringBg{
    stroke:#1e293b;
}

.ring{
    stroke:url(#grad);
    stroke-linecap:round;
    transition:stroke-dashoffset 0.5s linear;
}

.timer {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:48px;
    font-weight:bold;
}

/* =============================
PROGRESS BAR (Backup)
============================= */
#progressBar {
    width:90%;
    height:8px;
    background:#ddd;
    margin:10px auto;
    border-radius:10px;
}

body.dark #progressBar{
    background:#1e293b;
}

#progress {
    height:100%;
    width:0%;
    border-radius:10px;
    background:linear-gradient(90deg,#a855f7,#ec4899);
}

/* =============================
BOTTOM
============================= */
.bottom {
    position:fixed;
    bottom:0;
    width:100%;
    padding:10px;
    padding-bottom:calc(10px + env(safe-area-inset-bottom));
    background:rgba(255,255,255,0.95);
}

body.dark .bottom{
    background:rgba(10,20,40,0.95);
}

.controls {
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:8px;
}

.controls button {
    padding:16px;
    border:none;
    border-radius:14px;
    font-weight:bold;
    font-size:15px;
    color:white;
}

.start{background:#22c55e;}
.pause{background:#ef4444;}
.resume{background:#3b82f6;}
.skip{background:#f59e0b;}
.mode{background:#374151;}
.stop{background:#111;}

.phases{
    display:flex;
    gap:6px;
    margin-top:8px;
}

.phase{
    flex:1;
    padding:12px;
    border:none;
    border-radius:12px;
    background:#64748b;
    color:white;
}

.spacer{height:200px;}

</style>
</head>

<body>

<div class="top">
    <h2 id="phaseTitle"></h2>
    <h3 id="exerciseTitle"></h3>
    <div id="side" class="side"></div>

    <img id="exerciseImage">
</div>

<div id="guide" class="guide"></div>

<!-- 🔥 RING TIMER -->
<div class="ringWrap">
    <svg width="200" height="200">
        <defs>
            <linearGradient id="grad">
                <stop offset="0%" stop-color="#a855f7"/>
                <stop offset="100%" stop-color="#ec4899"/>
            </linearGradient>
        </defs>

        <circle class="ringBg" cx="100" cy="100" r="90" stroke-width="10" fill="none"/>
        <circle id="ring" class="ring" cx="100" cy="100" r="90" stroke-width="10" fill="none"
            stroke-dasharray="565"
            stroke-dashoffset="0"/>
    </svg>

    <div id="timer" class="timer">0</div>
</div>

<div id="progressBar"><div id="progress"></div></div>

<div class="spacer"></div>

<div class="bottom">

    <div class="controls">
        <button class="start" onclick="start()">Start</button>
        <button class="pause" onclick="pause()">Pause</button>
        <button class="resume" onclick="resume()">Resume</button>

        <button class="skip" onclick="skip()">Skip</button>
        <button class="mode" onclick="toggleMode()">Mode</button>
        <button class="stop" onclick="stop()">Beenden</button>
    </div>

    <div class="phases">
        <button class="phase" onclick="setPhase(1)">T1</button>
        <button class="phase" onclick="setPhase(2)">T2</button>
        <button class="phase" onclick="setPhase(3)">T3</button>
        <button class="phase" onclick="nextPhase()">Next</button>
    </div>

</div>

<script>

// =============================
const App = {
    paused: false,
    state: "idle",
    session: 0,
    lastSpoken: ""
};

let phaseIndex = 0;
let current = 0;
let timer = null;
let running = false;
let totalTime = 0;

// =============================
const timerEl = document.getElementById("timer");
const ring = document.getElementById("ring");

// =============================
function toggleMode(){
    document.body.classList.toggle("dark");
}

// =============================
function sleep(ms){
    return new Promise(r=>setTimeout(r,ms));
}

// =============================
function speak(text){

    if(App.paused) return;
    if(App.lastSpoken === text) return;

    App.lastSpoken = text;

    speechSynthesis.cancel();

    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "de-DE";
    msg.rate = 0.95;

    speechSynthesis.speak(msg);
}

// =============================
function update(v){
    timerEl.innerText = v;

    if(totalTime){
        let percent = v / totalTime;
        let offset = 565 * (1 - percent);
        ring.style.strokeDashoffset = offset;
    }
}

// =============================
function runTime(ex){

    let t = ex.time;
    totalTime = ex.time;

    update(t);

    timer = setInterval(()=>{

        if(!running){
            clearInterval(timer);
            return;
        }

        if(App.paused) return;

        t--;
        update(t);

        if(t <= 5 && t > 0){
            speak(t.toString());
        }

        if(t <= 0){
            clearInterval(timer);
            next();
        }

    },1000);
}

// =============================
function start(){
    if(running) return;

    running = true;
    App.paused = false;
    App.lastSpoken = "";

    let ex = phases[phaseIndex][current];

    speak(ex.name);

    setTimeout(()=>{
        run(ex);
    },800);
}

// =============================
function run(ex){
    if(ex.type==="time") runTime(ex);
}

// =============================
function pause(){
    App.paused = true;
    speechSynthesis.cancel();
}

// 🔥 SMART RESUME
function resume(){
    if(!running) return;

    App.paused = false;
    App.lastSpoken = ""; // verhindert doppelte blockierung
}

// =============================
function stop(){

    running = false;
    App.paused = false;

    clearInterval(timer);
    speechSynthesis.cancel();

    update("0");
    ring.style.strokeDashoffset = 0;

    current = 0;
}

// =============================
function skip(){

    running = false;

    clearInterval(timer);
    speechSynthesis.cancel();

    setTimeout(()=> next(),100);
}

// =============================
function next(){

    running = false;

    current++;

    if(current >= phases[phaseIndex].length){
        update("FERTIG");
        speak("Training beendet");
        return;
    }

    load();

    setTimeout(()=> start(),800);
}

// =============================
function setPhase(p){
    phaseIndex = p - 1;
    current = 0;
    load();
}

// =============================
function nextPhase(){
    phaseIndex = (phaseIndex + 1) % phases.length;
    current = 0;
    load();
}

// =============================
function load(){

    let ex = phases[phaseIndex][current];

    document.getElementById("phaseTitle").innerText = "Training " + (phaseIndex + 1);
    document.getElementById("exerciseTitle").innerText = ex.name;
    document.getElementById("exerciseImage").src = ex.img;

    let html = "<ul>";
    ex.guide.forEach(g=> html += "<li>"+g+"</li>");
    html += "</ul>";

    document.getElementById("guide").innerHTML = html;

    update(ex.time || 0);
}




// =============================
// 🔥 STABILE PHASEN
const phases = [

/* ================= PHASE 1 ================= */

{
name:"Bauchatmung",

type:"time",
time:120,

"5 Sekunden einatmen, 7 Sekunden ausatmen"
]
},

{

img:"images/phase3.jpg",
type:"side",
time:45,

"Anderes Bein bleibt gestreckt und locker",
"Tief weiteratmen und entspannen"
]
},

{

img:"images/phase3.jpg",
type:"reps",
reps:15,
rest:3,
guide:[

"Unterer Rücken leicht in den Boden drücken",
"Becken kippt nach vorne",

"Kleine ruhige Bewegung"
]
},

{

img:"images/phase3.jpg",
type:"side",
time:40,
guide:[
"Halbkniestand",
"Gesäß der hinteren Seite anspannen",
"Becken leicht nach vorne kippen",
"Oberkörper aufrecht, kein Hohlkreuz",
"Dehnung vorne in der Hüfte spüren"
]
},

{
name:"Glute Bridge",
subtitle:"Gesäßmuskulatur stärken",
img:"images/phase3.jpg",
type:"holdReps",
reps:15,
guide:[
"Rückenlage, Füße hüftbreit aufstellen",
"Hüfte nach oben drücken, Gesäß anspannen",
"Oben 5 Sekunden halten",
"Langsam wieder absenken"
]
},

{
name:"Adduktor Dehnung",
subtitle:"Leisten und Innenschenkel dehnen",
img:"images/phase3.jpg",
type:"side", // ✅ WAR "time"
time:45,
guide:[
"Breiten Stand einnehmen",
"Gewicht zur Seite verlagern",
"Andere Seite bleibt gestreckt",
"Rücken gerade halten",
"Dehnung innen spüren"
]
}
],

/* ================= PHASE 2 ================= */
[
{
name:"Bauchatmung Aktivierung",
subtitle:"Rumpf aktivieren",
img:"images/phase2.jpg",
type:"time",
time:60,
guide:[

"Spannung im Rumpf aufbauen",
"Kontrollierte Atmung"
]
},

{

]
},

},

reps:24,
rest:3,

]
},

{
name:"Seitliche Ausfallschritte",

img:"images/phase2.jpg",

reps:20,

guide:[
"Seitlich ausweichen",

"Spannung halten"
]
},

{

img:"images/phase2.jpg",

time:40,

"Dehnung halten",

]
}
],
 /* ================= TRAINING 3 ================= */
[

type:"sideHoldReps",
reps:10,

"Hüfte bleibt stabil"
]
},

{

type:"side",
time:45,
guide:[
"Seitlich liegend",
"Körper bildet eine Linie",
"Knie leicht angewinkelt",
"Becken nicht nach vorne oder hinten kippen",

"Ruhig atmen"
]
},

{

subtitle:"Ganzkörper Spannung",
img:"images/training3.jpg",
type:"time",
time:30,
guide:[
"Bauchlage, Ellenbogen unter den Schultern",
"Füße hüftbreit auseinander",

"Bauchnabel einziehen"
]
},

{

subtitle:"Innenschenkel aktivieren",
img:"images/training3.jpg",

"Seitlich liegend",

},

{

];
// =============================
load();

</script>

</body>
</html>
