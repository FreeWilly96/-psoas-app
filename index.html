<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Psoas Ultra PRO</title>

<link rel="apple-touch-icon" sizes="180x180" href="images/icon.png">
<link rel="manifest" href="manifest.json">

<style>

/* =============================
🔥 BASE + DARK MODE FIX
============================= */
body {
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,Arial;
    background:#f2f2f2;
    color:#111;
    transition:0.3s;
}

body.dark{
    background:#0b1a2f;
    color:white;
}

/* =============================
🔥 TOP APP AREA (wie Bild links)
============================= */
.top {
    padding:20px 15px 10px;
}

h2 {
    margin:5px 0;
    font-size:18px;
    opacity:0.7;
}

h3 {
    margin:0;
    font-size:22px;
}

.side {
    font-size:18px;
    color:#888;
    height:22px;
}

/* =============================
🔥 IMAGE
============================= */
img {
    width:100%;
    height:28vh;
    object-fit:contain;
}

/* =============================
🔥 GUIDE CARD
============================= */
.guide {
    margin:10px;
    padding:12px;
    border-radius:14px;
    background:#ffffff;
    color:#111;
    box-shadow:0 4px 14px rgba(0,0,0,0.1);
}

body.dark .guide{
    background:#1e2a3a;
    color:white;
}

/* =============================
🔥 TIMER
============================= */
.timer {
    font-size:70px;
    font-weight:bold;
    background:linear-gradient(90deg,#a855f7,#ec4899);
    -webkit-background-clip:text;
    color:transparent;
}

/* =============================
🔥 PROGRESS
============================= */
#progressBar {
    width:90%;
    height:10px;
    background:#ddd;
    margin:10px auto;
    border-radius:10px;
}

body.dark #progressBar{
    background:#1e293b;
}

#progress {
    height:100%;
    width:0%;
    border-radius:10px;
    background:linear-gradient(90deg,#a855f7,#ec4899);
}

/* =============================
🔥 BUTTON AREA (wie Bild rechts)
============================= */
.bottom {
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    padding:10px;
    padding-bottom:calc(10px + env(safe-area-inset-bottom));
    background:rgba(255,255,255,0.95);
    backdrop-filter:blur(10px);
}

body.dark .bottom{
    background:rgba(10,20,40,0.95);
}

/* GRID */
.controls {
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:8px;
}

.controls button {
    padding:16px;
    border:none;
    border-radius:14px;
    font-weight:bold;
    font-size:15px;
    color:white;
}

/* Farben */
.start{background:#22c55e;}
.pause{background:#ef4444;}
.resume{background:#3b82f6;}
.skip{background:#f59e0b;}
.mode{background:#374151;}
.stop{background:#111;} /* 🔥 NEU */

/* PHASE BUTTONS */
.phases{
    display:flex;
    gap:6px;
    margin-top:8px;
}

.phase{
    flex:1;
    padding:12px;
    border:none;
    border-radius:12px;
    background:#64748b;
    color:white;
}

.phase.active{
    background:#a855f7;
}

/* Abstand unten damit nichts überdeckt */
.spacer{
    height:180px;
}

</style>
</head>

<body>

<div class="top">
    <h2 id="phaseTitle"></h2>
    <h3 id="exerciseTitle"></h3>
    <div id="side" class="side"></div>

    <img id="exerciseImage">
</div>

<div id="guide" class="guide"></div>

<div id="timer" class="timer">0</div>
<div id="progressBar"><div id="progress"></div></div>

<div class="spacer"></div>

<!-- =============================
🔥 BUTTON AREA
============================= -->
<div class="bottom">

    <div class="controls">
        <button class="start" onclick="start()">Start</button>
        <button class="pause" onclick="pause()">Pause</button>
        <button class="resume" onclick="resume()">Resume</button>

        <button class="skip" onclick="skip()">Skip</button>
        <button class="mode" onclick="toggleMode()">Mode</button>
        <button class="stop" onclick="stop()">Beenden</button>
    </div>

    <div class="phases">
        <button id="btnP1" class="phase" onclick="setPhase(1)">T1</button>
        <button id="btnP2" class="phase" onclick="setPhase(2)">T2</button>
        <button id="btnP3" class="phase" onclick="setPhase(3)">T3</button>
        <button class="phase" onclick="nextPhase()">Next</button>
    </div>

</div>

<script>

// =============================
// 🔥 CORE STATE
const App = {
    paused: false,
    state: "idle",
    session: 0
};

let phaseIndex = 0;
let current = 0;
let timer = null;
let running = false;

// =============================
const phaseTitle = document.getElementById("phaseTitle");
const exerciseTitle = document.getElementById("exerciseTitle");
const exerciseImage = document.getElementById("exerciseImage");
const guide = document.getElementById("guide");
const timerEl = document.getElementById("timer");
const side = document.getElementById("side");
const progress = document.getElementById("progress");

// =============================
// 🔥 DARK MODE FIX (jetzt sichtbar)
function toggleMode(){
    document.body.classList.toggle("dark");
}

// =============================
function sleep(ms){
    return new Promise(r=>setTimeout(r,ms));
}

// =============================
function speak(text){
    speechSynthesis.cancel();

    return new Promise(resolve=>{
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = "de-DE";
        msg.rate = 0.95;
        msg.onend = () => setTimeout(resolve, 80);
        speechSynthesis.speak(msg);
    });
}

// =============================
async function countdown(sec){
    for(let i=sec;i>0;i--){
        if(!running) return;
        while(App.paused) await sleep(150);

        update(i);
        await speak(i.toString());
    }
}

// =============================
async function start(){

    if(running) return;

    running = true;
    App.state = "running";
    App.session++;

    let ex = phases[phaseIndex][current];

    await speak(ex.name);

    if(ex.subtitle) await speak(ex.subtitle);

    if(ex.guide){
        for(let g of ex.guide){
            await speak(g);
        }
    }

    await sleep(1000);

    await speak("Bereit machen");
    await countdown(3);

    run(ex);
}

// =============================
function run(ex){
    if(ex.type==="time") runTime(ex);
    if(ex.type==="reps") runReps(ex);
    if(ex.type==="side") runSide(ex);
    if(ex.type==="holdReps") runHoldReps(ex);
    if(ex.type==="sideHoldReps") runSideHoldReps(ex);
}

// =============================
function runTime(ex){

    let t = ex.time;
    update(t);

    timer = setInterval(()=>{

        if(!running){
            clearInterval(timer);
            return;
        }

        if(App.paused) return;

        t--;
        update(t);

        if(t <= 5 && t > 0){
            speak(t.toString());
        }

        if(t <= 0){
            clearInterval(timer);
            next();
        }

    },1000);
}

// =============================
async function runReps(ex){

    let reps = ex.reps;

    while(reps > 0 && running){

        if(App.paused){
            await sleep(150);
            continue;
        }

        update(reps);
        await speak(reps.toString());

        reps--;
        await sleep(ex.rest * 1000);
    }

    next();
}

// =============================
async function runSide(ex){

    let sides = ["rechts","links"];

    for(let i=0;i<sides.length;i++){

        if(!running) return;

        let s = sides[i];

        showSide(s);
        await speak("Seite " + s);

        let t = ex.time;

        while(t > 0 && running){

            if(App.paused){
                await sleep(150);
                continue;
            }

            update(t);

            if(t <= 5 && t > 0){
                speak(t.toString());
            }

            await sleep(1000);
            t--;
        }

        if(i < sides.length - 1){
            await speak("Seitenwechsel");
            await sleep(5000);
        }
    }

    showSide("");
    next();
}

// =============================
function stop(){

    running = false;
    App.paused = false;
    App.session++;

    clearInterval(timer);
    speechSynthesis.cancel();

    update("0");
    showSide("");

    current = 0;
    updateProgress();
}

// =============================
function skip(){

    running = false;
    App.session++;

    clearInterval(timer);
    speechSynthesis.cancel();

    setTimeout(()=>{
        next();
    },120);
}

// =============================
async function next(){

    running = false;

    current++;
    updateProgress();

    if(current >= phases[phaseIndex].length){
        update("FERTIG 💪");
        await speak("Training beendet");
        return;
    }

    load();

    await sleep(1500);
    start();
}

// =============================
function pause(){
    App.paused = true;
    speechSynthesis.cancel();
}

function resume(){
    App.paused = false;
}

// =============================
function nextPhase(){
    phaseIndex = (phaseIndex + 1) % phases.length;
    current = 0;
    load();
}

// =============================
function setPhase(p){
    phaseIndex = p - 1;
    current = 0;
    load();
}

// =============================
function load(){

    let ex = phases[phaseIndex][current];

    phaseTitle.innerText = "Training " + (phaseIndex + 1);
    exerciseTitle.innerText = ex.name;
    exerciseImage.src = ex.img;

    let html = "<ul>";
    ex.guide.forEach(g=>{
        html += "<li>" + g + "</li>";
    });
    html += "</ul>";

    guide.innerHTML = html;

    update(ex.time || ex.reps);
    updateProgress();
}

// =============================
function update(v){
    timerEl.innerText = v;
}

function showSide(s){
    side.innerText = s;
}

// =============================
function updateProgress(){
    let total = phases[phaseIndex].length;
    progress.style.width = ((current / total) * 100) + "%";
}




// =============================
// 🔥 STABILE PHASEN
const phases = [

/* ================= PHASE 1 ================= */
[
{
name:"Bauchatmung",
subtitle:"Nervensystem beruhigen",
img:"images/phase3.jpg",
type:"time",
time:120,
guide:[
"Rückenlage, Füße aufgestellt",
"Eine Hand auf Bauch, eine auf Brust",
"Langsam in den Bauch atmen",
"5 Sekunden einatmen, 7 Sekunden ausatmen"
]
},

{
name:"Knie zur Brust",
subtitle:"Psoas Entlastung",
img:"images/phase3.jpg",
type:"side",
time:45,
guide:[
"Rückenlage",
"Ein Knie zur Brust ziehen und mit Händen halten",
"Anderes Bein bleibt gestreckt und locker",
"Tief weiteratmen und entspannen"
]
},

{
name:"Mini-Becken-Kippung",
subtitle:"Kontrolle und Entlastung",
img:"images/phase3.jpg",
type:"reps",
reps:15,
rest:3,
guide:[
"Rückenlage, Füße aufgestellt",
"Unterer Rücken leicht in den Boden drücken",
"Becken kippt nach vorne",
"Spannung kurz halten und wieder lösen",
"Kleine ruhige Bewegung"
]
},

{
name:"Hüftbeuger Dehnung",
subtitle:"Psoas und Hüftbeuger dehnen",
img:"images/phase3.jpg",
type:"side",
time:40,
guide:[
"Halbkniestand",
"Gesäß der hinteren Seite anspannen",
"Becken leicht nach vorne kippen",
"Oberkörper aufrecht, kein Hohlkreuz",
"Dehnung vorne in der Hüfte spüren"
]
},

{
name:"Glute Bridge",
subtitle:"Gesäßmuskulatur stärken",
img:"images/phase3.jpg",
type:"holdReps",
reps:15,
guide:[
"Rückenlage, Füße hüftbreit aufstellen",
"Hüfte nach oben drücken, Gesäß anspannen",
"Oben 5 Sekunden halten",
"Langsam wieder absenken"
]
},

{
name:"Adduktor Dehnung",
subtitle:"Leisten und Innenschenkel dehnen",
img:"images/phase3.jpg",
type:"side", // ✅ WAR "time"
time:45,
guide:[
"Breiten Stand einnehmen",
"Gewicht zur Seite verlagern",
"Andere Seite bleibt gestreckt",
"Rücken gerade halten",
"Dehnung innen spüren"
]
}
],

/* ================= PHASE 2 ================= */
[
{
name:"Bauchatmung Aktivierung",
subtitle:"Rumpf aktivieren",
img:"images/phase2.jpg",
type:"time",
time:60,
guide:[
"Ruhig atmen",
"Spannung im Rumpf aufbauen",
"Kontrollierte Atmung"
]
},

{
name:"Dynamische Hüftöffnung",
subtitle:"Beweglichkeit und Kontrolle",
img:"images/phase2.jpg",
type:"sideHoldReps",
reps:10,
guide:[
"Ausfallschritt nach vorne",
"Hüfte vor und zurück bewegen",
"Spannung halten",
"Bewegung kontrolliert ausführen"
]
},

{
name:"Glute Bridge einbeinig",
subtitle:"Stabilität und Kraft",
img:"images/phase2.jpg",
type:"sideHoldReps",
reps:10,
guide:[
"Ein Bein anheben",
"Hüfte nach oben drücken",
"Spannung im Gesäß halten",
"Stabil bleiben"
]
},

{
name:"Dead Bug",
subtitle:"Rumpfstabilität",
img:"images/phase2.jpg",
type:"reps",
reps:24,
rest:3,
guide:[
"Rückenlage",
"Arme und Beine anheben",
"Gegengleich bewegen",
"Rumpf stabil halten",
"Unterer Rücken bleibt am Boden"
]
},

{
name:"Seitliche Ausfallschritte",
subtitle:"Beweglichkeit Hüfte",
img:"images/phase2.jpg",
type:"reps",
reps:20,
rest:3,
guide:[
"Seitlich ausweichen",
"Hüfte nach hinten schieben",
"Gewicht von rechts nach links verlagern",
"Spannung halten"
]
},

{

subtitle:"Mobilität und Dehnung",
img:"images/phase2.jpg",
type:"side", // ✅ WAR "time"
time:40,
guide:[
"Dehnung halten",

"Spannung ruhig halten"
]
}
],
 /* ================= TRAINING 3 ================= */
[
{
name:"Einbeiniges Standknieheben",
subtitle:"Stabilität und Kontrolle",
img:"images/training3.jpg",
type:"sideHoldReps",
reps:10,
guide:[
"Aufrecht stehen",
"Bauchnabel einziehen",
"Knie kontrolliert heben",
"Hüfte bleibt stabil"
]
},

{

subtitle:"Rumpfstabilität seitlich",
img:"images/training3.jpg",
type:"side",
time:45,
guide:[

"Körper bildet eine Linie",
"Knie leicht angewinkelt",

]
},

{

img:"images/training3.jpg",

guide:[
"Bauchlage, Ellenbogen unter den Schultern",
"Füße hüftbreit auseinander",

"Blick nach unten",
"Bauchnabel einziehen"
]
},

{
name:"Adduktor Kräftigung",
subtitle:"Innenschenkel aktivieren",
img:"images/training3.jpg",
type:"sideHoldReps",
reps:10,
guide:[
"Seitlich liegend",
"Körper bildet eine Linie",
"Becken stabil halten",
"Bauch und Gesäß aktiv",
"Ruhig atmen"
]
},

{
name:"Liegendes Beinheben",
subtitle:"Core Kontrolle",
img:"images/training3.jpg",
type:"sideHoldReps",
reps:12,
guide:[
"Rückenlage",
"Lendenwirbelsäule bleibt am Boden",
"Bein langsam heben",
"Kontrolliert absenken"
]
}
]   

];
// =============================
load();

</script>

</body>
</html>
