<!DOCTYPE html>
<html lang="de">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Psoas Ultra+</title>

<style>
body{
  font-family:-apple-system;
  background:#0f172a;
  color:white;
  text-align:center;
  margin:0;
}

.header{
  padding:20px;
  font-size:24px;
  font-weight:bold;
}

.exercise{
  font-size:22px;
  margin-top:10px;
}

.next{
  font-size:16px;
  opacity:0.7;
}

img{
  width:90%;
  border-radius:20px;
  margin-top:15px;
}

.timer{
  font-size:70px;
  margin:20px;
}

button{
  padding:15px;
  margin:10px;
  border:none;
  border-radius:12px;
  font-size:18px;
}

.start{background:#22c55e;color:white;}
.pause{background:#ef4444;color:white;}
</style>
</head>

<body>

<div class="header">Psoas Ultra+</div>

<div class="exercise" id="exercise">Start drücken</div>
<div class="next" id="next"></div>

<img id="img" src="phase1.jpg">

<div class="timer" id="timer">0</div>

<button class="start" onclick="start()">Start</button>
<button class="pause" onclick="pause()">Pause</button>

<script>

// ----------------------
// PHASE 1 (ruhig)
// ----------------------
let phase1 = [

{name:"Bauchatmung", time:60},
{name:"Knie zur Brust links", time:45},
{name:"Knie zur Brust rechts", time:45},
{name:"Mini-Becken-Kippung", time:60},
{name:"Hüftbeuger Dehnung links", time:45},
{name:"Hüftbeuger Dehnung rechts", time:45},
{name:"Glute Bridge", time:60},
{name:"Adduktor Dehnung links", time:45},
{name:"Adduktor Dehnung rechts", time:45}

];

// ----------------------
// PHASE 2 (dynamisch)
// ----------------------
let phase2 = [

{name:"Dynamische Hüftöffnung links", time:45},
{name:"Dynamische Hüftöffnung rechts", time:45},
{name:"Glute Bridge einbeinig links", time:45},
{name:"Glute Bridge einbeinig rechts", time:45},
{name:"Dead Bug", time:60},
{name:"Seitliche Ausfallschritte links", time:45},
{name:"Seitliche Ausfallschritte rechts", time:45},
{name:"Adduktor + Aktivierung links", time:45},
{name:"Adduktor + Aktivierung rechts", time:45}

];

// ----------------------
// SYSTEM
// ----------------------
let plan = [];
let index = 0;
let time = 0;
let running = false;
let interval;

// 👉 Phase automatisch wechseln
function getPlan(){
  let day = new Date().getDate();

  if(day <= 14){
    document.getElementById("img").src = "phase1.jpg";
    return phase1;
  }else{
    document.getElementById("img").src = "phase2.jpg";
    return phase2;
  }
}

// ----------------------
// UI
// ----------------------
function updateUI(){
  let ex = plan[index];

  document.getElementById("exercise").innerText = ex.name;
  document.getElementById("timer").innerText = time;

  if(plan[index+1]){
    document.getElementById("next").innerText =
      "Als nächstes: " + plan[index+1].name;
  }else{
    document.getElementById("next").innerText = "Letzte Übung";
  }
}

// ----------------------
// START
// ----------------------
function start(){

  if(!running){

    if(plan.length === 0){
      plan = getPlan();
      index = 0;
      time = plan[0].time;
      updateUI();
    }

    running = true;

    interval = setInterval(()=>{

      if(time > 0){
        time--;
        document.getElementById("timer").innerText = time;
      }else{

        index++;

        if(index >= plan.length){
          alert("Fertig 🎉");
          clearInterval(interval);
          running = false;
          return;
        }

        time = plan[index].time;
        updateUI();
      }

    },1000);
  }
}

// ----------------------
// PAUSE
// ----------------------
function pause(){
  running = false;
  clearInterval(interval);
}

</script>

</body>
</html>
