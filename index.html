<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psoas Ultra PRO</title>

<link rel="apple-touch-icon" sizes="180x180" href="images/icon.png">
<link rel="manifest" href="manifest.json">

<style>

body {
    margin:0;
    font-family:Arial;
    text-align:center;
    background:#f2f2f2;
    transition:0.3s;
}

body.dark {
    background:#0b1a2f;
    color:white;
}

img {
    width:95%;
    height:40vh;
    object-fit:contain;
}

.timer {
    font-size:80px;
}

.side {
    font-size:30px;
    height:40px;
}

/* 🔥 GUIDE TEXT */
.guide {
    max-width:500px;
    margin:10px auto;
    text-align:left;
    padding:10px;
    border-radius:10px;
    background:white;
}

body.dark .guide {
    background:#1e2a3a;
}

/* BUTTONS */
button {
    padding:10px;
    margin:5px;
    border:none;
    border-radius:10px;
    color:white;
}

.start{background:green;}
.pause{background:red;}
.skip{background:orange;}
.mode{background:black;}

.phase {
    background:#666;
    color:white;
}

.phase.active {
    background:purple;
}

</style>
</head>

<body>

<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>
<div id="side" class="side"></div>

<img id="exerciseImage">

<div id="guide" class="guide"></div>

<div id="timer" class="timer">0</div>

<button class="start" onclick="start()">Start</button>
<button class="pause" onclick="pause()">Pause</button>
<button class="skip" onclick="next()">Skip</button>
<button class="mode" onclick="toggleMode()">Mode</button>

<br>

<button id="btnP1" class="phase" onclick="setPhase(1)">Phase 1</button>
<button id="btnP2" class="phase" onclick="setPhase(2)">Phase 2</button>

<script>

// =============================
let phaseIndex = 0;
let current = 0;
let timer = null;
let running = false;

// =============================
// DARK MODE
function toggleMode(){
    document.body.classList.toggle("dark");
    localStorage.setItem("darkMode", document.body.classList.contains("dark"));
}

if(localStorage.getItem("darkMode") === "true"){
    document.body.classList.add("dark");
}

// =============================
function speak(text){
    return new Promise(resolve=>{
        speechSynthesis.cancel();
        let msg = new SpeechSynthesisUtterance(text);
        msg.lang="de-DE";
        msg.rate=0.95;
        msg.onend = resolve;
        speechSynthesis.speak(msg);
    });
}

// =============================
async function start(){

    if(running) return;
    running = true;

    let ex = phases[phaseIndex][current];

    await speak(ex.name);
    await speak(ex.speech);

    await countdown();

    run(ex);
}

// =============================
async function countdown(){
    for(let i=3;i>0;i--){
        update(i);
        await speak(i.toString());
    }
}

// =============================
function run(ex){

    if(ex.type==="time") runTime(ex);
    if(ex.type==="reps") runReps(ex);
    if(ex.type==="side") runSide(ex);
    if(ex.type==="holdReps") runHoldReps(ex);
    if(ex.type==="sideHoldReps") runSideHoldReps(ex);
}

// =============================
function runTime(ex){

    let t = ex.time;

    timer = setInterval(()=>{
        t--;
        update(t);

        if(t<=5 && t>0) speak(t.toString());

        if(t<=0) next();

    },1000);
}

// =============================
async function runReps(ex){

    let reps = ex.reps;

    while(reps > 0){
        update(reps);
        await speak(reps.toString());
        reps--;
        await sleep(ex.rest * 1000);
    }

    next();
}

// =============================
async function runHoldReps(ex){

    let reps = ex.reps;

    while(reps > 0){

        if(reps === ex.reps){
            await speak("Spannung halten für fünf Sekunden");
        } else {
            await speak(reps.toString());
        }

        update(reps);
        reps--;

        await sleep(5000);
    }

    next();
}

// =============================
async function runSideHoldReps(ex){

    let sides = ["rechts","links"];

    for(let side of sides){

        showSide(side);
        await speak("Seite " + side);
        await sleep(1000);

        let reps = ex.reps;

        while(reps > 0){

            if(reps === ex.reps){
                await speak("Spannung halten für fünf Sekunden");
            } else {
                await speak(reps.toString());
            }

            update(reps);
            reps--;

            await sleep(5000);
        }
    }

    next();
}

// =============================
function runSide(ex){

    let sides = ["rechts","links"];
    let i = 0;

    function go(){

        if(i >= sides.length){
            next();
            return;
        }

        showSide(sides[i]);
        speak("Seite " + sides[i]);

        let t = ex.time;

        timer = setInterval(()=>{

            t--;
            update(t);

            if(t <= 0){
                clearInterval(timer);
                i++;
                setTimeout(go,1000);
            }

        },1000);
    }

    go();
}

// =============================
async function next(){

    clearInterval(timer);
    running = false;

    current++;

    if(current >= phases[phaseIndex].length){
        alert("Training fertig 💪");
        current = 0;
    }

    let ex = phases[phaseIndex][current];

    await speak("Nächste Übung");
    await speak(ex.name);
    await speak(ex.speech);

    await rest();

    load();
    start();
}

// =============================
async function rest(){
    for(let i=15;i>0;i--){
        update(i);
        await sleep(1000);
    }
}

// =============================
function pause(){
    clearInterval(timer);
    running = false;
    speechSynthesis.cancel();
}

// =============================
function setPhase(p){
    phaseIndex = p-1;
    current = 0;
    running = false;
    load();
}

// =============================
function load(){

    let ex = phases[phaseIndex][current];

    document.getElementById("phaseTitle").innerText = "Phase " + (phaseIndex+1);
    document.getElementById("exerciseTitle").innerText = ex.name;
    document.getElementById("exerciseImage").src = ex.img;

    // 🔥 TEXT IM UI SICHTBAR
    let html = "<ul>";
    ex.speech.split(".").forEach(line=>{
        if(line.trim() !== ""){
            html += "<li>" + line.trim() + "</li>";
        }
    });
    html += "</ul>";

    document.getElementById("guide").innerHTML = html;

    update(ex.time || ex.reps);

    updatePhaseButtons();
}

// =============================
function update(v){
    document.getElementById("timer").innerText = v;
}

function showSide(s){
    document.getElementById("side").innerText = s;
}

function sleep(ms){
    return new Promise(r=>setTimeout(r,ms));
}

// =============================
function updatePhaseButtons(){

    document.getElementById("btnP1").classList.remove("active");
    document.getElementById("btnP2").classList.remove("active");

    if(phaseIndex === 0){
        document.getElementById("btnP1").classList.add("active");
    } else {
        document.getElementById("btnP2").classList.add("active");
    }
}

// =============================
// PHASEN (UNVERÄNDERT)
const phases = [...phases]; // bleibt wie vorher

// =============================
load();

</script>

</body>
</html>
