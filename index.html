<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psoas Ultra PRO</title>

<link rel="apple-touch-icon" sizes="180x180" href="images/icon.png">
<link rel="manifest" href="manifest.json">

<style>
body {margin:0;font-family:Arial;text-align:center;background:#f2f2f2;transition:0.3s;}
body.dark {background:#0b1a2f;color:white;}
img {width:95%;height:40vh;object-fit:contain;}
.timer {font-size:90px;font-weight:bold;}
.side {font-size:28px;height:40px;}
.guide {max-width:500px;margin:10px auto;padding:10px;border-radius:10px;background:white;}
body.dark .guide {background:#1e2a3a;}
button {padding:10px;margin:5px;border:none;border-radius:10px;color:white;}
.start{background:green;}
.pause{background:red;}
.skip{background:orange;}
.mode{background:black;}
.phase {background:#666;}
.phase.active {background:purple;}
#progressBar {width:90%;height:10px;background:#ccc;margin:10px auto;border-radius:10px;}
#progress {height:100%;width:0%;background:linear-gradient(90deg,purple,deeppink);}
</style>
</head>

<body>

<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>
<div id="side" class="side"></div>

<img id="exerciseImage">
<div id="guide" class="guide"></div>

<div id="timer" class="timer">0</div>
<div id="progressBar"><div id="progress"></div></div>

<button class="start" onclick="start()">Start</button>
<button class="pause" onclick="pause()">Pause</button>
<button onclick="resume()">Resume</button>
<button class="skip" onclick="skip()">Skip</button>
<button class="mode" onclick="toggleMode()">Mode</button>

<br>

<button id="btnP1" class="phase" onclick="setPhase(1)">Training 1</button>
<button id="btnP2" class="phase" onclick="setPhase(2)">Training 2</button>
<button id="btnP3" class="phase" onclick="setPhase(3)">Training 3</button>    
<button class="mode" onclick="nextPhase()">Nächstes Training</button>

<script>

// =============================
// 🔥 CORE STATE
const App = {
    paused: false,
    state: "idle",
    session: 0
};

let phaseIndex = 0;
let current = 0;
let timer = null;
let running = false;

// =============================
const phaseTitle = document.getElementById("phaseTitle");
const exerciseTitle = document.getElementById("exerciseTitle");
const exerciseImage = document.getElementById("exerciseImage");
const guide = document.getElementById("guide");
const timerEl = document.getElementById("timer");
const side = document.getElementById("side");
const progress = document.getElementById("progress");

// =============================
// 🔥 MODE
function toggleMode(){
    document.body.classList.toggle("dark");
}

// =============================
// 🔥 SMART SLEEP (pausable)
function sleep(ms){
    return new Promise(resolve=>{
        const start = Date.now();

        function loop(){
            if(!running) return resolve();
            if(App.paused) return requestAnimationFrame(loop);

            if(Date.now() - start >= ms) resolve();
            else requestAnimationFrame(loop);
        }

        loop();
    });
}

// =============================
// 🔥 COACH SPEAK V2
function speak(text, pauseAfter=250){

    return new Promise(resolve=>{

        if(!text) return resolve();

        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = "de-DE";
        msg.rate = 0.95;

        msg.onend = async ()=>{
            await sleep(pauseAfter);
            resolve();
        };

        speechSynthesis.speak(msg);
    });
}

// =============================
// 🔥 COUNTDOWN (ruhiger Rhythmus)
async function countdown(sec){

    for(let i=sec;i>0;i--){

        if(!running) return;
        while(App.paused) await sleep(150);

        update(i);

        await speak(i.toString(), 150);
    }
}

// =============================
// 🔥 START FLOW (Coach Style)
async function start(){

    if(running) return;

    App.session++;
    running = true;
    App.state = "running";

    await playExercise();
}

// =============================
// 🔥 COACH FLOW
async function playExercise(){

    let ex = phases[phaseIndex][current];

    // 1️⃣ Übung
    await speak(ex.name, 300);

    // 2️⃣ Beschreibung natürlich
    if(ex.subtitle){
        await speak(ex.subtitle, 350);
    }

    if(ex.guide){
        for(let g of ex.guide){
            await speak(g, 300);
        }
    }

    // 3️⃣ Denkpause
    await sleep(900);

    // 4️⃣ Ready Phase
    await speak("Bereit machen", 400);

    await countdown(3);

    // 5️⃣ RUN
    run(ex);
}

// =============================
function run(ex){

    if(ex.type==="time") runTime(ex);
    if(ex.type==="reps") runReps(ex);
    if(ex.type==="side") runSide(ex);
    if(ex.type==="holdReps") runHoldReps(ex);
    if(ex.type==="sideHoldReps") runSideHoldReps(ex);
}

// =============================
// 🔥 TIME
function runTime(ex){

    let t = ex.time;
    update(t);

    timer = setInterval(()=>{

        if(!running){
            clearInterval(timer);
            return;
        }

        if(App.paused) return;

        t--;
        update(t);

        if(t === 10) speak("Noch zehn Sekunden", 200);

        if(t<=0){
            clearInterval(timer);
            next();
        }

    },1000);
}

// =============================
// 🔥 REPS
async function runReps(ex){

    let reps = ex.reps;

    while(reps > 0 && running){

        if(App.paused){
            await sleep(150);
            continue;
        }

        update(reps);

        await speak(reps.toString(), 120);

        reps--;
        await sleep(ex.rest * 1000);
    }

    next();
}

// =============================
// 🔥 SIDE
async function runSide(ex){

    let sides = ["rechts","links"];

    for(let i=0;i<sides.length;i++){

        let s = sides[i];

        if(!running) return;

        showSide(s);

        await speak("Seite " + s, 300);

        let t = ex.time;

        while(t > 0 && running){

            if(App.paused){
                await sleep(150);
                continue;
            }

            update(t);
            await sleep(1000);
            t--;
        }

        if(i===0){
            await sleep(1500);
            await speak("Seitenwechsel", 400);
        }
    }

    next();
}

// =============================
// 🔥 HOLD
async function runHoldReps(ex){

    let reps = ex.reps;

    while(reps > 0 && running){

        if(App.paused){
            await sleep(150);
            continue;
        }

        update("HALTEN");

        await speak("Halten", 200);

        await sleep(ex.holdTime || 4000);

        reps--;
    }

    next();
}

// =============================
// 🔥 SIDE HOLD (Coach Timing)
async function runSideHoldReps(ex){

    let sides = ["rechts","links"];

    for(let i=0;i<sides.length;i++){

        let s = sides[i];

        if(!running) return;

        showSide(s);

        await speak("Seite " + s, 300);

        let reps = ex.reps;

        while(reps > 0 && running){

            if(App.paused){
                await sleep(150);
                continue;
            }

            update(reps);

            await speak("Halten", 200);

            await sleep(ex.holdTime || 4000);

            reps--;
        }

        if(i===0){
            await sleep(1700);
            await speak("Seitenwechsel", 400);
        }
    }

    next();
}

// =============================
// 🔥 SKIP
function skip(){

    running = false;
    App.session++;

    clearInterval(timer);
    speechSynthesis.cancel();

    setTimeout(()=>{
        next();
    },120);
}

// =============================
// 🔥 NEXT
async function next(){

    running = false;

    current++;

    updateProgress();

    if(current >= phases[phaseIndex].length){

        update("FERTIG 💪");
        await speak("Training beendet", 400);
        return;
    }

    load();

    await sleep(1200);

    start();
}

// =============================
function pause(){
    App.paused = true;
}

function resume(){
    App.paused = false;
}

// =============================
function nextPhase(){
    phaseIndex = (phaseIndex + 1) % phases.length;
    current = 0;
    load();
}

// =============================
function setPhase(p){
    phaseIndex = p - 1;
    current = 0;
    load();
}

// =============================
function load(){

    let ex = phases[phaseIndex][current];

    phaseTitle.innerText = "Training " + (phaseIndex + 1);
    exerciseTitle.innerText = ex.name;
    exerciseImage.src = ex.img;

    let html = "<ul>";
    ex.guide.forEach(g=>{
        html += "<li>" + g + "</li>";
    });
    html += "</ul>";

    guide.innerHTML = html;

    update(ex.time || ex.reps);
    updateProgress();
}

// =============================
function update(v){
    timerEl.innerText = v;
}

function showSide(s){
    side.innerText = s;
}

// =============================
function updateProgress(){
    let total = phases[phaseIndex].length;
    progress.style.width = ((current / total) * 100) + "%";
}


// =============================

},

"Langsam wieder absenken"
]
},

</script>
