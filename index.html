<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psoas Ultra PRO</title>

<style>
body {
    margin:0;
    font-family:-apple-system, Arial;
    text-align:center;
    background:#f2f2f2;
}

body.dark {
    background:#0b1a2f;
    color:white;
}

img {
    width:95%;
    height:35vh;
    object-fit:contain;
}

.timer {
    font-size:90px;
    font-weight:bold;
}

.progress {
    width:90%;
    height:10px;
    background:#ddd;
    margin:10px auto;
    border-radius:10px;
    overflow:hidden;
}

.bar {
    height:100%;
    width:0%;
    background:linear-gradient(90deg, purple, deeppink);
    transition:width 0.5s;
}

button {
    padding:12px;
    margin:5px;
    border:none;
    border-radius:10px;
    color:white;
}

.start{background:green;}
.pause{background:red;}
.skip{background:orange;}
.mode{background:black;}

.phase.active {
    background:linear-gradient(45deg, purple, deeppink);
}
</style>
</head>

<body>

<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>

<img id="exerciseImage">

<div class="progress"><div id="bar" class="bar"></div></div>

<div id="timer" class="timer">0</div>
<div id="side"></div>

<button class="start" onclick="start()">Start</button>
<button class="pause" onclick="pause()">Pause</button>
<button class="skip" onclick="next()">Skip</button>

<br>

<button id="btnP1" onclick="setPhase(1)">Training 1</button>
<button id="btnP2" onclick="setPhase(2)">Training 2</button>
<button id="btnP3" onclick="setPhase(3)">Training 3</button>

<script>

// =============================
let phaseIndex=0, current=0, timer=null;
let running=false, stopSignal=false;

// =============================
// 🔊 SOUND
const beep = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

// =============================
// 📳 VIBRATION
function vibrate(ms=200){
    if(navigator.vibrate) navigator.vibrate(ms);
}

// =============================
// 🧠 MOTIVATION
const motivation = [
"Sehr stark",
"Du ziehst das durch",
"Perfekte Kontrolle",
"Bleib stabil",
"Genau so"
];

function coach(){
    let txt = motivation[Math.floor(Math.random()*motivation.length)];
    speak(txt);
}

// =============================
// AUDIO
function speak(text){
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang="de-DE";
    speechSynthesis.speak(msg);
}

// =============================
async function start(){

    if(running) return;
    running=true;

    let ex = phases[phaseIndex][current];

    speak(ex.name);

    await sleep(500);

    // 3-2-1 SOUND COUNTDOWN
    for(let i=3;i>0;i--){
        update(i);
        beep.play();
        await sleep(1000);
    }

    vibrate(300);
    coach();

    run(ex);
}

// =============================
function run(ex){

    if(ex.type==="time"){
        let t=ex.time;

        timer=setInterval(()=>{
            t--;
            update(t);
            updateBar(t, ex.time);

            if(t===5){
                coach();
            }

            if(t<=0) next();

        },1000);
    }
}

// =============================
function updateBar(t, total){
    let percent = (1 - t/total) * 100;
    document.getElementById("bar").style.width = percent + "%";
}

// =============================
function update(v){
    document.getElementById("timer").innerText=v;
}

// =============================
function next(){

    clearInterval(timer);
    vibrate(400);

    current++;

    if(current >= phases[phaseIndex].length){
        speak("Fertig");
        alert("Training beendet 💪");
        current=0;
        return;
    }

    load();
    start();
}

// =============================
function pause(){
    clearInterval(timer);
    running=false;
    speechSynthesis.cancel();
}

// =============================
function setPhase(p){
    phaseIndex=p-1;
    current=0;
    load();
}

// =============================
function load(){

    let ex = phases[phaseIndex][current];

    document.getElementById("phaseTitle").innerText="Training "+(phaseIndex+1);
    document.getElementById("exerciseTitle").innerText=ex.name;
    document.getElementById("exerciseImage").src=ex.img;

    update(ex.time||0);
    document.getElementById("bar").style.width="0%";
}

// =============================
function sleep(ms){
    return new Promise(r=>setTimeout(r,ms));
}

// =============================
function updateButtons(){

    btnP1.classList.remove("active");
btnP2.classList.remove("active");
btnP3.classList.remove("active");

if(phaseIndex===0){
    btnP1.classList.add("active");
} else if(phaseIndex===1){
    btnP2.classList.add("active");
} else {
    btnP3.classList.add("active");
}
}

// =============================
// 🔥 STABILE PHASEN
const phases = [

/* ================= PHASE 1 ================= */

]
},

]

"Kleine ruhige Bewegung"
]

"Dehnung vorne in der Hüfte spüren"
]
},

{
name:"Glute Bridge",

img:"images/phase3.jpg",
type:"holdReps",
reps:15,
guide:[
"Rückenlage, Füße hüftbreit aufstellen",

"Oben 5 Sekunden halten",
"Langsam wieder absenken"
]
},

{

img:"images/phase3.jpg",

/* ================= PHASE 2 ================= */

]
},

{

"Bauchlage, Ellenbogen unter den Schultern",
"Füße hüftbreit auseinander",

"Blick nach unten",
"Bauchnabel einziehen"
]
},

{

img:"images/training3.jpg",

{

// =============================
load();

</script>
