<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psoas Ultra PRO</title>

<link rel="apple-touch-icon" sizes="180x180" href="images/icon.png">
<link rel="manifest" href="manifest.json">

<style>
body { margin:0; font-family:Arial; text-align:center; background:#f2f2f2; }
img { width:95%; height:40vh; object-fit:contain; }
.timer { font-size:80px; }
.side { font-size:30px; height:40px; }
button { padding:10px; margin:5px; border:none; border-radius:10px; color:white; }
.start{background:green;} .pause{background:red;} .skip{background:orange;}
.phase{background:#999;} .phase.active{background:purple;}
</style>
</head>

<body>

<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>
<div id="side" class="side"></div>

<img id="exerciseImage">
<div id="guide"></div>

<div id="timer" class="timer">0</div>

<button class="start" onclick="start()">Start</button>
<button class="pause" onclick="pause()">Pause</button>
<button class="skip" onclick="next()">Skip</button>

<br>
<button onclick="setPhase(1)">Phase 1</button>
<button onclick="setPhase(2)">Phase 2</button>

<script>

// =============================
let phaseIndex = 0;
let current = 0;
let timer = null;
let running = false;

// =============================
// 🔊 STABILES AUDIO SYSTEM
function speak(text){
    return new Promise(resolve=>{
        speechSynthesis.cancel();
        let msg = new SpeechSynthesisUtterance(text);
        msg.lang="de-DE";
        msg.rate=0.95;
        msg.onend = resolve;
        speechSynthesis.speak(msg);
    });
}

// =============================
async function start(){

    if(running) return;
    running = true;

    let ex = phases[phaseIndex][current];

    await speak(ex.name);
    await speak(ex.speech);

    await countdown();

    run(ex);
}

// =============================
async function countdown(){
    for(let i=3;i>0;i--){
        update(i);
        await speak(i.toString());
    }
}

// =============================
function run(ex){

    if(ex.type==="time") runTime(ex);
    if(ex.type==="reps") runReps(ex);
    if(ex.type==="side") runSide(ex);
    if(ex.type==="holdReps") runHoldReps(ex);
    if(ex.type==="sideHoldReps") runSideHoldReps(ex);
}

// =============================
function runTime(ex){

    let t = ex.time;

    timer = setInterval(()=>{
        t--;
        update(t);

        if(t<=5 && t>0) speak(t.toString());

        if(t<=0) next();

    },1000);
}

// =============================
async function runReps(ex){

    let reps = ex.reps;

    while(reps > 0){
        update(reps);
        await speak(reps.toString());
        reps--;
        await sleep(ex.rest * 1000);
    }

    next();
}

// =============================
async function runHoldReps(ex){

    let reps = ex.reps;

    while(reps > 0){

        if(reps === ex.reps){
            await speak("Spannung halten für fünf Sekunden");
        } else {
            await speak(reps.toString());
        }

        update(reps);
        reps--;

        await sleep(5000);
    }

    next();
}

// =============================
async function runSideHoldReps(ex){

    let sides = ["rechts","links"];

    for(let side of sides){

        showSide(side);
        await speak("Seite " + side);

        await sleep(1000); // 🔥 kleine Pause

        let reps = ex.reps;

        while(reps > 0){

            if(reps === ex.reps){
                await speak("Spannung halten für fünf Sekunden");
            } else {
                await speak(reps.toString());
            }

            update(reps);
            reps--;

            await sleep(5000);
        }
    }

    next();
}

// =============================
function runSide(ex){

    let sides = ["rechts","links"];
    let i = 0;

    function go(){

        if(i >= sides.length){
            next();
            return;
        }

        showSide(sides[i]);
        speak("Seite " + sides[i]);

        let t = ex.time;

        timer = setInterval(()=>{

            t--;
            update(t);

            if(t <= 0){
                clearInterval(timer);
                i++;
                setTimeout(go,1000);
            }

        },1000);
    }

    go();
}

// =============================
async function next(){

    clearInterval(timer);
    running = false;

    current++;

    if(current >= phases[phaseIndex].length){
        alert("Training fertig 💪");
        current = 0;
    }

    let ex = phases[phaseIndex][current];

    await speak("Nächste Übung");
    await speak(ex.name);
    await speak(ex.speech);

    await rest();

    load();
    start();
}

// =============================
async function rest(){
    for(let i=15;i>0;i--){
        update(i);
        await sleep(1000);
    }
}

// =============================
function pause(){
    clearInterval(timer);
    running = false;
    speechSynthesis.cancel();
}

// =============================
function setPhase(p){
    phaseIndex = p-1;
    current = 0;
    running = false;
    load();
}

// =============================
function load(){

    let ex = phases[phaseIndex][current];

    document.getElementById("phaseTitle").innerText = "Phase " + (phaseIndex+1);
    document.getElementById("exerciseTitle").innerText = ex.name;
    document.getElementById("exerciseImage").src = ex.img;
    document.getElementById("guide").innerText = ex.speech;

    update(ex.time || ex.reps);
}

function update(v){
    document.getElementById("timer").innerText = v;
}

function showSide(s){
    document.getElementById("side").innerText = s;
}

function sleep(ms){
    return new Promise(r=>setTimeout(r,ms));
}

// =============================
// 🔥 PHASEN FINAL (MIT VOLLEM TEXT)
// =============================
const phases = [

[
{name:"Bauchatmung", img:"images/phase3.jpg", type:"time", time:120,
speech:"Lege dich auf den Rücken. Füße aufgestellt. Eine Hand auf Bauch, eine auf Brust. Atme tief in den Bauch ein und langsam aus."},

{name:"Knie zur Brust", img:"images/phase3.jpg", type:"side", time:45,
speech:"Ziehe ein Knie zur Brust. Halte locker. Atme ruhig weiter."},

{name:"Mini-Becken-Kippung", img:"images/phase3.jpg", type:"reps", reps:15, rest:3,
speech:"Kippe dein Becken leicht. Drücke den unteren Rücken in den Boden und löse wieder."},

{name:"Hüftbeuger Dehnung", img:"images/phase3.jpg", type:"side", time:40,
speech:"Halbkniestand. Becken nach vorne kippen. Dehnung vorne spüren."},

{name:"Glute Bridge", img:"images/phase3.jpg", type:"holdReps", reps:15,
speech:"Hüfte anheben. Gesäß anspannen. Spannung oben halten und langsam absenken."},

{name:"Adduktor Dehnung", img:"images/phase3.jpg", type:"time", time:45,
speech:"Breiter Stand. Gewicht zur Seite verlagern und Dehnung halten."}
],

[
{name:"Bauchatmung Aktivierung", img:"images/phase2.jpg", type:"time", time:60,
speech:"Ruhig atmen. Körperspannung aufbauen und vorbereiten."},

{name:"Dynamische Hüftöffnung", img:"images/phase2.jpg", type:"sideHoldReps", reps:10,
speech:"Ausfallschritt. Hüfte kontrolliert vor und zurück bewegen."},

{name:"Glute Bridge einbeinig", img:"images/phase2.jpg", type:"sideHoldReps", reps:10,
speech:"Ein Bein oben halten. Hüfte anheben und Spannung halten."},

{name:"Dead Bug", img:"images/phase2.jpg", type:"reps", reps:12, rest:3,
speech:"Arm und Bein gegengleich bewegen. Rumpf stabil halten."},

{name:"Seitliche Ausfallschritte", img:"images/phase2.jpg", type:"sideHoldReps", reps:10,
speech:"Seitlich ausweichen. Hüfte nach hinten schieben und stabil bleiben."},

{name:"Adduktor Hüfte Kombi", img:"images/phase2.jpg", type:"time", time:40,
speech:"Dehnung halten und leicht bewegen. Aktivierung spüren."}
]

];

// =============================
load();

</script>

</body>
</html>
