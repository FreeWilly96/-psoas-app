<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Psoas Ultra PRO</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="apple-touch-icon" href="images/icon.png">
<link rel="manifest" href="manifest.json">

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(#0b1a2f,#0f2c50);
    color:white;
    text-align:center;
}

.light {
    background:#f2f2f2;
    color:black;
}

img {
    width:100%;
    height:45vh;
    object-fit:contain;
}

.timer {
    font-size:80px;
}

.progress-bar {
    height:10px;
    background:limegreen;
    width:0%;
}

button {
    padding:10px;
    margin:4px;
}

#calendar div {
    display:inline-block;
    width:12px;
    height:12px;
    margin:2px;
    border-radius:3px;
    background:#444;
}

.active-day {
    background:limegreen !important;
}
</style>
</head>

<body>

<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>

<img id="exerciseImage">

<div class="progress-bar" id="progressBar"></div>

<div class="timer" id="timer"></div>

<div id="points"></div>
<div id="level"></div>
<div id="badges"></div>

<h4>Kalender</h4>
<div id="calendar"></div>

<div>
<button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
<button onclick="nextExercise()">Skip</button>
<button onclick="toggleMode()">Mode</button>
</div>

<script>

// =============================
// STATE
// =============================
let current = 0;
let phaseIndex = 0;
let timer = null;
let timeLeft = 0;

let points = parseInt(localStorage.getItem("points")) || 0;
let history = JSON.parse(localStorage.getItem("history")) || [];

// =============================
// ÜBUNGEN
// =============================
const phases = [
[
{name:"Bauchatmung",img:"images/phase1.jpg",time:60,speech:"Atme ruhig"},
{name:"Knie zur Brust",img:"images/phase1.jpg",time:40,speech:"Zieh Knie ran"}
],
[
{name:"Dead Bug",img:"images/phase2.jpg",time:40,speech:"Kontrolliert bewegen"},
{name:"Ausfallschritt",img:"images/phase2.jpg",time:40,speech:"Seitlich bewegen"}
]
];

// =============================
// LEVEL SYSTEM
// =============================
function getLevel() {
    return Math.floor(points / 200) + 1;
}

// =============================
// BADGES
// =============================
function getBadges() {

    let badges = [];

    if (history.length >= 1) badges.push("🔥 Start");
    if (history.length >= 7) badges.push("💪 7 Tage");
    if (points >= 1000) badges.push("🏆 1000 Punkte");

    return badges.join(" | ");
}

// =============================
// SOUND
// =============================
const sound = new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");

// =============================
// VIBRATION
// =============================
function vibrate() {
    if (navigator.vibrate) navigator.vibrate(100);
}

// =============================
// SPRACHE
// =============================
function speak(text, cb) {
    speechSynthesis.cancel();
    let msg = new SpeechSynthesisUtterance(text);
    msg.lang="de-DE";
    msg.onend = cb;
    speechSynthesis.speak(msg);
}

// =============================
function startTimer() {

    if (timer) return;

    let ex = phases[phaseIndex][current];

    sound.play();
    vibrate();

    speak(ex.speech, () => {
        timer = setInterval(() => {

            timeLeft--;
            updateUI();

            if (timeLeft <= 0) nextExercise();

        },1000);
    });
}

// =============================
function nextExercise() {

    clearInterval(timer);
    timer = null;

    points += 10;

    current++;

    if (current >= phases[phaseIndex].length) {

        points += 100;

        history.push(new Date().toDateString());

        localStorage.setItem("history", JSON.stringify(history));

        alert("Fertig! Punkte: " + points);

        current = 0;
    }

    save();
    loadExercise();
}

// =============================
function save() {
    localStorage.setItem("points", points);
}

// =============================
function updateUI() {

    let total = phases[phaseIndex][current].time;

    document.getElementById("timer").innerText = timeLeft;
    document.getElementById("progressBar").style.width =
        ((total-timeLeft)/total*100)+"%";

    document.getElementById("points").innerText =
        "Punkte: " + points;

    document.getElementById("level").innerText =
        "Level: " + getLevel();

    document.getElementById("badges").innerText =
        getBadges();
}

// =============================
function loadExercise() {

    let ex = phases[phaseIndex][current];

    document.getElementById("exerciseTitle").innerText = ex.name;
    document.getElementById("phaseTitle").innerText =
        "Phase " + (phaseIndex+1);

    document.getElementById("exerciseImage").src = ex.img;

    timeLeft = ex.time;

    updateUI();
    drawCalendar();
}

// =============================
// KALENDER
// =============================
function drawCalendar() {

    let cal = document.getElementById("calendar");
    cal.innerHTML = "";

    for (let i=0;i<30;i++) {

        let d = document.createElement("div");

        if (history.includes(new Date(Date.now()-i*86400000).toDateString())) {
            d.classList.add("active-day");
        }

        cal.appendChild(d);
    }
}

// =============================
function toggleMode() {
    document.body.classList.toggle("light");
}

// =============================
loadExercise();

</script>

</body>
</html>
