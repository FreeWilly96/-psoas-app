<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psoas Ultra PRO v14</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(#0b1a2f, #0f2c50);
    color: white;
    text-align: center;
}

img {
    width: 90%;
    max-width: 500px;
    border-radius: 12px;
    margin: 20px auto;
}

.timer {
    font-size: 70px;
}

.progress {
    width: 80%;
    height: 10px;
    background: #333;
    margin: 10px auto;
    border-radius: 10px;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: limegreen;
}

button {
    padding: 12px 18px;
    margin: 5px;
    border-radius: 10px;
    border: none;
}

.start { background: green; color:white; }
.pause { background: red; color:white; }
.skip { background: orange; color:white; }
.reset { background: gray; color:white; }
.phase { background: purple; color:white; }
</style>
</head>

<body>

<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>
<p id="nextExercise"></p>

<img id="exerciseImage">

<div class="progress">
    <div class="progress-bar" id="progressBar"></div>
</div>

<div class="timer" id="timer">0</div>

<button class="start" onclick="startTimer()">Start</button>
<button class="pause" onclick="pauseTimer()">Pause</button>
<button class="skip" onclick="nextExercise()">Skip</button>
<button class="reset" onclick="resetAll()">Reset</button>
<br>
<button class="phase" onclick="setPhase(0)">Phase 1</button>
<button class="phase" onclick="setPhase(1)">Phase 2</button>

<script>

// =============================
// 🔥 STATE
// =============================
let phaseIndex = 0;
let current = 0;
let timer = null;
let timeLeft = 0;

// =============================
// 🔊 iOS SPEECH FIX
// =============================
function speakSequence(text, callback) {

    speechSynthesis.cancel();

    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "de-DE";

    msg.onend = () => {
        if (callback) callback();
    };

    speechSynthesis.speak(msg);
}

// =============================
// 📦 ÜBUNGEN (KOMPLETT!)
// =============================
const phases = [

/* ================= PHASE 1 ================= */
[
{
name:"Bauchatmung",
img:"images/phase1.jpg",
time:120,
speech:`Bauchatmung. Nervensystem beruhigen.
Rückenlage, Füße aufgestellt.
Eine Hand auf Bauch, eine auf Brust.
Langsam in den Bauch einatmen.
5 Sekunden ein, 7 Sekunden aus.
2 Minuten.`
},

{
name:"Knie zur Brust links",
img:"images/phase1.jpg",
time:45,
speech:`Knie zur Brust links.
Ein Knie zur Brust ziehen.
Anderes Bein bleibt locker.
Tief weiteratmen.
45 Sekunden.`
},

{
name:"Knie zur Brust rechts",
img:"images/phase1.jpg",
time:45,
speech:`Knie zur Brust rechts.
Ein Knie zur Brust ziehen.
Anderes Bein locker lassen.
45 Sekunden.`
},

{
name:"Mini-Becken-Kippung",
img:"images/phase1.jpg",
time:40,
speech:`Mini Becken Kippung.
Unterer Rücken in den Boden drücken.
Becken kippen.
Kurz halten und lösen.
Ruhige kleine Bewegung.`
},

{
name:"Hüftbeuger-Dehnung",
img:"images/phase1.jpg",
time:40,
speech:`Hüftbeuger Dehnung.
Halbkniestand.
Gesäß anspannen.
Becken leicht kippen.
Dehnung vorne spüren.`
},

{
name:"Glute Bridge",
img:"images/phase1.jpg",
time:40,
speech:`Glute Bridge.
Hüfte nach oben drücken.
Gesäß anspannen.
Kurz halten.
Langsam absenken.`
},

{
name:"Adduktor-Dehnung",
img:"images/phase1.jpg",
time:45,
speech:`Adduktor Dehnung.
Breiter Stand.
Gewicht zur Seite verlagern.
Andere Seite gestreckt lassen.`
}
],

/* ================= PHASE 2 ================= */
[
{
name:"Bauchatmung",
img:"images/phase2.jpg",
time:60,
speech:`Bauchatmung.
Ruhig in den Bauch atmen.
Körper entspannen.`
},

{
name:"Dynamische Hüftöffnung links",
img:"images/phase2.jpg",
time:40,
speech:`Dynamische Hüftöffnung links.
Ausfallschritt Position.
Hüfte nach vorne schieben.
Dann zurück bewegen.`
},

{
name:"Dynamische Hüftöffnung rechts",
img:"images/phase2.jpg",
time:40,
speech:`Dynamische Hüftöffnung rechts.
Hüfte vor und zurück bewegen.`
},

{
name:"Dead Bug",
img:"images/phase2.jpg",
time:40,
speech:`Dead Bug.
Arm und gegenüberliegendes Bein strecken.
Ruhig kontrolliert bewegen.`
},

{
name:"Seitliche Ausfallschritte",
img:"images/phase2.jpg",
time:40,
speech:`Seitliche Ausfallschritte.
Schritt zur Seite.
Hüfte nach hinten schieben.
Andere Seite gestreckt lassen.`
},

{
name:"Glute Bridge einbeinig",
img:"images/phase2.jpg",
time:40,
speech:`Glute Bridge einbeinig.
Hüfte anheben.
Gesäß anspannen.
Kurz halten.`
},

{
name:"Adduktor & Hüfte kombinieren",
img:"images/phase2.jpg",
time:40,
speech:`Adduktor Hüfte kombinieren.
In Dehnung gehen.
Kleine Wippbewegungen.
Ruhig weiter atmen.`
}
]

];

// =============================
function setPhase(p) {
    phaseIndex = p;
    current = 0;
    loadExercise();
}

// =============================
function startTimer() {

    if (timer) return;

    const ex = phases[phaseIndex][current];

    // 👉 ERST ANSAGE, DANN TIMER
    speakSequence(ex.speech, () => {

        speakSequence("3 2 1 Start", () => {
            runTimer();
        });

    });
}

// =============================
function runTimer() {

    timer = setInterval(() => {

        timeLeft--;
        updateUI();

        if (timeLeft <= 0) nextExercise();

    }, 1000);
}

// =============================
function pauseTimer() {
    clearInterval(timer);
    timer = null;
    speakSequence("Pause");
}

// =============================
function nextExercise() {

    clearInterval(timer);
    timer = null;

    current++;

    if (current >= phases[phaseIndex].length) {
        alert("Fertig 💪");
        resetAll();
        return;
    }

    loadExercise();
}

// =============================
function resetAll() {
    clearInterval(timer);
    current = 0;
    loadExercise();
}

// =============================
function updateUI() {

    const total = phases[phaseIndex][current].time;
    const progress = ((total - timeLeft) / total) * 100;

    document.getElementById("timer").innerText = timeLeft;
    document.getElementById("progressBar").style.width = progress + "%";
}

// =============================
function loadExercise() {

    const ex = phases[phaseIndex][current];

    document.getElementById("phaseTitle").innerText =
        "Phase " + (phaseIndex + 1);

    document.getElementById("exerciseTitle").innerText = ex.name;

    if (current + 1 < phases[phaseIndex].length) {
        document.getElementById("nextExercise").innerText =
            "Als nächstes: " + phases[phaseIndex][current + 1].name;
    } else {
        document.getElementById("nextExercise").innerText =
            "Letzte Übung";
    }

    document.getElementById("exerciseImage").src = ex.img;

    timeLeft = ex.time;
    updateUI();
}

// =============================
loadExercise();

</script>

</body>
</html>
