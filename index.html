<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psoas Ultra PRO MAX</title>

<link rel="apple-touch-icon" href="/-psoas-app/images/icon.png">
<link rel="manifest" href="/-psoas-app/manifest.json">

<style>
body { margin:0; font-family:Arial; background:#f2f2f2; text-align:center; }
img { width:95%; height:40vh; object-fit:contain; }
.timer { font-size:80px; }
.guide { max-width:500px; margin:auto; text-align:left; }
button { padding:10px; margin:5px; border:none; border-radius:10px; color:white; }
.start{background:green;} .pause{background:red;} .skip{background:orange;}
.phase{background:#999;} .phase.active{background:purple;}
</style>
</head>

<body>

<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>

<img id="exerciseImage">

<div class="guide" id="guideText"></div>

<div class="timer" id="timer">0</div>

<button class="start" onclick="start()">Start</button>
<button class="pause" onclick="pause()">Pause</button>
<button class="skip" onclick="next()">Skip</button>

<br>
<button id="p1" class="phase" onclick="setPhase(1)">Phase 1</button>
<button id="p2" class="phase" onclick="setPhase(2)">Phase 2</button>

<script>

// =============================
let phaseIndex = 0;
let current = 0;
let timer = null;

// =============================
const beep = new Audio("https://actions.google.com/sounds/v1/beeps/beep_short.ogg");

function vibrate(ms=100){
    if(navigator.vibrate) navigator.vibrate(ms);
}

// =============================
// 🔥 PHASEN MIT ERKLÄRUNG
// =============================
const phases = [

[
{
name:"Bauchatmung",
img:"images/phase3.jpg",
type:"time",
time:120,
speech:"Rückenlage. Füße aufgestellt. Eine Hand auf Bauch, eine auf Brust. Tief in den Bauch atmen. Fünf Sekunden ein, sieben Sekunden aus."
},

{
name:"Knie zur Brust links",
img:"images/phase3.jpg",
type:"time",
time:45,
speech:"Ein Knie zur Brust ziehen und halten. Anderes Bein entspannt lassen. Ruhig weiteratmen."
},

{
name:"Knie zur Brust rechts",
img:"images/phase3.jpg",
type:"time",
time:45,
speech:"Ein Knie zur Brust ziehen und halten. Anderes Bein entspannt lassen. Ruhig weiteratmen."
},

{
name:"Mini-Becken-Kippung",
img:"images/phase3.jpg",
type:"reps",
reps:15,
speech:"Unteren Rücken in den Boden drücken. Becken kippen. Spannung kurz halten und lösen."
},

{
name:"Hüftbeuger-Dehnung links",
img:"images/phase3.jpg",
type:"time",
time:40,
speech:"Halbkniestand. Gesäß anspannen. Becken leicht kippen. Dehnung vorne spüren."
},

{
name:"Hüftbeuger-Dehnung rechts",
img:"images/phase3.jpg",
type:"time",
time:40,
speech:"Halbkniestand. Gesäß anspannen. Becken leicht kippen. Dehnung vorne spüren."
},

{
name:"Glute Bridge",
img:"images/phase3.jpg",
type:"reps",
reps:12,
speech:"Hüfte nach oben drücken. Gesäß anspannen. Kurz halten und langsam absenken."
},

{
name:"Adduktor-Dehnung",
img:"images/phase3.jpg",
type:"time",
time:45,
speech:"Breiter Stand. Gewicht zur Seite verlagern. Dehnung spüren."
}
],

[
{
name:"Bauchatmung",
img:"images/phase2.jpg",
type:"time",
time:60,
speech:"Ruhig atmen und Spannung aufbauen."
},

{
name:"Dynamische Hüftöffnung",
img:"images/phase2.jpg",
type:"alt",
reps:10,
speech:"Ausfallschritt einnehmen. Hüfte nach vorne schieben und wieder zurück bewegen."
},

{
name:"Glute Bridge einbeinig",
img:"images/phase2.jpg",
type:"alt",
reps:10,
speech:"Ein Bein anheben. Hüfte nach oben drücken und stabil halten."
},

{
name:"Dead Bug",
img:"images/phase2.jpg",
type:"alt",
reps:12,
speech:"Gegengleich Arm und Bein bewegen. Rumpf stabil halten."
},

{
name:"Seitliche Ausfallschritte",
img:"images/phase2.jpg",
type:"alt",
reps:10,
speech:"Schritt zur Seite machen. Hüfte nach hinten schieben und wieder zurück."
},

{
name:"Adduktor und Hüfte kombinieren",
img:"images/phase2.jpg",
type:"time",
time:40,
speech:"In die Dehnung gehen. Kleine kontrollierte Bewegungen ausführen."
}
]

];

// =============================
// 🔊 SPEAK mit Callback (WICHTIG)
// =============================
function speak(text, callback){

    speechSynthesis.cancel();

    let msg = new SpeechSynthesisUtterance(text);
    msg.lang = "de-DE";

    msg.onend = function(){
        if(callback) callback();
    };

    speechSynthesis.speak(msg);
}

// =============================
// ▶️ START MIT ERKLÄRUNG
// =============================
function start(){

    if(timer) return;

    let ex = phases[phaseIndex][current];

    beep.play();
    vibrate(200);

    // 👉 1. ERKLÄRUNG
    speak(ex.speech, () => {

        // 👉 kleine Pause
        setTimeout(() => {

            // 👉 2. COUNTDOWN
            countdown(() => run(ex));

        }, 800);

    });
}

// =============================
function countdown(cb){

    let c = 3;

    let cd = setInterval(()=>{

        speak(c);
        update(c);
        c--;

        if(c===0){
            clearInterval(cd);
            cb();
        }

    },1000);
}

// =============================
function run(ex){

    if(ex.type==="time") runTime(ex);
    else if(ex.type==="reps") runReps(ex);
    else runAlt(ex);
}

// =============================
function runTime(ex){

    let t = ex.time;

    timer = setInterval(()=>{

        t--;
        update(t);

        if(t<=5 && t>0) speak(t);

        if(t<=0) next();

    },1000);
}

// =============================
function runReps(ex){

    let r = ex.reps;

    timer = setInterval(()=>{

        r--;
        update(r);
        speak(r);

        if(r<=0) next();

    },2000);
}

// =============================
function runAlt(ex){

    let reps = ex.reps;
    let side = "links";

    timer = setInterval(()=>{

        speak(side);

        update(reps);

        side = (side === "links") ? "rechts" : "links";

        if(side === "links") reps--;

        if(reps<=0) next();

    },2000);
}

// =============================
function update(val){
    document.getElementById("timer").innerText = val;
}

// =============================
function next(){

    clearInterval(timer);
    timer=null;

    beep.play();
    vibrate(200);

    speak("Wechsel");

    current++;

    if(current >= phases[phaseIndex].length){
        alert("Training fertig 💪");
        current = 0;
    }

    load();
}

// =============================
function pause(){
    clearInterval(timer);
    timer=null;
    speak("Pause");
}

// =============================
function setPhase(p){
    phaseIndex = p-1;
    current = 0;
    load();
}

// =============================
function load(){

    let ex = phases[phaseIndex][current];

    document.getElementById("phaseTitle").innerText =
        "Phase " + (phaseIndex+1);

    document.getElementById("exerciseTitle").innerText = ex.name;

    document.getElementById("exerciseImage").src = ex.img;

    document.getElementById("timer").innerText =
        ex.type==="time" ? ex.time : ex.reps;

    updatePhaseUI();
}

// =============================
function updatePhaseUI(){

    document.getElementById("p1").classList.remove("active");
    document.getElementById("p2").classList.remove("active");

    if(phaseIndex===0){
        document.getElementById("p1").classList.add("active");
    } else {
        document.getElementById("p2").classList.add("active");
    }
}

load();

</script>

</body>
</html>
