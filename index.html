<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psoas Ultra PRO v20</title>

<!-- 📱 APP MODE -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Psoas Ultra">

<!-- ✅ ICON FIX (WICHTIG) -->
<link rel="apple-touch-icon" sizes="180x180" href="images/icon.png">
<link rel="apple-touch-icon-precomposed" href="images/icon.png">
<link rel="icon" href="images/icon.png">

<!-- Manifest -->
<link rel="manifest" href="manifest.json">

<style>
body {
    margin:0;
    font-family:Arial;
    background:#f2f2f2;
    text-align:center;
}

.container {
    display:flex;
    flex-direction:column;
    height:100vh;
    justify-content:space-between;
}

img {
    width:95%;
    height:42vh;
    object-fit:contain;
    border-radius:12px;
}

.timer {
    font-size:85px;
}

.progress {
    width:80%;
    height:10px;
    background:#ccc;
    margin:10px auto;
    border-radius:10px;
}

.progress-bar {
    height:100%;
    width:0%;
    background:limegreen;
}

button {
    padding:12px;
    margin:5px;
    border:none;
    border-radius:10px;
    color:white;
}

.start { background:green; }
.pause { background:red; }
.skip { background:orange; }
.reset { background:gray; }

.phase { background:#999; }
.phase.active { background:purple; }

.stats {
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<div>
<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>
<p id="nextExercise"></p>
</div>

<img id="exerciseImage">

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<div class="timer" id="timer">0</div>

<div class="stats">
Punkte: <span id="points">0</span> |
Level: <span id="level">1</span> |
Trainings: <span id="sessions">0</span>
</div>

<div>
<button class="start" onclick="startTimer()">Start</button>
<button class="pause" onclick="pauseTimer()">Pause</button>
<button class="skip" onclick="nextExercise()">Skip</button>
<button class="reset" onclick="resetAll()">Reset</button>
</div>

<div>
<button id="p1" class="phase" onclick="setPhase(1)">Phase 1</button>
<button id="p2" class="phase" onclick="setPhase(2)">Phase 2</button>
</div>

</div>

<script>

// =============================
// STATE
// =============================
let phaseIndex = parseInt(localStorage.getItem("phaseIndex")) || 0;
let current = parseInt(localStorage.getItem("current")) || 0;

let points = parseInt(localStorage.getItem("points")) || 0;
let level = parseInt(localStorage.getItem("level")) || 1;
let sessions = parseInt(localStorage.getItem("sessions")) || 0;

let timer = null;
let timeLeft = 0;

// =============================
// ÜBUNGEN
// =============================
const phases = [

[
{name:"Bauchatmung", img:"images/phase1.jpg", time:120,
speech:"Bauchatmung. Ruhig in den Bauch einatmen. Langsam ausatmen."},

{name:"Knie zur Brust", img:"images/phase1.jpg", time:45,
speech:"Knie zur Brust ziehen und entspannen."},

{name:"Mini Becken Kippung", img:"images/phase1.jpg", time:40,
speech:"Becken kippen und lösen."},

{name:"Hüftbeuger Dehnung", img:"images/phase1.jpg", time:40,
speech:"Hüfte nach vorne schieben."},

{name:"Glute Bridge", img:"images/phase1.jpg", time:40,
speech:"Hüfte anheben und halten."},

{name:"Adduktor Dehnung", img:"images/phase1.jpg", time:45,
speech:"Zur Seite lehnen und Dehnung spüren."}
],

[
{name:"Bauchatmung", img:"images/phase2.jpg", time:60,
speech:"Aktivierende Atmung."},

{name:"Dynamische Hüftöffnung", img:"images/phase2.jpg", time:40,
speech:"Hüfte vor und zurück bewegen."},

{name:"Glute Bridge einbeinig", img:"images/phase2.jpg", time:40,
speech:"Einbeinige Brücke halten."},

{name:"Dead Bug", img:"images/phase2.jpg", time:40,
speech:"Arm und Bein gegengleich bewegen."},

{name:"Seitliche Ausfallschritte", img:"images/phase2.jpg", time:40,
speech:"Seitlich ausweichen."},

{name:"Adduktor und Hüfte", img:"images/phase2.jpg", time:40,
speech:"Dehnung und Bewegung kombinieren."}
]

];

// =============================
// 🔊 SPEAK
// =============================
function speak(text, callback) {

    speechSynthesis.cancel();

    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "de-DE";

    msg.onend = () => {
        if (callback) callback();
    };

    speechSynthesis.speak(msg);
}

// =============================
function beep() {
    const audio = new Audio("https://actions.google.com/sounds/v1/beeps/beep_short.ogg");
    audio.play();
}

// =============================
function startTimer() {

    if (timer) return;

    const ex = phases[phaseIndex][current];

    speak(ex.speech, () => {

        timer = setInterval(() => {

            timeLeft--;
            updateUI();

            if (timeLeft <= 0) {
                beep();
                nextExercise();
            }

        }, 1000);

    });
}

// =============================
function pauseTimer() {
    clearInterval(timer);
    timer = null;
}

// =============================
function nextExercise() {

    clearInterval(timer);
    timer = null;

    current++;

    if (current >= phases[phaseIndex].length) {

        sessions++;
        points += 10;

        if (points >= level * 50) level++;

        alert("Training abgeschlossen 💪");

        current = 0;
    }

    saveState();
    saveStats();
    loadExercise();
}

// =============================
function setPhase(p) {
    phaseIndex = p - 1;
    current = 0;
    saveState();
    loadExercise();
}

// =============================
function resetAll() {
    clearInterval(timer);
    current = 0;
    phaseIndex = 0;
    saveState();
    loadExercise();
}

// =============================
function updateUI() {

    const total = phases[phaseIndex][current].time;
    const progress = ((total - timeLeft) / total) * 100;

    document.getElementById("timer").innerText = timeLeft;
    document.getElementById("progressBar").style.width = progress + "%";
}

// =============================
function loadExercise() {

    const ex = phases[phaseIndex][current];

    document.getElementById("phaseTitle").innerText =
        "Phase " + (phaseIndex + 1);

    document.getElementById("exerciseTitle").innerText = ex.name;

    document.getElementById("nextExercise").innerText =
        current + 1 < phases[phaseIndex].length
        ? "Als nächstes: " + phases[phaseIndex][current + 1].name
        : "Letzte Übung";

    document.getElementById("exerciseImage").src = ex.img;

    timeLeft = ex.time;

    updateUI();
    updateStats();
    updatePhaseUI();
}

// =============================
function updateStats() {
    document.getElementById("points").innerText = points;
    document.getElementById("level").innerText = level;
    document.getElementById("sessions").innerText = sessions;
}

// =============================
function updatePhaseUI() {

    document.getElementById("p1").classList.remove("active");
    document.getElementById("p2").classList.remove("active");

    if (phaseIndex === 0) {
        document.getElementById("p1").classList.add("active");
    } else {
        document.getElementById("p2").classList.add("active");
    }
}

// =============================
function saveState() {
    localStorage.setItem("phaseIndex", phaseIndex);
    localStorage.setItem("current", current);
}

function saveStats() {
    localStorage.setItem("points", points);
    localStorage.setItem("level", level);
    localStorage.setItem("sessions", sessions);
}

// =============================
loadExercise();

</script>

</body>
</html>
