<!DOCTYPE html>
<html lang="de">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Psoas Ultra</title>

<style>
body {
    font-family:-apple-system;
    margin:0;
    background:#0f172a;
    color:white;
    text-align:center;
}

.header {
    padding:20px;
    font-size:22px;
    font-weight:bold;
}

.timer {
    font-size:60px;
    margin:15px;
}

.exercise {
    font-size:24px;
    margin-top:15px;
}

.next {
    font-size:16px;
    color:#94a3b8;
}

img {
    width:90%;
    border-radius:12px;
    margin-top:10px;
}

button {
    padding:15px;
    margin:10px;
    border-radius:12px;
    border:none;
    font-size:18px;
    background:#22c55e;
    color:white;
}
</style>
</head>

<body>

<div class="header">Psoas Ultra</div>

<div class="exercise" id="exercise">Bereit</div>
<div class="next" id="next"></div>

<img id="img" src="https://i.imgur.com/8Km9tLL.jpg">

<div class="timer" id="timer">0</div>

<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>

<script>

let plan = [
 {name:"Bauchatmung", time:60, img:"https://i.imgur.com/8Km9tLL.jpg"},
 {name:"Knie zur Brust links", time:45, img:"https://i.imgur.com/9Xn6F7O.jpg"},
 {name:"Knie zur Brust rechts", time:45, img:"https://i.imgur.com/9Xn6F7O.jpg"},
 {name:"Becken kippen", time:60, img:"https://i.imgur.com/Z8d0VQx.jpg"},
 {name:"Glute Bridge", time:60, img:"https://i.imgur.com/Vl9cXyF.jpg"},
 {name:"Adduktor Stretch links", time:45, img:"https://i.imgur.com/0rK4y9b.jpg"},
 {name:"Adduktor Stretch rechts", time:45, img:"https://i.imgur.com/0rK4y9b.jpg"}
];

let i = 0;
let t = 0;
let interval;

function speak(text){
 let msg = new SpeechSynthesisUtterance(text);
 msg.lang="de-DE";
 speechSynthesis.speak(msg);
}

function start(){
 i = 0;
 next();
}

function next(){
 if(i >= plan.length){
   speak("Training abgeschlossen");
   localStorage.setItem("done", "true");
   document.getElementById("exercise").innerText = "Fertig 💪";
   return;
 }

 let ex = plan[i];

 document.getElementById("exercise").innerText = ex.name;
 document.getElementById("img").src = ex.img;

 if(plan[i+1]){
   document.getElementById("next").innerText = "Als nächstes: " + plan[i+1].name;
 } else {
   document.getElementById("next").innerText = "";
 }

 speak(ex.name);

 t = ex.time;

 interval = setInterval(()=>{
   t--;
   document.getElementById("timer").innerText = t;

   if(t <= 0){
     clearInterval(interval);
     i++;
     next();
   }
 },1000);
}

function pause(){
 clearInterval(interval);
}

// Fortschritt anzeigen
if(localStorage.getItem("done")){
 document.getElementById("next").innerText = "Letztes Training abgeschlossen ✔";
}

</script>

</body>
</html>
