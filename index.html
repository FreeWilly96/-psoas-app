<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psoas Ultra PRO</title>

<link rel="apple-touch-icon" sizes="180x180" href="images/icon.png">

<style>
body { margin:0; font-family:Arial; text-align:center; background:#f2f2f2; }
body.dark { background:#0b1a2f; color:white; }

img { width:95%; height:40vh; object-fit:contain; }

.timer { font-size:80px; }
.side { font-size:30px; height:40px; }

button { padding:10px; margin:5px; border:none; border-radius:10px; color:white; }
.start{background:green;} .pause{background:red;} .skip{background:orange;}
.mode{background:black;} .phase{background:#999;} .phase.active{background:purple;}
</style>
</head>

<body>

<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>
<div class="side" id="side"></div>

<img id="exerciseImage">

<div id="guide"></div>

<div class="timer" id="timer">0</div>

<button class="start" onclick="start()">Start</button>
<button class="pause" onclick="pause()">Pause</button>
<button class="skip" onclick="next()">Skip</button>
<button class="mode" onclick="toggleMode()">Mode</button>

<br>
<button id="btnP1" class="phase" onclick="setPhase(1)">Phase 1</button>
<button id="btnP2" class="phase" onclick="setPhase(2)">Phase 2</button>

<script>

// =============================
// STATE
// =============================
let phaseIndex = 0;
let current = 0;
let timer = null;
let spoken = false;

// =============================
// SPEAK
// =============================
function speak(text, cb){
    speechSynthesis.cancel();
    let msg = new SpeechSynthesisUtterance(text);
    msg.lang = "de-DE";
    msg.onend = () => { if(cb) cb(); };
    speechSynthesis.speak(msg);
}

// =============================
// START
// =============================
function start(){

    if(timer) return;

    let ex = phases[phaseIndex][current];

    if(!spoken){
        spoken = true;

        speak(ex.name + ". " + ex.speech, ()=>{
            countdown(()=> run(ex));
        });

    } else {
        countdown(()=> run(ex));
    }
}

// =============================
// COUNTDOWN
// =============================
function countdown(cb){

    let c = 3;

    function step(){
        if(c === 0){
            cb();
            return;
        }

        speak(c.toString());
        document.getElementById("timer").innerText = c;
        c--;

        setTimeout(step,1000);
    }

    step();
}

// =============================
// RUN
// =============================
function run(ex){

    if(ex.type==="time") runTime(ex);
    else if(ex.type==="reps") runReps(ex);
    else if(ex.type==="side") runSide(ex);
}

// =============================
// TIME
// =============================
function runTime(ex){

    let t = ex.time;

    timer = setInterval(()=>{

        t--;
        update(t);

        if(t<=5 && t>0) speak(t);

        if(t<=0) next();

    },1000);
}

// =============================
// REPS (FIXED)
// =============================
function runReps(ex){

    let reps = ex.reps;
    let rest = ex.rest || 3;

    function doRep(){

        if(reps <= 0){
            next();
            return;
        }

        let text = reps.toString();

        if(ex.hold) text += ". Spannung halten";

        speak(text);
        update(reps);

        reps--;

        setTimeout(doRep, rest * 1000);
    }

    doRep();
}

// =============================
// SIDE (links dann rechts)
// =============================
function runSide(ex){

    let sides = ["links","rechts"];
    let index = 0;

    function doSide(){

        if(index >= sides.length){
            next();
            return;
        }

        showSide(sides[index]);

        speak("Seite " + sides[index]);

        let t = ex.time;

        timer = setInterval(()=>{
            t--;
            update(t);

            if(t<=0){
                clearInterval(timer);
                index++;
                doSide();
            }

        },1000);
    }

    doSide();
}

// =============================
function showSide(t){
    document.getElementById("side").innerText = t;
}

// =============================
function update(v){
    document.getElementById("timer").innerText = v;
}

// =============================
// NEXT (inkl Pause + Erklärung)
// =============================
function next(){

    clearInterval(timer);
    timer = null;
    spoken = false;

    current++;

    if(current >= phases[phaseIndex].length){
        alert("Fertig 💪");
        current = 0;
    }

    let nextEx = phases[phaseIndex][current];

    speak("Nächste Übung. " + nextEx.name + ". " + nextEx.speech);

    restCountdown(()=>{
        load();
        start();
    });
}

// =============================
// REST COUNTDOWN (15s)
// =============================
function restCountdown(cb){

    let t = 15;

    function step(){

        if(t === 0){
            cb();
            return;
        }

        update(t);
        t--;

        setTimeout(step,1000);
    }

    step();
}

// =============================
function pause(){
    clearInterval(timer);
    timer = null;
    speak("Pause");
}

// =============================
function setPhase(p){
    phaseIndex = p-1;
    current = 0;
    spoken = false;
    load();
}

// =============================
function toggleMode(){
    document.body.classList.toggle("dark");
}

// =============================
function load(){

    let ex = phases[phaseIndex][current];

    document.getElementById("phaseTitle").innerText = "Phase " + (phaseIndex+1);
    document.getElementById("exerciseTitle").innerText = ex.name;
    document.getElementById("exerciseImage").src = ex.img;

    document.getElementById("guide").innerText = ex.speech;

    updatePhaseButtons();

    update(ex.time || ex.reps);
}

// =============================
function updatePhaseButtons(){
    document.getElementById("btnP1").classList.remove("active");
    document.getElementById("btnP2").classList.remove("active");

    if(phaseIndex===0) document.getElementById("btnP1").classList.add("active");
    else document.getElementById("btnP2").classList.add("active");
}

// =============================
// PHASEN (FINAL)
// =============================
const phases = [

[
{name:"Bauchatmung", img:"images/phase3.jpg", type:"time", time:120,
speech:"Rückenlage. Füße aufgestellt. Eine Hand auf Bauch, eine auf Brust. Fünf Sekunden ein, sieben Sekunden aus."},

{name:"Knie zur Brust", img:"images/phase3.jpg", type:"side", time:45,
speech:"Ein Knie zur Brust ziehen. Anderes Bein entspannt liegen lassen."},

{name:"Mini-Becken-Kippung", img:"images/phase3.jpg", type:"reps", reps:15,
speech:"Becken kippen. Unteren Rücken in den Boden drücken und lösen."},

{name:"Hüftbeuger Dehnung", img:"images/phase3.jpg", type:"side", time:40,
speech:"Halbkniestand. Becken nach vorne kippen. Dehnung vorne spüren."},

{name:"Glute Bridge", img:"images/phase3.jpg", type:"reps", reps:12, rest:3,
speech:"Hüfte anheben. Gesäß anspannen und kontrolliert absenken."},

{name:"Adduktor Dehnung", img:"images/phase3.jpg", type:"time", time:45,
speech:"Breiter Stand. Gewicht zur Seite verlagern und Dehnung halten."}
],

[
{name:"Bauchatmung Aktivierung", img:"images/phase2.jpg", type:"time", time:60,
speech:"Ruhig atmen und Körperspannung aufbauen."},

{name:"Dynamische Hüftöffnung", img:"images/phase2.jpg", type:"reps", reps:10, rest:5,
speech:"Ausfallschritt. Hüfte kontrolliert vor und zurück bewegen."},

{name:"Glute Bridge einbeinig", img:"images/phase2.jpg", type:"reps", reps:10, rest:3, hold:true,
speech:"Ein Bein anheben. Hüfte nach oben drücken und Spannung halten."},

{name:"Dead Bug", img:"images/phase2.jpg", type:"reps", reps:12, rest:3,
speech:"Arm und Bein gegengleich bewegen. Rumpf stabil halten."},

{name:"Seitliche Ausfallschritte", img:"images/phase2.jpg", type:"reps", reps:10, rest:3,
speech:"Seitlich treten. Hüfte nach hinten schieben."},

{name:"Adduktor & Hüfte Kombi", img:"images/phase2.jpg", type:"time", time:40,
speech:"Dehnung halten und kleine Bewegungen ausführen."}
]

];

// =============================
load();

</script>

</body>
</html>
