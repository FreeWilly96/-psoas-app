<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Psoas Ultra</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

h1 {
    margin-top: 10px;
}

img {
    width: 90%;
    max-width: 400px;
    border-radius: 15px;
    margin-top: 20px;
}

.timer {
    font-size: 60px;
    margin: 20px 0;
}

button {
    padding: 15px 25px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
}

.start { background: #22c55e; color: white; }
.pause { background: #ef4444; color: white; }
</style>
</head>

<body>

<div class="container">

<h1>Psoas Ultra</h1>

<h2 id="exercise">Bereit?</h2>

<img id="image" src="images/phase1.jpg">

<div class="timer" id="timer">0</div>

<button class="start" onclick="start()">Start</button>
<button class="pause" onclick="pause()">Pause</button>

</div>

<script>

// =========================
// ÜBUNGEN
// =========================

const phase1 = [
    {name: "Bauchatmung", time: 60},
    {name: "Knie zur Brust links", time: 45},
    {name: "Knie zur Brust rechts", time: 45},
    {name: "Mini-Becken-Kippung", time: 40},
    {name: "Glute Bridge", time: 40},
    {name: "Adduktor-Dehnung", time: 45}
];

const phase2 = [
    {name: "Bauchatmung", time: 60},
    {name: "Dynamische Hüftöffnung", time: 50},
    {name: "Glute Bridge einbeinig", time: 50},
    {name: "Dead Bug", time: 50},
    {name: "Seitliche Ausfallschritte", time: 50},
    {name: "Adduktor Aktivierung", time: 50}
];

// 👉 HIER PHASE WECHSELN
let currentPhase = 2; // 1 oder 2

let exercises = currentPhase === 1 ? phase1 : phase2;


// =========================
// LOGIK
// =========================

let index = 0;
let time = exercises[0].time;
let interval = null;

function updateUI() {

    document.getElementById("exercise").innerText = exercises[index].name;
    document.getElementById("timer").innerText = time;

    // Bild wechseln
    if (currentPhase === 1) {
        document.getElementById("image").src = "images/phase1.jpg";
    } else {
        document.getElementById("image").src = "images/phase2.jpg";
    }
}

function start() {
    if (interval) return;

    interval = setInterval(() => {

        time--;

        if (time <= 0) {
            nextExercise();
        }

        updateUI();

    }, 1000);
}

function pause() {
    clearInterval(interval);
    interval = null;
}

function nextExercise() {

    index++;

    if (index >= exercises.length) {
        alert("Fertig! 💪");
        pause();
        return;
    }

    time = exercises[index].time;
}

updateUI();

</script>

</body>
</html>
