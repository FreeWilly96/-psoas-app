<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psoas Ultra PRO v22 FIX</title>

<link rel="apple-touch-icon" sizes="180x180" href="/-psoas-app/images/icon.png">
<link rel="manifest" href="/-psoas-app/manifest.json">

<style>
body { font-family:Arial; text-align:center; margin:0; background:#f2f2f2; }
img { width:95%; height:40vh; object-fit:contain; }
.timer { font-size:70px; }
.guide { text-align:left; max-width:500px; margin:auto; }
button { padding:10px; margin:5px; border:none; border-radius:10px; color:white; }
.start{background:green;} .pause{background:red;} .skip{background:orange;}
.phase{background:#999;} .phase.active{background:purple;}
</style>
</head>

<body>

<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>

<img id="exerciseImage">

<div class="guide" id="guideText"></div>

<div class="timer" id="timer">0</div>

<button class="start" onclick="start()">Start</button>
<button class="pause" onclick="pause()">Pause</button>
<button class="skip" onclick="next()">Skip</button>

<br>
<button id="p1" class="phase" onclick="setPhase(1)">Phase 1</button>
<button id="p2" class="phase" onclick="setPhase(2)">Phase 2</button>

<script>

// =============================
// STATE
// =============================
let phaseIndex = 0;
let current = 0;
let timer = null;
let timeLeft = 0;

// =============================
// PHASES (KORREKT ZUGEORDNET)
// =============================
const phases = [

/* =============================
   👉 PHASE 1 (Bild: phase3.jpg)
============================= */
[
{
name:"Bauchatmung",
img:"images/phase3.jpg",
type:"time",
time:120,
guide:[
"Rückenlage, Füße aufgestellt",
"Eine Hand auf Bauch, eine auf Brust",
"5 Sekunden ein, 7 Sekunden aus"
]
},

{
name:"Knie zur Brust links",
img:"images/phase3.jpg",
type:"time",
time:45,
guide:["Knie zur Brust ziehen","Entspannen","Ruhig atmen"]
},

{
name:"Knie zur Brust rechts",
img:"images/phase3.jpg",
type:"time",
time:45,
guide:["Knie zur Brust ziehen","Entspannen","Ruhig atmen"]
},

{
name:"Mini-Becken-Kippung",
img:"images/phase3.jpg",
type:"reps",
reps:15,
guide:["Becken kippen","Rücken drücken","Langsam lösen"]
},

{
name:"Hüftbeuger-Dehnung",
img:"images/phase3.jpg",
type:"time",
time:40,
guide:["Halbkniestand","Becken kippen","Dehnung halten"]
},

{
name:"Glute Bridge",
img:"images/phase3.jpg",
type:"reps",
reps:12,
guide:["Hüfte anheben","Gesäß anspannen"]
},

{
name:"Adduktor-Dehnung",
img:"images/phase3.jpg",
type:"time",
time:45,
guide:["Breiter Stand","Gewicht verlagern"]
}
],

/* =============================
   👉 PHASE 2 (Bild: phase2.jpg)
============================= */
[
{
name:"Bauchatmung",
img:"images/phase2.jpg",
type:"time",
time:60,
guide:["Aktivierung","Ruhig atmen"]
},

{
name:"Dynamische Hüftöffnung",
img:"images/phase2.jpg",
type:"reps",
reps:10,
guide:["Ausfallschritt","Vor und zurück bewegen"]
},

{
name:"Glute Bridge einbeinig links",
img:"images/phase2.jpg",
type:"reps",
reps:10,
guide:["Hüfte anheben","Spannung halten"]
},

{
name:"Glute Bridge einbeinig rechts",
img:"images/phase2.jpg",
type:"reps",
reps:10,
guide:["Hüfte anheben","Spannung halten"]
},

{
name:"Dead Bug",
img:"images/phase2.jpg",
type:"reps",
reps:12,
guide:["Arm + Bein","Rumpf stabil"]
},

{
name:"Seitliche Ausfallschritte",
img:"images/phase2.jpg",
type:"reps",
reps:10,
guide:["Seitlich treten","Hüfte nach hinten"]
},

{
name:"Adduktor & Hüfte",
img:"images/phase2.jpg",
type:"time",
time:40,
guide:["Dehnung","kleine Bewegungen"]
}
]

];

// =============================
// SPEAK
// =============================
function speak(text){
    speechSynthesis.cancel();
    let msg=new SpeechSynthesisUtterance(text);
    msg.lang="de-DE";
    speechSynthesis.speak(msg);
}

// =============================
function start(){

    if(timer) return;

    let ex = phases[phaseIndex][current];

    speak(ex.name);

    setTimeout(()=>{
        ex.type==="time" ? runTime(ex) : runReps(ex);
    },1000);
}

// =============================
function runTime(ex){

    timeLeft = ex.time;

    timer = setInterval(()=>{

        timeLeft--;
        update(timeLeft);

        if(timeLeft <=5 && timeLeft>0){
            speak(timeLeft);
        }

        if(timeLeft<=0){
            next();
        }

    },1000);
}

// =============================
function runReps(ex){

    let reps = ex.reps;

    timer = setInterval(()=>{

        reps--;
        update(reps);
        speak(reps);

        if(reps<=0){
            next();
        }

    },2000);
}

// =============================
function update(val){
    document.getElementById("timer").innerText = val;
}

// =============================
function next(){

    clearInterval(timer);
    timer=null;

    speak("Wechsel");

    current++;

    if(current >= phases[phaseIndex].length){
        alert("Training fertig 💪");
        current = 0;
    }

    load();
}

// =============================
function pause(){
    clearInterval(timer);
    timer=null;
}

// =============================
function setPhase(p){
    phaseIndex = p-1;
    current = 0;
    load();
}

// =============================
function load(){

    let ex = phases[phaseIndex][current];

    document.getElementById("phaseTitle").innerText =
        "Phase " + (phaseIndex+1);

    document.getElementById("exerciseTitle").innerText = ex.name;

    document.getElementById("exerciseImage").src = ex.img;

    let html="<ul>";
    ex.guide.forEach(g => html+="<li>"+g+"</li>");
    html+="</ul>";

    document.getElementById("guideText").innerHTML = html;

    document.getElementById("timer").innerText =
        ex.type==="time" ? ex.time : ex.reps;

    updatePhaseUI();
}

// =============================
function updatePhaseUI(){

    document.getElementById("p1").classList.remove("active");
    document.getElementById("p2").classList.remove("active");

    if(phaseIndex===0){
        document.getElementById("p1").classList.add("active");
    } else {
        document.getElementById("p2").classList.add("active");
    }
}

// =============================
load();

</script>

</body>
</html>
