<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Psoas Ultra PRO</title>

  <!-- FIX: richtige Links (die zwei reinen Textzeilen aus der vorherigen Version bleiben als Kommentar erhalten) -->
  <!-- images/icon.png -->
  <!-- manifest.json -->
  <link rel="apple-touch-icon" sizes="180x180" href="images/icon.png">
  <link rel="manifest" href="manifest.json">

  <style>
    /* =========================================================
       THEME (Dark/Light) – FIXED
       ========================================================= */
    :root{
      --bg: #0b1a2f;
      --panel: rgba(18, 27, 45, .72);
      --panelSolid: #111c2f;
      --text: #ffffff;
      --muted: rgba(255,255,255,.70);
      --muted2: rgba(255,255,255,.55);
      --strokeBg: rgba(255,255,255,.12);
      --shadow: 0 14px 40px rgba(0,0,0,.35);
      --shadow2: 0 8px 18px rgba(0,0,0,.25);
      --accent1: #a855f7;
      --accent2: #ec4899;
      --good: #22c55e;
      --bad: #ef4444;
      --warn: #f59e0b;
      --btn: #334155;
      --btn2: #475569;
    }
    body.light{
      --bg: #f5f7fb;
      --panel: rgba(255,255,255,.78);
      --panelSolid: #ffffff;
      --text: #0b1220;
      --muted: rgba(11,18,32,.70);
      --muted2: rgba(11,18,32,.55);
      --strokeBg: rgba(11,18,32,.12);
      --shadow: 0 14px 40px rgba(2,8,20,.15);
      --shadow2: 0 8px 18px rgba(2,8,20,.10);
      --btn: #e5e7eb;
      --btn2: #cbd5e1;
    }

    *{box-sizing:border-box;}
    body{
      margin:0;
      font-family: Arial, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      text-align:center;
      background: radial-gradient(1200px 800px at 50% -200px, rgba(168,85,247,.35), transparent 60%),
                  radial-gradient(900px 700px at 90% 20%, rgba(236,72,153,.18), transparent 55%),
                  var(--bg);
      color: var(--text);
      transition: background .3s, color .3s;
      padding:
        env(safe-area-inset-top)
        env(safe-area-inset-right)
        env(safe-area-inset-bottom)
        env(safe-area-inset-left);
    }

    /* =========================================================
       LAYOUT – iPhone friendly
       ========================================================= */
    .app{
      max-width: 860px;
      margin: 0 auto;
      padding: 14px 12px 24px;
    }

    .topRow{
      display:grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap:10px;
      align-items:center;
      justify-content:center;
      margin: 6px 0 10px;
    }
    .topRow2{
      display:grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap:10px;
      margin: 8px 0 14px;
    }

    @media (max-width: 520px){
      .topRow{ grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .topRow2{ grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    .card{
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow:hidden;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .headerCard{
      padding: 14px 14px 12px;
      text-align:left;
    }
    #phaseTitle{
      margin:0;
      font-size: 14px;
      color: var(--muted2);
      font-weight: 700;
      letter-spacing: .2px;
    }
    #exerciseTitle{
      margin: 6px 0 0;
      font-size: 28px;
      font-weight: 900;
      line-height: 1.05;
      color: var(--text);
    }

    .side{
      font-size: 16px;
      height: 22px;
      margin-top: 10px;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: .2px;
      text-align:left;
    }

    .imageCard{
      margin-top: 12px;
      padding: 12px;
    }
    img{
      width: 100%;
      height: min(38vh, 360px);
      object-fit: contain;
      border-radius: 14px;
      background: rgba(0,0,0,.12);
      border: 1px solid rgba(255,255,255,.06);
    }

    .guide{
      margin-top: 12px;
      padding: 12px 14px;
      text-align:left;
      color: var(--text);
      font-size: 16px;
      line-height: 1.35;
    }
    .guide ul{ margin: 0; padding-left: 18px; }
    .guide li{ margin: 6px 0; color: var(--muted); }

    /* =========================================================
       GLOW RING TIMER
       ========================================================= */
    .timerWrap{
      margin: 14px auto 6px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .ring{
      width: 220px;
      height: 220px;
      position: relative;
      display:grid;
      place-items:center;
      filter: drop-shadow(0 0 22px rgba(168,85,247,.32))
              drop-shadow(0 0 18px rgba(236,72,153,.22));
    }
    @media (max-width: 420px){
      .ring{ width: 190px; height: 190px; }
    }
    .ring svg{
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }
    .ring .bg{
      stroke: var(--strokeBg);
      stroke-width: 12;
      fill: transparent;
    }
    .ring .fg{
      stroke: url(#grad);
      stroke-width: 12;
      stroke-linecap: round;
      fill: transparent;
      filter: url(#glow);
      transition: stroke-dashoffset .25s linear;
    }
    .ringNumber{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      font-weight: 900;
      font-size: 64px;
      letter-spacing: .5px;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      -webkit-background-clip:text;
      background-clip:text;
      color: transparent;
      user-select:none;
    }
    @media (max-width: 420px){
      .ringNumber{ font-size: 56px; }
    }

    /* NEW: Pulse for reps/hold (keine Flow-Änderung, nur Visual) */
    .ring.pulse{
      animation: ringPulse 1.15s ease-in-out infinite;
    }
    .ring.pulseStrong{
      animation: ringPulseStrong 0.95s ease-in-out infinite;
    }
    @keyframes ringPulse{
      0%{ transform: scale(1); filter: drop-shadow(0 0 18px rgba(168,85,247,.26)) drop-shadow(0 0 14px rgba(236,72,153,.18)); }
      50%{ transform: scale(1.02); filter: drop-shadow(0 0 28px rgba(168,85,247,.38)) drop-shadow(0 0 22px rgba(236,72,153,.28)); }
      100%{ transform: scale(1); filter: drop-shadow(0 0 18px rgba(168,85,247,.26)) drop-shadow(0 0 14px rgba(236,72,153,.18)); }
    }
    @keyframes ringPulseStrong{
      0%{ transform: scale(1); filter: drop-shadow(0 0 22px rgba(168,85,247,.34)) drop-shadow(0 0 18px rgba(236,72,153,.24)); }
      50%{ transform: scale(1.035); filter: drop-shadow(0 0 34px rgba(168,85,247,.46)) drop-shadow(0 0 28px rgba(236,72,153,.34)); }
      100%{ transform: scale(1); filter: drop-shadow(0 0 22px rgba(168,85,247,.34)) drop-shadow(0 0 18px rgba(236,72,153,.24)); }
    }

    /* Keep existing progressBar (not removed) */
    #progressBar{
      width: 92%;
      height: 10px;
      background: rgba(255,255,255,.10);
      margin: 10px auto 4px;
      border-radius: 10px;
      overflow:hidden;
    }
    #progress{
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
    }

    /* =========================================================
       BUTTONS
       ========================================================= */
    button{
      padding: 14px 10px;
      margin: 0;
      border: none;
      border-radius: 18px;
      color: white;
      font-weight: 900;
      font-size: 16px;
      box-shadow: var(--shadow2);
      cursor:pointer;
      min-height: 50px;
      transition: transform .06s, filter .2s, background .2s, color .2s;
      -webkit-tap-highlight-color: transparent;
      user-select:none;
    }
    button:active{ transform: scale(.98); }
    button:disabled{
      opacity:.55;
      cursor:not-allowed;
      filter: grayscale(.15);
    }

    .start{ background: var(--good); }
    .pause{ background: var(--bad); }
    .continue{ background: #e5e7eb; color:#0b1220; }
    body.light .continue{ background:#0b1220; color:#fff; }
    .skip{ background: var(--warn); }
    .mode{ background: #374151; }
    body.light .mode{ background: #94a3b8; color:#0b1220; }

    .stop{ background: #0f172a; }
    body.light .stop{ background:#111827; color:#fff; }

    .phase{ background: var(--btn2); color: white; }
    body.light .phase{ background: var(--btn); color:#0b1220; }

    .phase.active{
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      color:#fff;
    }

    .dividerSpace{ height: 6px; }

  </style>
</head>

<body>
  <div class="app">

    <!-- HEADER -->
    <div class="card headerCard">
      <h2 id="phaseTitle"></h2>
      <h3 id="exerciseTitle"></h3>
      <div id="side" class="side"></div>
    </div>

    <!-- IMAGE + GUIDE -->
    <div class="card imageCard">
      <img id="exerciseImage" alt="Übung" />
      <div id="guide" class="guide"></div>
    </div>

    <!-- GLOW RING TIMER -->
    <div class="timerWrap">
      <div id="ring" class="ring" aria-label="Timer">
        <svg viewBox="0 0 120 120" role="img">
          <defs>
            <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#a855f7"></stop>
              <stop offset="100%" stop-color="#ec4899"></stop>
            </linearGradient>
            <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="2.2" result="blur"></feGaussianBlur>
              <feMerge>
                <feMergeNode in="blur"></feMergeNode>
                <feMergeNode in="SourceGraphic"></feMergeNode>
              </feMerge>
            </filter>
          </defs>

          <circle class="bg" cx="60" cy="60" r="46"></circle>
          <circle id="ringFg" class="fg" cx="60" cy="60" r="46"></circle>
        </svg>
        <div id="timer" class="ringNumber">0</div>
      </div>
    </div>

    <!-- keep original progress bar (not deleted) -->
    <div id="progressBar"><div id="progress"></div></div>

    <!-- CONTROL BUTTONS -->
    <div class="topRow">
      <button class="start" onclick="start()">Start</button>
      <button class="pause" onclick="pause()">Pause</button>
      <button class="continue" onclick="weiter()">Weiter</button>
      <button class="skip" onclick="skip()">Skip</button>
      <button class="mode" onclick="toggleMode()">Mode</button>
    </div>

    <div class="topRow2">
      <button id="btnP1" class="phase" onclick="setPhase(1)">Training 1</button>
      <button id="btnP2" class="phase" onclick="setPhase(2)">Training 2</button>
      <button id="btnP3" class="phase" onclick="setPhase(3)">Training 3</button>
      <button class="stop" onclick="beenden()">Beenden</button>
    </div>

    <div class="dividerSpace"></div>

    <div class="topRow2">
      <button class="mode" onclick="nextPhase()">Nächstes Training</button>
      <div></div><div></div><div></div>
    </div>

  </div>

<script>
/* =========================================================
   NOTE: phases missing in snippet -> safe fallback.
   If you already have phases defined elsewhere, this will not overwrite.
   ========================================================= */
if(typeof window.phases === "undefined"){
  window.phases = [
    [
      { name:"Bauchatmung", subtitle:"Nervensystem beruhigen", img:"images/1.jpg", type:"time", time:120,
        guide:["Rückenlage, Füße aufgestellt","Eine Hand auf Bauch, eine auf Brust","Langsam in den Bauch atmen","5 Sekunden einatmen, 7 Sekunden ausatmen"] }
    ],
    [
      { name:"Beispiel Übung", subtitle:"Training 2 Demo", img:"images/1.jpg", type:"reps", reps:10, rest:1,
        guide:["Demo – bitte deine echten phases einfügen."] }
    ],
    [
      { name:"Beispiel Übung", subtitle:"Training 3 Demo", img:"images/1.jpg", type:"time", time:60,
        guide:["Demo – bitte deine echten phases einfügen."] }
    ]
  ];
}
let phases = window.phases;

/* =========================================================
   CORE STATE (kept)
   ========================================================= */
const App = {
  paused: false,
  state: "idle",
  session: 0,

  /* NEW: stable cancellation token (fix for parallel timers / skip / end) */
  token: 0,

  /* NEW: ring state */
  ringTotal: 0,
  ringValue: 0,

  /* NEW: voice flags for Side switch */
  speakSideSwitch: false,

  /* NEW: Beenden speak toggle (default: mit Ansage) */
  speakOnBeenden: true
};

let phaseIndex = 0;
let current = 0;
let timer = null;  // kept (not removed)
let running = false;

/* =========================================================
   ELEMENTS (kept)
   ========================================================= */
const phaseTitle = document.getElementById("phaseTitle");
const exerciseTitle = document.getElementById("exerciseTitle");
const exerciseImage = document.getElementById("exerciseImage");
const guide = document.getElementById("guide");
const timerEl = document.getElementById("timer");
const side = document.getElementById("side");
const progress = document.getElementById("progress");

/* NEW: ring elements */
const ringFg = document.getElementById("ringFg");
const ringEl = document.getElementById("ring");

/* =========================================================
   THEME (FIXED)
   ========================================================= */
function toggleMode(){
  document.body.classList.toggle("light");
  try{
    localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
  }catch(e){}
}

(function(){
  try{
    const t = localStorage.getItem("theme");
    if(t === "light") document.body.classList.add("light");
  }catch(e){}
})();

/* =========================================================
   HELPERS (kept)
   ========================================================= */
function sleep(ms){
  return new Promise(r=>setTimeout(r,ms));
}

/* =========================================================
   SPEECH – stabilized (no overlap)
   ========================================================= */
let Speech = {
  chain: Promise.resolve(),
  lastText: "",
  lastAt: 0
};

function speak(text, opts){
  const o = Object.assign({ interrupt:true, dedupeMs: 250 }, opts || {});
  const now = Date.now();

  if(text === Speech.lastText && (now - Speech.lastAt) < o.dedupeMs){
    return Promise.resolve();
  }
  Speech.lastText = text;
  Speech.lastAt = now;

  if(o.interrupt){
    speechSynthesis.cancel();
    Speech.chain = Promise.resolve();
  }

  Speech.chain = Speech.chain.then(()=> new Promise(resolve=>{
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "de-DE";
    msg.rate = 0.95;
    msg.onend = () => setTimeout(resolve, 80);
    msg.onerror = () => setTimeout(resolve, 80);
    speechSynthesis.speak(msg);
  }));

  return Speech.chain;
}

/* =========================================================
   RING TIMER
   ========================================================= */
function setRing(total, value){
  total = Number(total) || 0;
  value = Number(value);

  App.ringTotal = total;
  App.ringValue = value;

  const r = 46;
  const c = 2 * Math.PI * r;
  ringFg.style.strokeDasharray = `${c} ${c}`;

  if(!total || isNaN(value)){
    ringFg.style.strokeDashoffset = `${c * 0.15}`;
    return;
  }

  const clamped = Math.max(0, Math.min(total, value));
  const progress01 = 1 - (clamped / total);
  const offset = c * (1 - progress01);
  ringFg.style.strokeDashoffset = `${offset}`;
}

/* NEW: ring pulse control (for reps/hold) */
function setRingPulse(mode){
  // mode: 'off' | 'pulse' | 'strong'
  if(!ringEl) return;
  ringEl.classList.remove('pulse');
  ringEl.classList.remove('pulseStrong');
  if(mode === 'pulse') ringEl.classList.add('pulse');
  if(mode === 'strong') ringEl.classList.add('pulseStrong');
}

/* =========================================================
   COUNTDOWN (kept)
   ========================================================= */
async function countdown(sec){
  setRingPulse('off');
  setRing(sec, sec);

  for(let i=sec;i>0;i--){
    if(!running) return;
    while(App.paused) await sleep(150);

    update(i);
    setRing(sec, i);
    await speak(i.toString(), {interrupt:false});
  }
}

/* =========================================================
   CANCEL / RESET helper
   ========================================================= */
function cancelRun(){
  App.token++;
  App.session++;
  running = false;
  clearInterval(timer);
  speechSynthesis.cancel();
}

/* =========================================================
   START – Coach Flow bleibt unverändert
   ========================================================= */
async function start(){
  if(running) return;

  running = true;
  App.state = "running";
  App.session++;

  const myToken = App.token;
  let ex = phases[phaseIndex][current];

  await speak(ex.name);
  if(myToken !== App.token) return;

  if(ex.subtitle) await speak(ex.subtitle);
  if(myToken !== App.token) return;

  if(ex.guide){
    for(let g of ex.guide){
      await speak(g);
      if(myToken !== App.token) return;
      while(App.paused) await sleep(150);
    }
  }

  await sleep(1000);
  if(myToken !== App.token) return;

  await speak("Bereit machen");
  if(myToken !== App.token) return;

  await countdown(3);
  if(myToken !== App.token) return;

  run(ex);
}

/* =========================================================
   RUN DISPATCH (kept)
   ========================================================= */
function run(ex){
  if(ex.type==="time") runTime(ex);
  if(ex.type==="reps") runReps(ex);
  if(ex.type==="side") runSide(ex);
  if(ex.type==="holdReps") runHoldReps(ex);
  if(ex.type==="sideHoldReps") runSideHoldReps(ex);
}

/* =========================================================
   TIME (kept name, improved)
   ========================================================= */
function runTime(ex){
  (async ()=>{
    setRingPulse('off');

    const myToken = App.token;
    const total = ex.time;
    let t = total;

    update(t);
    setRing(total, t);

    while(t > 0){
      if(!running || myToken !== App.token) return;

      while(App.paused){
        await sleep(150);
        if(!running || myToken !== App.token) return;
      }

      if(t <= 5 && t > 0){
        await speak(t.toString(), {interrupt:false, dedupeMs: 50});
        if(!running || myToken !== App.token) return;
      }

      await sleep(1000);
      if(!running || myToken !== App.token) return;

      t--;
      update(t);
      setRing(total, t);
    }

    if(myToken !== App.token) return;
    next();
  })();
}

/* =========================================================
   REPS – pulse visual
   ========================================================= */
async function runReps(ex){
  const myToken = App.token;
  let reps = ex.reps;
  const total = ex.reps || 0;

  setRingPulse('pulse');
  setRing(total, reps);

  while(reps > 0 && running){
    if(myToken !== App.token) return;

    if(App.paused){
      await sleep(150);
      continue;
    }

    update(reps);
    setRing(total, reps);
    await speak(reps.toString(), {interrupt:false});
    if(myToken !== App.token) return;

    reps--;
    await sleep((ex.rest || 0) * 1000);
  }

  setRingPulse('off');
  if(myToken !== App.token) return;
  next();
}

/* =========================================================
   SIDE – Seitenwechsel intern, 5 Sek Übergang ohne Speak
   ========================================================= */
async function runSide(ex){
  const myToken = App.token;
  let sides = ["rechts","links"];
  const total = ex.time || 0;

  setRingPulse('off');

  for(let i=0;i<sides.length;i++){
    if(!running || myToken !== App.token) return;

    let s = sides[i];

    showSide("Seite " + s);
    await speak("Seite " + s, {interrupt:false});
    if(myToken !== App.token) return;

    let t = ex.time;
    update(t);
    setRing(total, t);

    while(t > 0 && running){
      if(myToken !== App.token) return;

      if(App.paused){
        await sleep(150);
        continue;
      }

      if(t <= 5 && t > 0){
        await speak(t.toString(), {interrupt:false, dedupeMs: 50});
        if(myToken !== App.token) return;
      }

      await sleep(1000);
      if(!running || myToken !== App.token) return;

      t--;
      update(t);
      setRing(total, t);
    }

    if(i < sides.length - 1){
      // optional (standard aus): Seitenwechsel Speak
      if(App.speakSideSwitch){
        await speak("Seitenwechsel", {interrupt:false});
      }

      showSide("Wechsel...");
      for(let k=5; k>0; k--){
        if(!running || myToken !== App.token) return;
        while(App.paused) await sleep(150);

        update(k);
        setRing(5, k);
        await sleep(1000);
      }
    }
  }

  showSide("");
  next();
}

/* =========================================================
   HOLD REPS – strong pulse
   ========================================================= */
async function runHoldReps(ex){
  const myToken = App.token;
  let reps = ex.reps;
  const total = ex.reps || 0;

  setRingPulse('strong');
  setRing(total, reps);

  while(reps > 0 && running){
    if(myToken !== App.token) return;

    if(App.paused){
      await sleep(150);
      continue;
    }

    update("HALTEN");
    setRing(total, reps);
    await speak("Halten", {interrupt:false});
    if(myToken !== App.token) return;

    await sleep(ex.holdTime || 4000);
    reps--;
  }

  setRingPulse('off');
  if(myToken !== App.token) return;
  next();
}

/* =========================================================
   SIDE HOLD REPS – internal switch, pulse
   ========================================================= */
async function runSideHoldReps(ex){
  const myToken = App.token;
  let sides = ["rechts","links"];

  for(let i=0;i<sides.length;i++){
    if(!running || myToken !== App.token) return;

    let s = sides[i];
    showSide("Seite " + s);
    await speak("Seite " + s, {interrupt:false});
    if(myToken !== App.token) return;

    let reps = ex.reps;
    const total = ex.reps || 0;

    setRingPulse('strong');
    setRing(total, reps);

    while(reps > 0 && running){
      if(myToken !== App.token) return;

      if(App.paused){
        await sleep(150);
        continue;
      }

      update(reps);
      setRing(total, reps);

      await speak("Halten", {interrupt:false});
      if(myToken !== App.token) return;

      await sleep(ex.holdTime || 4000);
      reps--;
    }

    setRingPulse('off');

    if(i < sides.length - 1){
      if(App.speakSideSwitch){
        await speak("Seitenwechsel", {interrupt:false});
      }

      showSide("Wechsel...");
      for(let k=5; k>0; k--){
        if(!running || myToken !== App.token) return;
        while(App.paused) await sleep(150);

        update(k);
        setRing(5, k);
        await sleep(1000);
      }
    }
  }

  showSide("");
  next();
}

/* =========================================================
   STOP (kept) – improved
   ========================================================= */
function stop(){
  cancelRun();

  App.paused = false;
  App.state = "idle";

  update("0");
  setRingPulse('off');
  setRing(0, 0);
  showSide("");

  current = 0;
  updateProgress();
}

/* =========================================================
   SKIP (kept) – safe
   ========================================================= */
function skip(){
  cancelRun();

  setTimeout(()=>{
    next();
  }, 80);
}

/* =========================================================
   NEXT (kept)
   ========================================================= */
async function next(){
  running = false;

  current++;
  updateProgress();

  if(current >= phases[phaseIndex].length){
    update("FERTIG");
    setRingPulse('off');
    setRing(0, 0);
    await speak("Training beendet", {interrupt:true});
    App.state = "idle";
    return;
  }

  load();

  await sleep(1500);
  if(App.paused) return;

  start();
}

/* =========================================================
   PAUSE / RESUME->WEITER (kept resume alias)
   ========================================================= */
function pause(){
  App.paused = true;
  speechSynthesis.cancel();
}

function resume(){
  weiter();
}

function weiter(){
  App.paused = false;
}

/* =========================================================
   PHASE NAV
   ========================================================= */
function nextPhase(){
  cancelRun();
  App.paused = false;

  phaseIndex = (phaseIndex + 1) % phases.length;
  current = 0;
  load();
}

function setPhase(p){
  cancelRun();
  App.paused = false;

  phaseIndex = p - 1;
  current = 0;
  load();
}

/* =========================================================
   BEENDEN (improved) – kompletter Reset, optional Speak
   ========================================================= */
async function beenden(){
  cancelRun();
  App.paused = false;
  App.state = "idle";

  // optional: Ansage (default: mit Ansage)
  if(App.speakOnBeenden){
    // Wichtig: speak nach cancelRun(), aber ohne Flow-Änderung (nur Button-Aktion)
    await speak("Training beendet", {interrupt:true});
  }

  phaseIndex = 0;
  current = 0;

  showSide("");
  update("0");
  setRingPulse('off');
  setRing(0, 0);
  progress.style.width = "0%";

  load();
}

/* =========================================================
   LOAD
   ========================================================= */
function load(){
  let ex = phases[phaseIndex][current];

  phaseTitle.innerText = "Training " + (phaseIndex + 1);
  exerciseTitle.innerText = ex.name;
  exerciseImage.src = ex.img;

  if(ex.guide && Array.isArray(ex.guide)){
    let html = "<ul>";
    ex.guide.forEach(g=>{
      html += "<li>" + g + "</li>";
    });
    html += "</ul>";
    guide.innerHTML = html;
  }else{
    guide.innerHTML = "";
  }

  const base = ex.time || ex.reps || 0;
  update(base);
  setRingPulse('off');
  setRing(base, base);

  updateProgress();
  updatePhaseButtons();
}

/* =========================================================
   UPDATE UI
   ========================================================= */
function update(v){
  timerEl.innerText = v;

  const n = Number(v);
  if(!isNaN(n) && App.ringTotal){
    setRing(App.ringTotal, n);
  }
}

function showSide(s){
  side.innerText = s;
}

/* =========================================================
   PROGRESS
   ========================================================= */
function updateProgress(){
  let total = phases[phaseIndex].length;
  progress.style.width = ((current / total) * 100) + "%";
}

function updatePhaseButtons(){
  const b1 = document.getElementById("btnP1");
  const b2 = document.getElementById("btnP2");
  const b3 = document.getElementById("btnP3");
  [b1,b2,b3].forEach((b, idx)=>{
    if(!b) return;
    b.classList.toggle("active", idx === phaseIndex);
  });
}

/* =========================================================
   INIT
   ========================================================= */
load();
updatePhaseButtons();
