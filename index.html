<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psoas Ultra+ FIX</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(#0b1a2f, #0f2c50);
    color: white;
    text-align: center;
}

img {
    width: 90%;
    max-width: 500px;
    border-radius: 12px;
    margin: 20px auto;
}

.timer { font-size: 70px; }

button {
    padding: 12px 18px;
    margin: 5px;
    border-radius: 10px;
    border: none;
}
.start { background: green; }
.pause { background: red; }
</style>
</head>

<body>

<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>
<p id="nextExercise"></p>

<img id="exerciseImage" src="">

<div class="timer" id="timer">40</div>

<button class="start" onclick="startTimer()">Start</button>
<button class="pause" onclick="pauseTimer()">Pause</button>

<script>

// =============================
// ⚠️ IMMER BEI 0 STARTEN (FIX)
// =============================
let current = 0;

// =============================
let week = 2;

// =============================
const phase2 = [
    {name:"Hüftöffnung links", img:"phase2.jpg", time:40},
    {name:"Hüftöffnung rechts", img:"phase2.jpg", time:40},
    {name:"Dead Bug", img:"phase2.jpg", time:40}
];

const exercises = phase2;

// =============================
let timeLeft = exercises[current].time;
let timer = null;

// =============================
// 🔊 AUDIO FIX (iOS SAFE)
// =============================
function speak(text) {

    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "de-DE";

    // HARTE iOS Aktivierung
    speechSynthesis.cancel();
    setTimeout(() => {
        speechSynthesis.speak(msg);
    }, 100);
}

// 👉 WICHTIG: direkt an Start koppeln!
function startTimer() {

    if (timer) return;

    speak("Start");

    timer = setInterval(() => {

        timeLeft--;
        document.getElementById("timer").innerText = timeLeft;

        if (timeLeft <= 0) nextExercise();

    }, 1000);
}

// =============================
function pauseTimer() {
    clearInterval(timer);
    timer = null;
    speak("Pause");
}

// =============================
function nextExercise() {

    clearInterval(timer);
    timer = null;

    speak("Wechsel");

    current++;

    if (current >= exercises.length) {
        alert("Fertig");
        current = 0;
    }

    loadExercise();
}

// =============================
function loadExercise() {

    let ex = exercises[current];

    document.getElementById("exerciseTitle").innerText = ex.name;
    document.getElementById("phaseTitle").innerText = "Phase 2";

    if (current + 1 < exercises.length) {
        document.getElementById("nextExercise").innerText =
            "Als nächstes: " + exercises[current + 1].name;
    }

    // 🖼️ IMAGE FIX + ERROR DEBUG
    let img = document.getElementById("exerciseImage");
    img.src = ex.img;

    img.onerror = function() {
        img.src = "";
        alert("Bild fehlt: " + ex.img);
    };

    timeLeft = ex.time;
    document.getElementById("timer").innerText = timeLeft;
}

// =============================
loadExercise();

</script>

</body>
</html>
