<!DOCTYPE html>
<html lang="de">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Psoas Ultra+</title>

<style>
body {
 font-family:-apple-system;
 margin:0;
 background:#0f172a;
 color:white;
 text-align:center;
}

.header {padding:20px;font-size:22px;font-weight:bold;}
.timer {font-size:60px;margin:10px;}
.exercise {font-size:24px;margin-top:10px;}
.next {font-size:14px;color:#94a3b8;}
img {width:90%;border-radius:12px;margin-top:10px;}

button {
 padding:12px;margin:5px;border-radius:10px;
 border:none;background:#22c55e;color:white;
}

input {
 padding:10px;border-radius:8px;border:none;
 width:60px;text-align:center;
}
</style>
</head>

<body>

<div class="header">Psoas Ultra+</div>

<div>
 Schmerz (0–10):
 <input id="pain" type="number" min="0" max="10">
</div>

<div class="exercise" id="exercise">Bereit</div>
<div class="next" id="next"></div>

<img id="img" src="https://i.imgur.com/8Km9tLL.jpg">

<div class="timer" id="timer">0</div>

<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>

<script>

// 📊 Schmerz speichern
function savePain(){
 let val = document.getElementById("pain").value;
 localStorage.setItem("pain", val);
}

// 🧠 KI Logik
function getPlan(){
 let pain = localStorage.getItem("pain") || 5;

 if(pain >= 7){
   return [
     {name:"Bauchatmung", time:90, img:"https://i.imgur.com/8Km9tLL.jpg"},
     {name:"Knie zur Brust", time:60, img:"https://i.imgur.com/9Xn6F7O.jpg"}
   ];
 } else {
   return [
     {name:"Bauchatmung", time:60, img:"https://i.imgur.com/8Km9tLL.jpg"},
     {name:"Glute Bridge", time:60, img:"https://i.imgur.com/Vl9cXyF.jpg"},
     {name:"Adduktor Stretch", time:45, img:"https://i.imgur.com/0rK4y9b.jpg"}
   ];
 }
}

let plan = [];
let i = 0;
let t = 0;
let interval;

function speak(text){
 let msg = new SpeechSynthesisUtterance(text);
 msg.lang="de-DE";
 speechSynthesis.speak(msg);
}

function start(){
 savePain();
 plan = getPlan();
 i = 0;
 next();
}

function next(){
 if(i >= plan.length){
   speak("Fertig");
   localStorage.setItem("lastDone", Date.now());
   document.getElementById("exercise").innerText = "Fertig 💪";
   return;
 }

 let ex = plan[i];

 document.getElementById("exercise").innerText = ex.name;
 document.getElementById("img").src = ex.img;

 if(plan[i+1]){
   document.getElementById("next").innerText = "Nächste: " + plan[i+1].name;
 } else {
   document.getElementById("next").innerText = "";
 }

 speak(ex.name);

 t = ex.time;

 interval = setInterval(()=>{
   t--;
   document.getElementById("timer").innerText = t;

   if(t <= 0){
     clearInterval(interval);
     i++;
     next();
   }
 },1000);
}

function pause(){
 clearInterval(interval);
}

// 🔔 Erinnerung Hinweis
let last = localStorage.getItem("lastDone");
if(last){
 let diff = (Date.now() - last)/1000/60/60;
 if(diff > 24){
   document.getElementById("next").innerText = "Heute wieder trainieren!";
 }
}

</script>

</body>
</html>
