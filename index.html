<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Psoas Ultra PRO v13</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(#0b1a2f, #0f2c50);
    color: white;
    text-align: center;
}
img {
    width: 90%;
    max-width: 500px;
    border-radius: 12px;
    margin: 20px auto;
}
.timer { font-size: 70px; }

button {
    padding: 12px 18px;
    margin: 5px;
    border-radius: 10px;
    border: none;
}

.start { background: green; color:white; }
.pause { background: red; color:white; }
.skip { background: orange; color:white; }
.reset { background: gray; color:white; }
</style>
</head>

<body>

<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>
<img id="exerciseImage">
<div class="timer" id="timer">0</div>

<button class="start" onclick="startFlow()">Start</button>
<button class="pause" onclick="pauseTimer()">Pause</button>
<button class="skip" onclick="nextExercise()">Skip</button>
<button class="reset" onclick="resetAll()">Reset</button>

<script>

// =============================
let phaseIndex = 0;
let current = 0;
let timer = null;
let timeLeft = 0;

// =============================
// 🔊 BLOCKIERENDE SPRACHE
function speakSequence(lines, callback) {

    speechSynthesis.cancel();

    let i = 0;

    function speakNext() {

        if (i >= lines.length) {
            if (callback) callback(); // 👉 danach Timer starten
            return;
        }

        const msg = new SpeechSynthesisUtterance(lines[i]);
        msg.lang = "de-DE";

        msg.onend = () => {
            i++;
            speakNext();
        };

        speechSynthesis.speak(msg);
    }

    speakNext();
}

// =============================
// 👉 PHASES (DEINE ORIGINAL TEXTE STRUKTURIERT)

const phases = [

/* ===== PHASE 1 ===== */
[
{
name:"Bauchatmung",
img:"images/phase1.jpg",
time:120,
speech:[
"Bauchatmung",
"Nervensystem beruhigen",
"Rückenlage, Füße aufgestellt",
"Eine Hand auf den Bauch, eine auf die Brust",
"Langsam in den Bauch atmen",
"5 Sekunden einatmen",
"7 Sekunden ausatmen"
]
},
{
name:"Knie zur Brust links",
img:"images/phase1.jpg",
time:45,
speech:[
"Knie zur Brust",
"Ein Knie zur Brust ziehen",
"Anderes Bein bleibt gestreckt",
"Tief weiter atmen"
]
},
{
name:"Knie zur Brust rechts",
img:"images/phase1.jpg",
time:45,
speech:[
"Knie zur Brust",
"Ein Knie zur Brust ziehen",
"Anderes Bein bleibt gestreckt",
"Tief weiter atmen"
]
},
{
name:"Mini Becken Kippung",
img:"images/phase1.jpg",
time:40,
speech:[
"Mini Becken Kippung",
"Unterer Rücken in den Boden drücken",
"Becken nach hinten kippen",
"Kleine ruhige Bewegung"
]
}
],

/* ===== PHASE 2 ===== */
[
{
name:"Bauchatmung",
img:"images/phase2.jpg",
time:40,
speech:[
"Bauchatmung",
"Tief in den Bauch atmen",
"Langsam ausatmen"
]
},
{
name:"Dead Bug",
img:"images/phase2.jpg",
time:40,
speech:[
"Dead Bug",
"Arme nach oben",
"Knie 90 Grad",
"Gegengleich bewegen",
"Rumpf stabil halten"
]
}
]

];

// =============================
// 🚀 START FLOW
function startFlow() {

    loadExerciseAndSpeak();
}

// =============================
function loadExerciseAndSpeak() {

    const ex = phases[phaseIndex][current];

    document.getElementById("phaseTitle").innerText =
        "Phase " + (phaseIndex + 1);

    document.getElementById("exerciseTitle").innerText = ex.name;
    document.getElementById("exerciseImage").src = ex.img;

    timeLeft = ex.time;
    document.getElementById("timer").innerText = timeLeft;

    // 👉 ERST ANSAGE, DANN TIMER
    speakSequence(ex.speech, startTimer);
}

// =============================
function startTimer() {

    clearInterval(timer);

    timer = setInterval(() => {

        timeLeft--;
        document.getElementById("timer").innerText = timeLeft;

        if (timeLeft <= 0) nextExercise();

    }, 1000);
}

// =============================
function nextExercise() {

    clearInterval(timer);

    current++;

    if (current >= phases[phaseIndex].length) {

        phaseIndex++;

        if (phaseIndex >= phases.length) {
            alert("Fertig 💪");
            resetAll();
            return;
        }

        current = 0;
    }

    loadExerciseAndSpeak();
}

// =============================
function pauseTimer() {
    clearInterval(timer);
}

// =============================
function resetAll() {
    clearInterval(timer);
    phaseIndex = 0;
    current = 0;
    loadExerciseAndSpeak();
}

// =============================
loadExerciseAndSpeak();

</script>

</body>
</html>
