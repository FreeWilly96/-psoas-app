<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psoas Ultra PRO</title>

<link rel="apple-touch-icon" sizes="180x180" href="images/icon.png">
<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Psoas Ultra">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
body { margin:0; font-family:Arial; text-align:center; background:#f2f2f2; }
body.dark { background:#0b1a2f; color:white; }

img { width:95%; height:40vh; object-fit:contain; }

.timer { font-size:80px; }
.side { font-size:30px; height:40px; }

button { padding:10px; margin:5px; border:none; border-radius:10px; color:white; }
.start{background:green;} .pause{background:red;} .skip{background:orange;}
.mode{background:black;} .phase{background:#999;} .phase.active{background:purple;}
</style>
</head>

<body>

<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>
<div id="side" class="side"></div>

<img id="exerciseImage">
<div id="guide"></div>

<div id="timer" class="timer">0</div>

<button class="start" onclick="start()">Start</button>
<button class="pause" onclick="pause()">Pause</button>
<button class="skip" onclick="next()">Skip</button>
<button class="mode" onclick="toggleMode()">Mode</button>

<br>
<button id="btnP1" class="phase" onclick="setPhase(1)">Phase 1</button>
<button id="btnP2" class="phase" onclick="setPhase(2)">Phase 2</button>

<script>

let phaseIndex = 0;
let current = 0;
let timer = null;
let spoken = false;

// =============================
function speak(text, cb){
    speechSynthesis.cancel();
    let msg = new SpeechSynthesisUtterance(text);
    msg.lang="de-DE";
    msg.rate=0.95;
    msg.onend = ()=> cb && cb();
    speechSynthesis.speak(msg);
}

function speakSequence(name, text, cb){
    speak(name, ()=> speak(text, cb));
}

// =============================
function start(){
    if(timer) return;

    let ex = phases[phaseIndex][current];

    if(!spoken){
        spoken = true;
        speakSequence(ex.name, ex.speech, ()=>{
            countdown(()=> run(ex));
        });
    } else {
        countdown(()=> run(ex));
    }
}

// =============================
function countdown(cb){
    let c = 3;

    function step(){
        if(c===0){ cb(); return; }

        speak(c.toString());
        update(c);

        c--;
        setTimeout(step,1000);
    }

    step();
}

// =============================
function run(ex){
    if(ex.type==="time") runTime(ex);
    else if(ex.type==="reps") runReps(ex);
    else if(ex.type==="side") runSide(ex);
}

// =============================
function runTime(ex){
    let t = ex.time;

    timer = setInterval(()=>{
        t--;
        update(t);

        if(t<=5 && t>0) speak(t);

        if(t<=0) next();

    },1000);
}

// =============================
function runReps(ex){
    let reps = ex.reps;
    let rest = ex.rest || 3;

    function doRep(){
        if(reps<=0){ next(); return; }

        let txt = reps.toString();
        if(ex.hold) txt += ". Spannung halten";

        speak(txt);
        update(reps);

        reps--;
        setTimeout(doRep, rest*1000);
    }

    doRep();
}

// =============================
function runSide(ex){

    let sides = ["rechts","links"];
    let i = 0;

    function doSide(){

        if(i>=sides.length){
            next();
            return;
        }

        showSide(sides[i]);
        speak("Seite " + sides[i]);

        let t = ex.time;

        timer = setInterval(()=>{

            t--;
            update(t);

            if(t<=0){
                clearInterval(timer);
                i++;
                doSide();
            }

        },1000);
    }

    doSide();
}

// =============================
function next(){

    clearInterval(timer);
    timer=null;
    spoken=false;

    current++;

    if(current>=phases[phaseIndex].length){
        alert("Training fertig 💪");
        current=0;
    }

    let ex = phases[phaseIndex][current];

    speak("Nächste Übung", ()=>{
        speakSequence(ex.name, ex.speech);
    });

    restCountdown(()=>{
        load();
        start();
    });
}

// =============================
function restCountdown(cb){

    let t = 15;

    function step(){
        if(t===0){ cb(); return; }

        update(t);
        t--;
        setTimeout(step,1000);
    }

    step();
}

// =============================
function pause(){
    clearInterval(timer);
    timer=null;
    speak("Pause");
}

function setPhase(p){
    phaseIndex = p-1;
    current = 0;
    spoken=false;
    load();
}

function toggleMode(){
    document.body.classList.toggle("dark");
}

// =============================
function load(){

    let ex = phases[phaseIndex][current];

    document.getElementById("phaseTitle").innerText = "Phase " + (phaseIndex+1);
    document.getElementById("exerciseTitle").innerText = ex.name;
    document.getElementById("exerciseImage").src = ex.img;
    document.getElementById("guide").innerText = ex.speech;

    update(ex.time || ex.reps);
}

function update(v){
    document.getElementById("timer").innerText = v;
}

function showSide(s){
    document.getElementById("side").innerText = s;
}

// =============================
// PHASES FINAL
// =============================
const phases = [

[
{name:"Bauchatmung", img:"images/phase3.jpg", type:"time", time:120,
speech:"Rückenlage. Füße aufgestellt. Eine Hand auf Bauch, eine auf Brust. Atme tief in den Bauch ein, etwa fünf Sekunden lang. Atme langsam durch den Mund aus, etwa sieben Sekunden. Der Bauch hebt und senkt sich ruhig."},

{name:"Knie zur Brust", img:"images/phase3.jpg", type:"side", time:45,
speech:"Ziehe ein Knie langsam zur Brust. Halte die Position entspannt. Das andere Bein bleibt locker am Boden liegen. Nicht ziehen, sondern nur sanft heranziehen."},

{name:"Mini-Becken-Kippung", img:"images/phase3.jpg", type:"reps", reps:15, rest:3,
speech:"Kippe dein Becken leicht nach hinten. Drücke den unteren Rücken in den Boden und löse wieder. Kleine, kontrollierte Bewegung ohne Schwung."},

{name:"Hüftbeuger Dehnung", img:"images/phase3.jpg", type:"side", time:40,
speech:"Gehe in den Halbkniestand. Spanne das Gesäß an und kippe das Becken leicht nach vorne. Du spürst die Dehnung vorne in der Hüfte."},

{name:"Glute Bridge", img:"images/phase3.jpg", type:"reps", reps:12, rest:3,
speech:"Drücke die Hüfte nach oben. Spanne dein Gesäß an und halte kurz oben. Senke dich langsam wieder ab."},

{name:"Adduktor Dehnung", img:"images/phase3.jpg", type:"time", time:45,
speech:"Gehe in einen breiten Stand. Verlagere dein Gewicht zur Seite und halte die Dehnung im inneren Oberschenkel."}
],

[
{name:"Bauchatmung Aktivierung", img:"images/phase2.jpg", type:"time", time:60,
speech:"Atme ruhig und gleichmäßig. Baue Körperspannung auf und bereite dich auf die Bewegung vor."},

{name:"Dynamische Hüftöffnung", img:"images/phase2.jpg", type:"side", time:30,
speech:"Gehe in einen Ausfallschritt. Bewege die Hüfte kontrolliert nach vorne und zurück. Bleibe stabil im Oberkörper."},

{name:"Glute Bridge einbeinig", img:"images/phase2.jpg", type:"reps", reps:10, rest:3, hold:true,
speech:"Hebe ein Bein an. Drücke die Hüfte nach oben und halte die Spannung. Senke langsam ab und wiederhole."},

{name:"Dead Bug", img:"images/phase2.jpg", type:"reps", reps:12, rest:3,
speech:"Bewege Arm und gegenüberliegendes Bein gleichzeitig. Halte deinen Rumpf stabil und kontrolliere jede Bewegung."},

{name:"Seitliche Ausfallschritte", img:"images/phase2.jpg", type:"reps", reps:10, rest:3,
speech:"Mache einen großen Schritt zur Seite. Schiebe die Hüfte nach hinten und halte den Rücken gerade."},

{name:"Adduktor Hüfte Kombi", img:"images/phase2.jpg", type:"time", time:40,
speech:"Halte die Dehnung und führe kleine kontrollierte Bewegungen aus. Spüre die Aktivierung in der Hüfte."}
]

];

// =============================
load();

</script>

</body>
</html>
