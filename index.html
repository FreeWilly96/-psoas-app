<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psoas Ultra PRO</title>

<link rel="apple-touch-icon" sizes="180x180" href="images/icon.png">
<link rel="manifest" href="manifest.json">

<style>
body {
    margin:0;
    font-family:-apple-system,Arial;
    text-align:center;
    background:#0b1a2f;
    color:white;
    transition:0.3s;
}

body.dark {
    background:#0b1a2f;
    color:white;
}

@media (prefers-color-scheme: light){
    body:not(.dark){
        background:#f2f2f2;
        color:#111;
    }
}

img {
    width:95%;
    height:35vh;
    object-fit:contain;
}

/* 🔥 RING TIMER */
.ringWrap{
    position:relative;
    width:160px;
    height:160px;
    margin:10px auto;
}

canvas{
    position:absolute;
    top:0;
    left:0;
}

.timer {
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
    font-weight:bold;
}

/* ============================= */

.side {
    font-size:26px;
    height:40px;
    color:#ccc;
}

.guide {
    max-width:500px;
    margin:10px auto;
    padding:12px;
    border-radius:14px;
    background:#1e2a3a;
}

/* 🔥 BUTTONS */
button {
    padding:12px;
    margin:5px;
    border:none;
    border-radius:12px;
    color:white;
    font-weight:bold;
    font-size:15px;
}

.start{background:#22c55e;}
.pause{background:#ef4444;}
.skip{background:#f59e0b;}
.mode{background:#374151;}

.phase {background:#475569;}
.phase.active {background:#a855f7;}

#progressBar {
    width:90%;
    height:10px;
    background:#1e293b;
    margin:10px auto;
    border-radius:10px;
}

#progress {
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#a855f7,#ec4899);
}

/* 🔥 BOTTOM BAR */
.bottomBar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:rgba(20,20,20,0.9);
    padding:8px;
    display:flex;
    gap:6px;
    z-index:999;
}
.bottomBar button{
    flex:1;
    font-size:14px;
}
</style>
</head>

<body>

<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>
<div id="side" class="side"></div>

<img id="exerciseImage">
<div id="guide" class="guide"></div>

<!-- 🔥 RING TIMER -->
<div class="ringWrap">
<canvas id="ring" width="160" height="160"></canvas>
<div id="timer" class="timer">0</div>
</div>

<div id="progressBar"><div id="progress"></div></div>

<br>

<button id="btnP1" class="phase" onclick="setPhase(1)">Training 1</button>
<button id="btnP2" class="phase" onclick="setPhase(2)">Training 2</button>
<button id="btnP3" class="phase" onclick="setPhase(3)">Training 3</button>    
<button class="mode" onclick="nextPhase()">Nächstes Training</button>

<!-- 🔥 BOTTOM BAR -->
<div class="bottomBar">
<button class="start" onclick="start()">Start</button>
<button class="pause" onclick="pause()">Pause</button>
<button style="background:#3498db" onclick="weiter()">Weiter</button>
<button class="skip" onclick="skip()">Skip</button>
<button style="background:#555" onclick="stop()">Stop</button>
</div>



<script>

// =============================
const App = {
    paused:false,
    state:"idle",
    session:0
};

let phaseIndex = 0;
let current = 0;
let timer = null;
let running = false;

let startLock = false;

// =============================
const phaseTitle = document.getElementById("phaseTitle");
const exerciseTitle = document.getElementById("exerciseTitle");
const exerciseImage = document.getElementById("exerciseImage");
const guide = document.getElementById("guide");
const timerEl = document.getElementById("timer");
const side = document.getElementById("side");
const progress = document.getElementById("progress");

// =============================
// 🔥 RING TIMER
const canvas = document.getElementById("ring");
const ctx = canvas.getContext("2d");

function drawRing(percent){
    ctx.clearRect(0,0,160,160);

    ctx.beginPath();
    ctx.arc(80,80,70,0,Math.PI*2);
    ctx.strokeStyle="#1e293b";
    ctx.lineWidth=8;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(80,80,70,-Math.PI/2,(Math.PI*2*percent)-Math.PI/2);
    ctx.strokeStyle="#a855f7";
    ctx.lineWidth=8;
    ctx.stroke();
}

// =============================
function update(v, total=60){
    timerEl.innerText = v;

    if(typeof v === "number"){
        drawRing(v/total);
    }
}

// =============================
function sleep(ms,session){
    return new Promise(resolve=>{
        const start=Date.now();
        function loop(){
            if(session!==App.session) return resolve();
            if(App.paused) return requestAnimationFrame(loop);
            if(Date.now()-start>=ms) return resolve();
            requestAnimationFrame(loop);
        }
        loop();
    });
}

// =============================
function speak(text,session){
    speechSynthesis.cancel();
    return new Promise(resolve=>{
        if(session!==App.session) return resolve();
        const msg=new SpeechSynthesisUtterance(text);
        msg.lang="de-DE";
        msg.rate=0.92;
        msg.onend=()=>setTimeout(resolve,100);
        speechSynthesis.speak(msg);
    });
}

// =============================
async function countdown(sec,session){
    for(let i=sec;i>0;i--){
        if(session!==App.session) return;
        while(App.paused) await sleep(150,session);
        update(i,sec);
        await speak(i.toString(),session);
    }
}

// =============================
async function start(){

    if(running || startLock) return;

    startLock = true;
    running = true;
    App.state = "running";

    clearInterval(timer);

    App.session++;
    const session = App.session;

    let ex = phases[phaseIndex][current];

    await speak(ex.name,session);

    if(ex.subtitle) await speak(ex.subtitle,session);

    if(ex.guide){
        for(let g of ex.guide){
            if(session!==App.session) return;
            await speak(g,session);
        }
    }

    await sleep(800,session);
    await speak("Bereit machen",session);
    await countdown(3,session);

    if(session!==App.session) return;

    startLock = false;

    run(ex,session);
}

// =============================
function run(ex,session){

    if(ex.type==="time") runTime(ex,session);
    if(ex.type==="reps") runReps(ex,session);
    if(ex.type==="side") runSide(ex,session);
    if(ex.type==="holdReps") runHoldReps(ex,session);
    if(ex.type==="sideHoldReps") runSideHoldReps(ex,session);
}

// =============================
function runTime(ex,session){

    let t=ex.time;
    let total = ex.time;

    update(t,total);

    clearInterval(timer);

    timer=setInterval(()=>{

        if(session!==App.session){
            clearInterval(timer);
            return;
        }

        if(App.paused) return;

        t--;
        update(t,total);

        if(t<=5 && t>0) speak(t.toString(),session);

        if(t<=0){
            clearInterval(timer);
            next(session);
        }

    },1000);
}

// =============================
async function runReps(ex,session){

    let reps=ex.reps;

    while(reps>0){

        if(session!==App.session) return;

        while(App.paused) await sleep(150,session);

        update(reps,ex.reps);
        await speak(reps.toString(),session);

        reps--;
        await sleep(ex.rest*1000,session);
    }

    next(session);
}

// =============================
async function runHoldReps(ex,session){

    let reps=ex.reps;

    while(reps>0){

        if(session!==App.session) return;

        while(App.paused) await sleep(150,session);

        update(reps,ex.reps);
        await speak("Halten",session);

        await sleep(ex.holdTime||4000,session);

        reps--;
    }

    next(session);
}

// =============================
async function runSide(ex,session){

    let sides=["rechts","links"];

    for(let i=0;i<sides.length;i++){

        if(session!==App.session) return;

        let s=sides[i];

        showSide(s);
        await speak("Seite "+s,session);

        let t=ex.time;
        let total=ex.time;

        while(t>0){

            if(session!==App.session) return;

            while(App.paused) await sleep(150,session);

            update(t,total);

            if(t<=5 && t>0) speak(t.toString(),session);

            await sleep(1000,session);
            t--;
        }

        if(i<sides.length-1){
            await speak("Seitenwechsel",session);
            await sleep(5000,session);
        }
    }

    showSide("");
    next(session);
}

// =============================
async function runSideHoldReps(ex,session){

    let sides=["rechts","links"];

    for(let i=0;i<sides.length;i++){

        if(session!==App.session) return;

        let s=sides[i];

        showSide(s);
        await speak("Seite "+s,session);

        let reps=ex.reps;

        while(reps>0){

            if(session!==App.session) return;

            while(App.paused) await sleep(150,session);

            update(reps,ex.reps);

            await speak("Halten",session);
            await sleep(ex.holdTime||4000,session);

            reps--;
        }

        if(i<sides.length-1){
            await speak("Seitenwechsel",session);
            await sleep(5000,session);
        }
    }

    showSide("");
    next(session);
}

// =============================
function skip(){

    App.session++;
    running=false;
    startLock=false;

    clearInterval(timer);
    speechSynthesis.cancel();

    setTimeout(()=>{
        next(App.session);
    },100);
}

// =============================
function stop(){

    App.session++;
    running=false;
    startLock=false;

    clearInterval(timer);
    speechSynthesis.cancel();

    current=0;
    update("0");
    showSide("");
}

// =============================
async function next(session){

    if(session!==App.session) return;

    running=false;
    startLock=false;

    current++;

    updateProgress();

    if(current>=phases[phaseIndex].length){
        update("FERTIG 💪");
        await speak("Training beendet",session);
        return;
    }

    load();

    await sleep(1200,session);

    start();
}

// =============================
function pause(){
    App.paused=true;
    App.state="paused";
    speechSynthesis.cancel();
}

// 🔥 NEU: WEITER (statt resume)
function weiter(){

    if(!App.paused) return;

    App.paused=false;
    App.state="running";
}

// =============================
function nextPhase(){
    App.session++;
    phaseIndex=(phaseIndex+1)%phases.length;
    current=0;
    load();
}

function setPhase(p){
    App.session++;
    phaseIndex=p-1;
    current=0;
    load();
}

// =============================
function load(){

    let ex=phases[phaseIndex][current];

    phaseTitle.innerText="Training "+(phaseIndex+1);
    exerciseTitle.innerText=ex.name;
    exerciseImage.src=ex.img;

    let html="<ul>";
    ex.guide.forEach(g=>html+="<li>"+g+"</li>");
    html+="</ul>";

    guide.innerHTML=html;

    update(ex.time||ex.reps, ex.time||ex.reps);
    updateProgress();
}

// =============================
function showSide(s){
    side.innerText=s;
}

// =============================
function updateProgress(){
    let total=phases[phaseIndex].length;
    progress.style.width=(current/total*100)+"%";
}



// =============================
// 🔥 STABILE PHASEN
const phases = [

/* ================= PHASE 1 ================= */
[
{

img:"images/phase3.jpg",
type:"time",
time:120,
guide:[
"Rückenlage, Füße aufgestellt",
"Eine Hand auf Bauch, eine auf Brust",
"Langsam in den Bauch atmen",
"5 Sekunden einatmen, 7 Sekunden ausatmen"
]
},

{
name:"Knie zur Brust",
subtitle:"Psoas Entlastung",
img:"images/phase3.jpg",
type:"side",
time:45,
guide:[
"Rückenlage",
"Ein Knie zur Brust ziehen und mit Händen halten",
"Anderes Bein bleibt gestreckt und locker",
"Tief weiteratmen und entspannen"
]
},

{
name:"Mini-Becken-Kippung",
subtitle:"Kontrolle und Entlastung",
img:"images/phase3.jpg",
type:"reps",
reps:15,
rest:3,
guide:[
"Rückenlage, Füße aufgestellt",
"Unterer Rücken leicht in den Boden drücken",
"Becken kippt nach vorne",
"Spannung kurz halten und wieder lösen",
"Kleine ruhige Bewegung"
]
},

{
name:"Hüftbeuger Dehnung",
subtitle:"Psoas und Hüftbeuger dehnen",
img:"images/phase3.jpg",
type:"side",
time:40,
guide:[
"Halbkniestand",
"Gesäß der hinteren Seite anspannen",
"Becken leicht nach vorne kippen",
"Oberkörper aufrecht, kein Hohlkreuz",
"Dehnung vorne in der Hüfte spüren"
]
},

{
name:"Glute Bridge",
subtitle:"Gesäßmuskulatur stärken",
img:"images/phase3.jpg",
type:"holdReps",
reps:15,
guide:[
"Rückenlage, Füße hüftbreit aufstellen",
"Hüfte nach oben drücken, Gesäß anspannen",
"Oben 5 Sekunden halten",
"Langsam wieder absenken"
]
},

{
name:"Adduktor Dehnung",
subtitle:"Leisten und Innenschenkel dehnen",
img:"images/phase3.jpg",
type:"side", // ✅ WAR "time"
time:45,
guide:[
"Breiten Stand einnehmen",
"Gewicht zur Seite verlagern",
"Andere Seite bleibt gestreckt",
"Rücken gerade halten",
"Dehnung innen spüren"
]
}
],

/* ================= PHASE 2 ================= */
[
{
name:"Bauchatmung Aktivierung",
subtitle:"Rumpf aktivieren",
img:"images/phase2.jpg",
type:"time",
time:60,
guide:[
"Ruhig atmen",
"Spannung im Rumpf aufbauen",
"Kontrollierte Atmung"
]
},

{

img:"images/phase2.jpg",

]
},

]

]

],
 /* ================= TRAINING 3 ================= */
[

]
},

]

]   

];
// =============================
load();

</script>

</body>
</html>
