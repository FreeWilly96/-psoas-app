<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psoas Ultra PRO</title>

<style>
body {
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,Arial;
    text-align:center;
    background:#0b1a2f;
    color:white;
    transition:0.3s;
}

/* 🔥 AUTO DARK MODE (System) */
@media (prefers-color-scheme: light){
    body{
        background:#f2f2f2;
        color:#111;
    }
    .guide{
        background:white;
    }
}

/* ============================= */

img {
    width:95%;
    height:40vh;
    object-fit:contain;
}

/* 🔥 RING TIMER */
.ringWrap{
    position:relative;
    width:180px;
    height:180px;
    margin:10px auto;
}

canvas{
    position:absolute;
    top:0;
    left:0;
}

.timer {
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    font-weight:bold;
}

/* ============================= */

.side {
    font-size:28px;
    height:40px;
    color:#ccc;
}

.guide {
    max-width:500px;
    margin:10px auto;
    padding:14px;
    border-radius:18px;
    background:#1e2a3a;
    box-shadow:0 8px 24px rgba(0,0,0,0.35);
}

/* 🔥 BUTTONS iOS STYLE */
button {
    padding:14px;
    margin:6px;
    border:none;
    border-radius:18px;
    color:white;
    font-weight:600;
    font-size:16px;
    backdrop-filter:blur(10px);
    transition:0.2s;
}

button:active{
    transform:scale(0.95);
}

.start{background:#22c55e;}
.pause{background:#ef4444;}
.skip{background:#f59e0b;}
.mode{background:#374151;}
.phase {background:#475569;}
.phase.active {background:#a855f7;}

#progressBar {
    width:90%;
    height:12px;
    background:#1e293b;
    margin:10px auto;
    border-radius:10px;
}

#progress {
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#a855f7,#ec4899);
}

/* 🔥 BOTTOM APP BAR */
.bottomBar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:rgba(20,20,20,0.85);
    backdrop-filter:blur(20px);
    padding:10px;
    display:flex;
    gap:10px;
    z-index:999;
}
</style>
</head>

<body>

<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>
<div id="side" class="side"></div>

<img id="exerciseImage">
<div id="guide" class="guide"></div>

<!-- 🔥 RING TIMER -->
<div class="ringWrap">
<canvas id="ring" width="180" height="180"></canvas>
<div id="timer" class="timer">0</div>
</div>

<div id="progressBar"><div id="progress"></div></div>

<!-- TOP BUTTONS -->
<button class="start" onclick="start()">Start</button>
<button class="pause" onclick="pause()">Pause</button>
<button onclick="resume()">Resume</button>
<button class="skip" onclick="skip()">Skip</button>
<button class="mode" onclick="toggleMode()">Mode</button>

<br>

<button id="btnP1" class="phase" onclick="setPhase(1)">Training 1</button>
<button id="btnP2" class="phase" onclick="setPhase(2)">Training 2</button>
<button id="btnP3" class="phase" onclick="setPhase(3)">Training 3</button>    
<button class="mode" onclick="nextPhase()">Nächstes Training</button>

<!-- 🔥 BOTTOM BAR -->
<div class="bottomBar">

<button class="start" style="flex:1;" onclick="start()">Start</button>
<button class="pause" style="flex:1;" onclick="pause()">Pause</button>
<button style="flex:1;background:#3498db;" onclick="resume()">Resume</button>
<button class="skip" style="flex:1;" onclick="skip()">Skip</button>
<button style="flex:1;background:#555;" onclick="stop()">Stop</button>

</div>

<script>

// =============================
// 🔥 HAPTIC FEEDBACK
function vibrate(){
    if(navigator.vibrate) navigator.vibrate(20);
}

// =============================
// 🔥 NATÜRLICHERE STIMME
function speak(text){

    speechSynthesis.cancel();

    return new Promise(resolve=>{
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = "de-DE";
        msg.rate = 0.9;
        msg.pitch = 1;

        msg.onend = () => setTimeout(resolve,120);

        speechSynthesis.speak(msg);
    });
}

// =============================
// 🔥 RING TIMER DRAW
const canvas = document.getElementById("ring");
const ctx = canvas.getContext("2d");

function drawRing(percent){

    ctx.clearRect(0,0,180,180);

    ctx.beginPath();
    ctx.arc(90,90,80,0,Math.PI*2);
    ctx.strokeStyle="#1e293b";
    ctx.lineWidth=10;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(90,90,80,-Math.PI/2, (Math.PI*2*percent)-Math.PI/2);
    ctx.strokeStyle="#a855f7";
    ctx.lineWidth=10;
    ctx.stroke();
}

// =============================
// 🔥 UPDATE TIMER
function update(v){
    timer.innerText = v;

    if(typeof v === "number"){
        drawRing(v/120); // simple scaling
    }
}

// =============================
// 🔥 MICRO PAUSE (Coach Timing)
function sleep(ms){
    return new Promise(r=>setTimeout(r,ms));
}

// =============================
function toggleMode(){
    document.body.classList.toggle("dark");
}

// =============================
// 🔥 SMALL UX BOOST
async function countdown(sec){

    for(let i=sec;i>0;i--){
        update(i);
        vibrate();
        await speak(i.toString());
    }
}

// =============================
// 🔥 STOP (SAFE)
function stop(){

    running = false;

    clearInterval(timer);
    speechSynthesis.cancel();

    update("0");
    side.innerText="";
}

// =============================
// 🔥 VISUAL FEEDBACK ON LOAD
drawRing(1);



// =============================
// 🔥 STABILE PHASEN
const phases = [

/* ================= PHASE 1 ================= */

]
},

{

img:"images/phase3.jpg",

]
},

reps:15,
guide:[

"Hüfte nach oben drücken, Gesäß anspannen",
"Oben 5 Sekunden halten",
"Langsam wieder absenken"
]
},

{

img:"images/phase3.jpg",
type:"side", // ✅ WAR "time"
time:45,

/* ================= PHASE 2 ================= */
[

]

{

reps:12,

// =============================
load();

</script>

</body>
</html>
