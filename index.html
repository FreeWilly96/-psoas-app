<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psoas Ultra PRO</title>

<style>
body { margin:0; font-family:Arial; text-align:center; background:#f2f2f2; transition:0.3s;}
body.dark { background:#0b1a2f; color:white;}

img { width:95%; height:40vh; object-fit:contain;}
.timer { font-size:80px;}
.side { font-size:40px; font-weight:bold; height:50px;}

button { padding:10px; margin:5px; border:none; border-radius:10px; color:white;}
.start{background:green;}
.pause{background:red;}
.skip{background:orange;}
.mode{background:black;}
.phase{background:#777;}
.phase.active{background:purple;}
</style>
</head>

<body>

<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>

<div id="side" class="side"></div>

<img id="exerciseImage">

<div class="timer" id="timer">0</div>

<div>
<button class="start" onclick="start()">Start</button>
<button class="pause" onclick="pause()">Pause</button>
<button class="skip" onclick="skip()">Skip</button>
<button class="mode" onclick="toggleMode()">Mode</button>
</div>

<div>
<button id="p1" class="phase" onclick="setPhase(1)">Phase 1</button>
<button id="p2" class="phase" onclick="setPhase(2)">Phase 2</button>
</div>

<script>

// =============================
let phaseIndex = 0;
let current = 0;
let mode = "idle";
let timer = null;
let value = 0;
let side = "rechts";
let reps = 0;
let sessionActive = false;

// =============================
function speak(text, cb){
    speechSynthesis.cancel();
    let msg = new SpeechSynthesisUtterance(text);
    msg.lang="de-DE";
    msg.rate = 0.95; // 🔥 angenehmer Flow
    msg.onend = ()=> cb && cb();
    speechSynthesis.speak(msg);
}

// =============================
function setPhase(p){
    stopAll();
    phaseIndex = p-1;
    current = 0;
    load();
}

// =============================
function toggleMode(){
    document.body.classList.toggle("dark");
}

// =============================
const phases = [

/* ================= PHASE 1 ================= */
[
{
name:"Bauchatmung",
img:"images/phase3.jpg",
type:"time",
time:120,
speech:"Bauchatmung. Lege dich entspannt auf den Rücken, die Füße sind aufgestellt. Eine Hand liegt auf deinem Bauch, die andere auf deiner Brust. Atme ruhig durch die Nase ein, der Bauch hebt sich. Die Brust bleibt möglichst ruhig. Atme langsam durch den Mund aus. Fünf Sekunden ein, sieben Sekunden aus. Finde einen gleichmäßigen, ruhigen Rhythmus."
},

{
name:"Knie zur Brust",
img:"images/phase3.jpg",
type:"sideTime",
time:45,
speech:"Knie zur Brust. Bleibe in Rückenlage. Ziehe ein Knie sanft zur Brust und halte es mit beiden Händen. Das andere Bein bleibt lang und entspannt auf dem Boden. Atme ruhig weiter und spüre die Entlastung im unteren Rücken."
},

{
name:"Mini Becken Kippung",
img:"images/phase3.jpg",
type:"reps",
reps:15,
speech:"Mini Becken Kippung. Füße aufgestellt. Kippe dein Becken leicht nach hinten, sodass der untere Rücken sanft in den Boden drückt. Halte kurz die Spannung und löse wieder. Die Bewegung ist klein und kontrolliert."
},

{
name:"Hüftbeuger Dehnung",
img:"images/phase3.jpg",
type:"sideTime",
time:40,
speech:"Hüftbeuger Dehnung. Gehe in den Halbkniestand. Das hintere Bein liegt am Boden. Spanne das Gesäß an und kippe das Becken leicht nach hinten. Halte den Oberkörper aufrecht. Du solltest eine Dehnung vorne in der Hüfte spüren."
},

{
name:"Glute Bridge",
img:"images/phase3.jpg",
type:"repsSlow",
reps:12,
speech:"Glute Bridge. Drücke die Füße in den Boden und hebe langsam die Hüfte an. Spanne dein Gesäß fest an. Halte die Position zwei bis drei Sekunden. Senke die Hüfte anschließend langsam wieder ab."
},

{
name:"Adduktor Dehnung",
img:"images/phase3.jpg",
type:"time",
time:45,
speech:"Adduktor Dehnung. Stelle dich breit hin. Verlagere dein Gewicht zur Seite. Ein Bein ist gebeugt, das andere bleibt gestreckt. Halte den Rücken gerade und spüre die Dehnung an der Innenseite des gestreckten Beins."
}
],

/* ================= PHASE 2 ================= */
[
{
name:"Bauchatmung Aktivierung",
img:"images/phase2.jpg",
type:"time",
time:60,
speech:"Bauchatmung zur Aktivierung. Atme tief durch die Nase ein und spanne dabei leicht deinen Bauch an. Halte die Spannung kurz und atme kontrolliert wieder aus. Bereite deinen Körper auf die Bewegung vor."
},

{
name:"Dynamische Hüftöffnung",
img:"images/phase2.jpg",
type:"sideReps",
reps:10,
speech:"Dynamische Hüftöffnung. Gehe in einen großen Ausfallschritt nach vorne. Schiebe die Hüfte kontrolliert nach vorne und wieder zurück. Bleibe stabil und führe die Bewegung fließend aus."
},

{
name:"Glute Bridge einbeinig",
img:"images/phase2.jpg",
type:"sideRepsSlow",
reps:10,
speech:"Einbeinige Glute Bridge. Hebe ein Bein an. Drücke das andere fest in den Boden und hebe die Hüfte an. Spanne das Gesäß an, halte kurz und senke die Hüfte langsam wieder ab."
},

{
name:"Dead Bug",
img:"images/phase2.jpg",
type:"alt",
reps:12,
speech:"Dead Bug. Lege dich auf den Rücken und hebe Arme und Beine an. Strecke abwechselnd einen Arm und das gegenüberliegende Bein. Halte deinen Rumpf stabil und kontrolliere die Bewegung."
},

{
name:"Seitliche Ausfallschritte",
img:"images/phase2.jpg",
type:"altSlow",
reps:10,
speech:"Seitliche Ausfallschritte. Mache einen Schritt zur Seite. Schiebe die Hüfte nach hinten und beuge das Standbein. Kehre kontrolliert zur Mitte zurück und wechsle die Seite."
},

{
name:"Adduktor Hüfte Kombi",
img:"images/phase2.jpg",
type:"time",
time:40,
speech:"Adduktor und Hüfte kombiniert. Gehe in die Dehnposition und führe kleine kontrollierte Bewegungen aus. Halte Spannung und arbeite aktiv in der Position."
}
]

];

// =============================
function start(){
    if(mode !== "idle") return;
    sessionActive = true;
    explainExercise();
}

// =============================
function explainExercise(){
    let ex = phases[phaseIndex][current];
    mode = "explain";
    speak(ex.speech, startCountdown);
}

// =============================
function startCountdown(){
    mode = "countdown";
    let c = 3;

    timer = setInterval(()=>{
        timerEl.innerText = c;
        speak(c);
        c--;

        if(c === 0){
            clearInterval(timer);
            runExercise();
        }

    },1000);
}

// =============================
function runExercise(){
    let ex = phases[phaseIndex][current];
    mode = "exercise";

    if(ex.type==="time") runTime(ex);
    if(ex.type==="reps") runReps(ex,2000);
    if(ex.type==="repsSlow") runReps(ex,3000);
    if(ex.type==="sideTime") runSideTime(ex);
    if(ex.type==="sideReps") runSideReps(ex,2000);
    if(ex.type==="sideRepsSlow") runSideReps(ex,3000);
    if(ex.type==="alt") runAlt(ex,1500);
    if(ex.type==="altSlow") runAlt(ex,2500);
}

// =============================
function runTime(ex){
    value = ex.time;

    timer = setInterval(()=>{
        value--;
        update(value);

        if(value<=5 && value>0) speak(value);

        if(value<=0) finishExercise();

    },1000);
}

// =============================
function runReps(ex, speed){
    value = ex.reps;

    timer = setInterval(()=>{
        value--;
        update(value);

        if(value<=0) finishExercise();

    },speed);
}

// =============================
function runSideTime(ex){
    side="rechts";
    doSideTime(ex);
}

function doSideTime(ex){
    sideEl.innerText = side;
    speak(side);

    value = ex.time;

    timer = setInterval(()=>{
        value--;
        update(value);

        if(value<=0){
            clearInterval(timer);

            if(side==="rechts"){
                side="links";
                speak("Wechsel", ()=> setTimeout(()=>doSideTime(ex),1000));
            } else finishExercise();
        }

    },1000);
}

// =============================
function runSideReps(ex, speed){
    side="rechts";
    doSideReps(ex, speed);
}

function doSideReps(ex, speed){
    sideEl.innerText = side;
    speak(side);

    value = ex.reps;

    timer = setInterval(()=>{
        value--;
        update(value);

        if(value<=0){
            clearInterval(timer);

            if(side==="rechts"){
                side="links";
                speak("Wechsel", ()=> setTimeout(()=>doSideReps(ex, speed),1000));
            } else finishExercise();
        }

    },speed);
}

// =============================
function runAlt(ex, speed){
    reps = ex.reps;
    side = "links";

    function loop(){
        sideEl.innerText = side;
        speak(side);

        side = side==="links"?"rechts":"links";

        if(side==="links") reps--;

        if(reps<=0){
            finishExercise();
            return;
        }

        timer = setTimeout(()=>{
            speak("Wechsel", loop);
        },speed);
    }

    loop();
}

// =============================
function finishExercise(){
    stopAll();
    startRest();
}

// =============================
function startRest(){

    let nextEx = phases[phaseIndex][current+1];

    if(!nextEx){
        alert("Training fertig 💪");
        sessionActive = false;
        current = 0;
        load();
        return;
    }

    value = 15;

    speak("Pause. Nächste Übung " + nextEx.name);

    timer = setInterval(()=>{
        value--;
        update(value);

        if(value<=0){
            clearInterval(timer);
            current++;
            load();

            if(sessionActive){
                explainExercise();
            }
        }

    },1000);
}

// =============================
function skip(){
    stopAll();
    current++;
    load();
}

// =============================
function pause(){
    stopAll();
    sessionActive = false;
}

// =============================
function stopAll(){
    clearInterval(timer);
    clearTimeout(timer);
    timer=null;
    mode="idle";
}

// =============================
function update(val){
    timerEl.innerText = val;
}

// =============================
function load(){
    let ex = phases[phaseIndex][current];

    phaseTitle.innerText = "Phase " + (phaseIndex+1);
    exerciseTitle.innerText = ex.name;
    exerciseImage.src = ex.img;

    sideEl.innerText = "";
    update(ex.time || ex.reps);
}

// =============================
const timerEl = document.getElementById("timer");
const sideEl = document.getElementById("side");

load();

</script>

</body>
</html>
