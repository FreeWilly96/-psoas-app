<!DOCTYPE html>
<html lang="de">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Psoas Ultra+</title>

<style>
body {
 font-family:-apple-system;
 margin:0;
 background:#0f172a;
 color:white;
 text-align:center;
}

.header {padding:20px;font-size:22px;font-weight:bold;}
.timer {font-size:60px;margin:10px;}
.exercise {font-size:24px;margin-top:10px;}
.next {font-size:14px;color:#94a3b8;}

img {
 width:90%;
 border-radius:12px;
 margin-top:10px;
}

button {
 padding:12px;margin:5px;border-radius:10px;
 border:none;background:#22c55e;color:white;
}

input {
 padding:10px;border-radius:8px;border:none;
 width:60px;text-align:center;
}
</style>
</head>

<body>

<div class="header">Psoas Ultra+</div>

<div>
 Schmerz (0–10):
 <input id="pain" type="number" min="0" max="10">
</div>

<div class="exercise" id="exercise">Bereit</div>
<div class="next" id="next"></div>

<img id="img" src="https://upload.wikimedia.org/wikipedia/commons/8/8c/Diaphragmatic_breathing.png">

<div class="timer" id="timer">0</div>

<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>

<script>

// 🧠 Trainingsplan mit echten Bildern
let plan = [

 {name:"Bauchatmung", time:60,
 img:"https://upload.wikimedia.org/wikipedia/commons/8/8c/Diaphragmatic_breathing.png"},

 {name:"Knie zur Brust links", time:45,
 img:"https://upload.wikimedia.org/wikipedia/commons/3/3c/Knee_to_chest_stretch.png"},

 {name:"Knie zur Brust rechts", time:45,
 img:"https://upload.wikimedia.org/wikipedia/commons/3/3c/Knee_to_chest_stretch.png"},

 {name:"Becken kippen", time:60,
 img:"https://upload.wikimedia.org/wikipedia/commons/2/2e/Pelvic_tilt_exercise.png"},

 {name:"Glute Bridge", time:60,
 img:"https://upload.wikimedia.org/wikipedia/commons/5/5f/Glute_bridge_exercise.png"},

 {name:"Adduktor Stretch links", time:45,
 img:"https://upload.wikimedia.org/wikipedia/commons/4/4e/Adductor_stretch.png"},

 {name:"Adduktor Stretch rechts", time:45,
 img:"https://upload.wikimedia.org/wikipedia/commons/4/4e/Adductor_stretch.png"}

];

let i = 0;
let t = 0;
let interval;

// 🎧 Sprache
function speak(text){
 let msg = new SpeechSynthesisUtterance(text);
 msg.lang="de-DE";
 speechSynthesis.speak(msg);
}

// ▶️ Start
function start(){
 i = 0;
 next();
}

// 🔁 nächste Übung
function next(){

 if(i >= plan.length){
   speak("Training abgeschlossen");
   localStorage.setItem("lastDone", Date.now());
   document.getElementById("exercise").innerText = "Fertig 💪";
   document.getElementById("next").innerText = "";
   return;
 }

 let ex = plan[i];

 document.getElementById("exercise").innerText = ex.name;
 document.getElementById("img").src = ex.img;

 if(plan[i+1]){
   document.getElementById("next").innerText = "Als nächstes: " + plan[i+1].name;
 } else {
   document.getElementById("next").innerText = "";
 }

 speak(ex.name);

 t = ex.time;

 interval = setInterval(()=>{
   t--;
   document.getElementById("timer").innerText = t;

   if(t <= 0){
     clearInterval(interval);
     i++;
     next();
   }
 },1000);
}

// ⏸ Pause
function pause(){
 clearInterval(interval);
}

// 🔔 Erinnerung
let last = localStorage.getItem("lastDone");
if(last){
 let diff = (Date.now() - last)/1000/60/60;
 if(diff > 24){
   document.getElementById("next").innerText = "Heute wieder trainieren!";
 }
}

</script>

</body>
</html>
