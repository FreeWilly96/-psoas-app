<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Psoas Ultra</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

h1 { margin-top: 10px; }

img {
    width: 90%;
    max-width: 400px;
    border-radius: 15px;
    margin-top: 20px;
}

.timer {
    font-size: 60px;
    margin: 10px 0;
}

.progress-bar {
    width: 90%;
    height: 10px;
    background: #1e293b;
    margin: 15px auto;
    border-radius: 10px;
    overflow: hidden;
}

.progress {
    height: 100%;
    width: 0%;
    background: #22c55e;
}

button {
    padding: 12px 20px;
    margin: 5px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

.start { background: #22c55e; color: white; }
.pause { background: #ef4444; color: white; }
.skip { background: #3b82f6; color: white; }

.phase {
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>Psoas Ultra</h1>

<div class="phase">
<button onclick="setPhase(1)">Phase 1</button>
<button onclick="setPhase(2)">Phase 2</button>
</div>

<h2 id="exercise">Bereit?</h2>

<img id="image" src="images/phase1.jpg">

<div class="timer" id="timer">0</div>

<div class="progress-bar">
    <div class="progress" id="progress"></div>
</div>

<div>
<button class="start" onclick="start()">Start</button>
<button class="pause" onclick="pause()">Pause</button>
<button class="skip" onclick="skip()">Weiter</button>
</div>

</div>

<script>

// =========================
// ÜBUNGEN
// =========================

const phase1 = [
    {name: "Bauchatmung", time: 60},
    {name: "Knie zur Brust links", time: 45},
    {name: "Knie zur Brust rechts", time: 45},
    {name: "Mini-Becken-Kippung", time: 40},
    {name: "Glute Bridge", time: 40},
    {name: "Adduktor-Dehnung", time: 45}
];

const phase2 = [
    {name: "Bauchatmung", time: 60},
    {name: "Dynamische Hüftöffnung", time: 50},
    {name: "Glute Bridge einbeinig", time: 50},
    {name: "Dead Bug", time: 50},
    {name: "Seitliche Ausfallschritte", time: 50},
    {name: "Adduktor Aktivierung", time: 50}
];

// =========================
// STATE
// =========================

let currentPhase = localStorage.getItem("phase") || 1;
let exercises = currentPhase == 1 ? phase1 : phase2;

let index = 0;
let time = exercises[0].time;
let totalTime = exercises[0].time;
let interval = null;


// =========================
// FUNKTIONEN
// =========================

function setPhase(p) {
    currentPhase = p;
    localStorage.setItem("phase", p);

    exercises = p == 1 ? phase1 : phase2;

    index = 0;
    time = exercises[0].time;
    totalTime = time;

    updateUI();
}

function updateUI() {

    document.getElementById("exercise").innerText = exercises[index].name;
    document.getElementById("timer").innerText = time;

    // Fortschritt
    let percent = ((totalTime - time) / totalTime) * 100;
    document.getElementById("progress").style.width = percent + "%";

    // Bild
    document.getElementById("image").src =
        currentPhase == 1 ? "images/phase1.jpg" : "images/phase2.jpg";
}

function start() {

    if (interval) return;

    interval = setInterval(() => {

        time--;

        if (time <= 0) {
            beep();
            nextExercise();
        }

        updateUI();

    }, 1000);
}

function pause() {
    clearInterval(interval);
    interval = null;
}

function skip() {
    beep();
    nextExercise();
}

function nextExercise() {

    index++;

    if (index >= exercises.length) {
        finish();
        return;
    }

    time = exercises[index].time;
    totalTime = time;
}

function finish() {

    pause();

    localStorage.setItem("lastDone", new Date().toLocaleDateString());

    alert("Fertig! 💪 Stark gemacht!");
}


// =========================
// SOUND
// =========================

function beep() {
    let ctx = new (window.AudioContext || window.webkitAudioContext)();
    let osc = ctx.createOscillator();
    osc.type = "sine";
    osc.frequency.setValueAtTime(800, ctx.currentTime);
    osc.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.2);
}


// =========================
// INIT
// =========================

updateUI();

</script>

</body>
</html>
