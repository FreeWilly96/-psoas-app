<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psoas Ultra FINAL</title>

<style>
body { margin:0; font-family:Arial; text-align:center; background:#f2f2f2; transition:0.3s;}
body.dark { background:#0b1a2f; color:white;}

img { width:95%; height:40vh; object-fit:contain;}
.timer { font-size:80px;}

.side { font-size:50px; font-weight:bold; height:60px; }

button { padding:10px; margin:5px; border:none; border-radius:10px; color:white;}
.start{background:green;} .pause{background:red;} .skip{background:orange;}
.mode{background:black;}
</style>
</head>

<body>

<h2 id="phaseTitle"></h2>
<h3 id="exerciseTitle"></h3>

<div id="side" class="side"></div>

<img id="exerciseImage">

<div class="timer" id="timer">0</div>

<button class="start" onclick="start()">Start</button>
<button class="pause" onclick="pause()">Pause</button>
<button class="skip" onclick="next()">Skip</button>
<button class="mode" onclick="toggleMode()">Mode</button>

<script>

// =============================
let phaseIndex = 0;
let current = 0;
let timer = null;
let spoken = false;

// =============================
function speak(text, cb){
    speechSynthesis.cancel();
    let msg = new SpeechSynthesisUtterance(text);
    msg.lang="de-DE";
    msg.onend = ()=> cb && cb();
    speechSynthesis.speak(msg);
}

// =============================
function showSide(text){
    document.getElementById("side").innerText = text.toUpperCase();
}

// =============================
const phases = [

/* =============================
   PHASE 1 (unverändert korrekt)
============================= */
[
{name:"Bauchatmung", img:"images/phase3.jpg", type:"time", time:120,
speech:"Rückenlage, Füße aufgestellt. Eine Hand auf den Bauch, eine auf die Brust. Durch die Nase in den Bauch atmen. Fünf Sekunden ein, sieben Sekunden aus."},

{name:"Knie zur Brust", img:"images/phase3.jpg", type:"side", time:45,
speech:"Rückenlage. Ein Knie zur Brust ziehen und mit den Händen halten. Anderes Bein bleibt entspannt. Ruhig weiteratmen."},

{name:"Mini-Becken-Kippung", img:"images/phase3.jpg", type:"reps", reps:15,
speech:"Rückenlage. Unteren Rücken in den Boden drücken. Becken kippen und wieder lösen. Kleine ruhige Bewegung."},

{name:"Hüftbeuger Dehnung", img:"images/phase3.jpg", type:"side", time:40,
speech:"Halbkniestand. Gesäß anspannen. Becken nach hinten kippen. Oberkörper aufrecht. Dehnung vorne spüren."},

{name:"Glute Bridge", img:"images/phase3.jpg", type:"repsSlow", reps:12,
speech:"Rückenlage. Füße aufstellen. Hüfte anheben bis der Körper eine Linie bildet. Zwei bis drei Sekunden halten. Langsam absenken."},

{name:"Adduktor Dehnung", img:"images/phase3.jpg", type:"time", time:45,
speech:"Breiter Stand. Gewicht zur Seite verlagern. Andere Seite bleibt gestreckt. Dehnung spüren."}
],

/* =============================
   PHASE 2 (JETZT KOMPLETT!)
============================= */
[
{name:"Bauchatmung", img:"images/phase2.jpg", type:"time", time:60,
speech:"Rückenlage, Füße aufgestellt. Eine Hand auf den Bauch, eine auf die Brust. Durch die Nase in den Bauch atmen. Langsam durch den Mund ausatmen."},

{name:"Dynamische Hüftöffnung", img:"images/phase2.jpg", type:"sideSlow", reps:10,
speech:"Ausfallschritt Position einnehmen. Hüfte langsam nach vorne schieben bis eine Dehnung spürbar ist. Danach wieder leicht zurück. Oberkörper aufrecht halten und Gesäß leicht anspannen."},

{name:"Glute Bridge einbeinig", img:"images/phase2.jpg", type:"sideSlow", reps:10,
speech:"Rückenlage. Ein Knie gebeugt, anderes Bein anheben. Hüfte nach oben drücken bis der Körper eine Linie bildet. Zwei bis drei Sekunden halten und langsam absenken."},

{name:"Dead Bug", img:"images/phase2.jpg", type:"alt", reps:12,
speech:"Rückenlage. Arme nach oben, Knie 90 Grad gebeugt. Gleichzeitig ein Bein ausstrecken und den gegenüberliegenden Arm nach hinten führen. Langsam zurück und Seite wechseln ohne den unteren Rücken anzuheben."},

{name:"Seitliche Ausfallschritte", img:"images/phase2.jpg", type:"altSlow", reps:10,
speech:"Schritt weit zur Seite machen. Hüfte nach hinten schieben und das Bein beugen. Das andere Bein bleibt gestreckt. Zurück in die Mitte und Seite wechseln."},

{name:"Adduktor und Hüfte kombinieren", img:"images/phase2.jpg", type:"time", time:40,
speech:"In die seitliche Dehnung gehen und Spannung in der Leiste spüren. Ruhig atmen. Danach kleine Wippbewegungen nach oben und unten ausführen um die Muskulatur zu aktivieren."}
]

];

// =============================
function start(){

    if(timer) return;

    let ex = phases[phaseIndex][current];

    if(!spoken){
        spoken = true;

        speak(ex.name + ". " + ex.speech, ()=>{
            run(ex);
        });

    } else run(ex);
}

// =============================
function run(ex){

    if(ex.type==="time") runTime(ex);
    if(ex.type==="reps") runReps(ex);
    if(ex.type==="repsSlow") runRepsSlow(ex);
    if(ex.type==="side") runSide(ex);
    if(ex.type==="sideSlow") runSideSlow(ex);
    if(ex.type==="alt") runAlt(ex);
    if(ex.type==="altSlow") runAltSlow(ex);
}

// =============================
function runTime(ex){

    let t = ex.time;

    timer = setInterval(()=>{
        t--; update(t);

        if(t<=5 && t>0) speak(t);

        if(t<=0){
            clearInterval(timer);
            next();
        }

    },1000);
}

// =============================
function runReps(ex){

    let r = ex.reps;

    timer = setInterval(()=>{
        r--; update(r);
        speak(r);

        if(r<=0){
            clearInterval(timer);
            next();
        }

    },2000);
}

// =============================
function runRepsSlow(ex){

    let r = ex.reps;

    timer = setInterval(()=>{
        r--; update(r);
        speak(r);

        if(r<=0){
            clearInterval(timer);
            next();
        }

    },3000);
}

// =============================
function runSideSlow(ex){

    let side="rechts";

    function go(){

        showSide(side);
        speak(side);

        let r = ex.reps;

        let i = setInterval(()=>{
            r--;
            update(r);

            if(r<=0){
                clearInterval(i);

                if(side==="rechts"){
                    speak("Wechsel", ()=>{
                        side="links";
                        setTimeout(go,2000);
                    });
                } else next();
            }

        },3000);
    }

    go();
}

// =============================
function runSide(ex){

    let side="rechts";

    function go(){

        showSide(side);
        speak(side);

        let t = ex.time;

        let i = setInterval(()=>{
            t--; update(t);

            if(t<=0){
                clearInterval(i);

                if(side==="rechts"){
                    speak("Wechsel", ()=>{
                        side="links";
                        setTimeout(go,2000);
                    });
                } else next();
            }

        },1000);
    }

    go();
}

// =============================
function runAlt(ex){

    let reps = ex.reps;
    let side = "links";

    function loop(){

        showSide(side);
        speak(side);

        side = (side === "links") ? "rechts" : "links";

        if(side === "links") reps--;

        if(reps <= 0){
            next();
            return;
        }

        setTimeout(()=> speak("Wechsel", loop),1500);
    }

    loop();
}

// =============================
function runAltSlow(ex){

    let reps = ex.reps;
    let side = "links";

    function loop(){

        showSide(side);
        speak(side);

        side = (side === "links") ? "rechts" : "links";

        if(side === "links") reps--;

        if(reps <= 0){
            next();
            return;
        }

        setTimeout(()=> speak("Wechsel", loop),2500);
    }

    loop();
}

// =============================
function next(){

    clearInterval(timer);

    speak("Übung beendet", ()=>{

        current++;

        if(current >= phases[phaseIndex].length){
            alert("Training fertig 💪");
            current=0;
        }

        spoken=false;
        load();

        setTimeout(start,1500);
    });
}

// =============================
function pause(){
    clearInterval(timer);
}

// =============================
function toggleMode(){
    document.body.classList.toggle("dark");
}

// =============================
function update(val){
    document.getElementById("timer").innerText = val;
}

// =============================
function load(){

    let ex = phases[phaseIndex][current];

    document.getElementById("phaseTitle").innerText =
        "Phase " + (phaseIndex+1);

    document.getElementById("exerciseTitle").innerText = ex.name;

    document.getElementById("exerciseImage").src = ex.img;

    update(ex.time || ex.reps);
}

load();

</script>

</body>
</html>
